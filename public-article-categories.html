<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse by Category — SME South Africa</title>
  <meta name="description" content="Find insights by topic — from starting up to scaling up." />
  <link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script><script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>tailwind.config={theme:{extend:{fontFamily:{jakarta:['Plus Jakarta Sans','sans-serif'],inter:['Inter','system-ui','sans-serif']}}}};</script>
  <style>
    html,body{font-family:'Inter',system-ui,sans-serif;} .font-jakarta{font-family:'Plus Jakarta Sans',sans-serif;letter-spacing:.005em;}
    .hero-bg{background:linear-gradient(115deg,#0C1F31 0%,#0C1F31 50%,#2b1626 80%,#5e1a2c 115%);}
    .dot-pattern{background-image:radial-gradient(rgba(255,255,255,.07) 1px,transparent 1.5px);background-size:22px 22px;}
    .card-lift{transition:box-shadow .2s,transform .2s,border-color .2s;} .card-lift:hover{box-shadow:0 16px 34px -14px rgba(10,44,61,.24);transform:translateY(-3px);border-color:#DC183C;}
    .subchip{transition:all .15s;} .subchip:not(.chip-active):hover{background:#FDECEF;color:#B0142F;border-color:#DC183C;}
    .chip-active{background:#DC183C !important;color:#fff !important;border-color:#DC183C !important;}
    .dev-badge{display:none;} body.dev-on .dev-badge{display:inline-flex;} #devToggle.on{background:#DC183C;color:#fff;border-color:#DC183C;}
    .ov{position:fixed;inset:0;z-index:60;} .ov-bg{position:absolute;inset:0;background:rgba(12,31,49,.45);backdrop-filter:blur(2px);opacity:0;transition:opacity .3s;} .ov.open .ov-bg{opacity:1;}
    .drawer{position:absolute;right:0;top:0;height:100%;width:100%;max-width:440px;background:#fff;box-shadow:-12px 0 40px rgba(12,31,49,.25);overflow-y:auto;transform:translateX(100%);transition:transform .3s cubic-bezier(.2,.7,.2,1);} .ov.open .drawer{transform:translateX(0);}
  </style>
</head>
<body class="bg-[#FCFCFC] text-[#121A21] antialiased">
<header class="bg-slate-100 border-b-2 border-dashed border-slate-400 relative overflow-hidden">
  <div class="absolute inset-0 opacity-30 pointer-events-none" style="background:repeating-linear-gradient(45deg,transparent,transparent 8px,rgba(100,116,139,.18) 8px,rgba(100,116,139,.18) 16px)"></div>
  <div class="relative max-w-7xl mx-auto px-4 sm:px-6 h-14 flex items-center gap-3 sm:gap-4">
    <a href="public-home.html" class="flex items-center gap-2 shrink-0 opacity-70 hover:opacity-100 transition">
      <img src="assets/logo-icon.png" alt="SME South Africa" class="w-7 h-7" />
      <span class="font-jakarta font-extrabold text-[13px] tracking-tight text-slate-700 hidden sm:inline">SME South Africa</span>
    </a>
    <span class="mx-1 hidden sm:inline w-px h-5 bg-slate-300"></span>
    <p class="text-[10px] sm:text-[11px] font-bold uppercase tracking-widest text-slate-600 flex items-center gap-1.5">
      <i data-lucide="construction" class="w-3.5 h-3.5 text-slate-500"></i>
      Header placeholder &middot; design pending
    </p>
    <div class="ml-auto flex items-center gap-2">
      <button id="devToggle" onclick="toggleDevMode()" class="inline-flex items-center gap-1.5 px-2.5 h-8 rounded-full bg-white border border-slate-300 hover:border-[#DC183C] hover:text-[#DC183C] text-[11px] font-bold uppercase tracking-wider text-slate-600 transition" title="Toggle implementation notes"><i data-lucide="code-2" class="w-3.5 h-3.5"></i><span class="hidden sm:inline">Dev</span></button>
      <a href="index.html" class="inline-flex items-center gap-1.5 px-3 h-8 rounded-full bg-white border border-slate-300 hover:border-slate-500 text-[11px] font-bold text-slate-700 transition">
        <i data-lucide="arrow-left" class="w-3.5 h-3.5"></i><span class="hidden sm:inline">Launcher</span>
      </a>
    </div>
  </div>
</header>

<!-- ARCHIVE HERO -->
<section class="hero-bg text-white relative overflow-hidden"><div class="absolute inset-0 dot-pattern opacity-70 pointer-events-none"></div>
  <div class="max-w-7xl mx-auto px-4 sm:px-6 py-14 relative">
    <!-- Breadcrumb (global pattern) -->
    <nav aria-label="Breadcrumb" class="text-xs text-white/55 flex items-center flex-wrap gap-x-1.5 mb-4"><a href="public-home.html" class="hover:text-white transition">Home</a><span class="text-white/30">›</span><a href="public-articles.html" class="hover:text-white transition">Articles</a><span class="text-white/30">›</span><span class="text-white/85 font-medium truncate">Categories</span></nav>
    <h1 class="font-jakarta font-extrabold text-4xl sm:text-5xl tracking-tight">Browse by Category
      <button onclick="openBrief()" class="dev-badge align-middle ml-1 w-6 h-6 rounded-full bg-[#FF9900] text-[#0C1F31] items-center justify-center text-[11px] font-bold">i</button>
    </h1>
    <p class="mt-4 text-white/70 max-w-2xl text-lg">Find insights by topic — from starting up to scaling up.</p>
  </div>
</section>

<main class="max-w-7xl mx-auto px-4 sm:px-6 py-12 space-y-14">
  <!-- Topic categories — the traditional editorial hierarchy, each with subcategories -->
  <section>
    <p class="text-[11px] font-bold uppercase tracking-widest text-[#DC183C]">Browse by topic</p>
    <h2 class="font-jakarta font-extrabold text-2xl sm:text-3xl mt-1.5 tracking-tight">Content topics</h2>
    <div id="topicGrid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-5 mt-6"></div>
  </section>

  <!-- Signature series — Tshepho's four flagship editorial features, no subcategories -->
  <section>
    <p class="text-[11px] font-bold uppercase tracking-widest text-[#DC183C]">Editorial series</p>
    <h2 class="font-jakarta font-extrabold text-2xl sm:text-3xl mt-1.5 tracking-tight">Signature features</h2>
    <div id="seriesGrid" class="grid sm:grid-cols-2 lg:grid-cols-4 gap-5 mt-6"></div>
  </section>
</main>

<footer class="bg-slate-100 border-t-2 border-dashed border-slate-400 relative overflow-hidden">
  <div class="absolute inset-0 opacity-30 pointer-events-none" style="background:repeating-linear-gradient(45deg,transparent,transparent 8px,rgba(100,116,139,.18) 8px,rgba(100,116,139,.18) 16px)"></div>
  <div class="relative max-w-7xl mx-auto px-4 sm:px-6 py-6 text-center">
    <p class="text-[10px] sm:text-[11px] font-bold uppercase tracking-widest text-slate-600 flex items-center justify-center gap-1.5">
      <i data-lucide="construction" class="w-3.5 h-3.5 text-slate-500"></i>
      Footer placeholder &middot; design pending
    </p>
    <p class="text-[11px] text-slate-500 mt-2">&copy; 2026 SME South Africa</p>
  </div>
</footer>

<div id="overlay-root"></div><div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 z-50"></div>
<script>
  function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
  function showToast(m){const el=document.getElementById('toast');el.classList.remove('hidden');el.innerHTML=`<div class="bg-[#0C1F31] text-white rounded-full pl-3 pr-5 py-2.5 shadow-2xl flex items-center gap-2 text-sm font-semibold" style="border-left:4px solid #29A37A"><i data-lucide="check-circle" class="w-4 h-4" style="color:#29A37A"></i><span>${esc(m)}</span></div>`;lucide.createIcons();setTimeout(()=>{el.classList.add('hidden');el.innerHTML='';},2400);}

  // TOPIC CATEGORIES — the traditional editorial hierarchy, each carrying its own subcategories.
  const TOPIC_CATEGORIES=[
    {icon:'rocket',      tint:'bg-[#FDECEF] text-[#DC183C]', name:'Starting a Business', desc:'From first idea to first paying customer — planning, compliance and launch.', subs:['Business Ideas','Business Planning','Entrepreneurship','Franchising','Side Hustle']},
    {icon:'settings',    tint:'bg-[#E4F5EE] text-[#29A37A]', name:'Managing a Business', desc:'Run a tighter, more compliant operation — finance, people and process.',      subs:['Finance & Accounting','HR & People','Operations','Compliance','Customer Service']},
    {icon:'trending-up', tint:'bg-[#FFF1E0] text-[#AE6B0A]', name:'Growing a Business',  desc:'Win customers and scale beyond the founder.',                                 subs:['Sales','Scaling','Exporting','Digital']}
  ];

  // SIGNATURE SERIES — Tshepho's four flagship editorial features. No subcategories.
  const SERIES_CATEGORIES=[
    {icon:'briefcase-business', tint:'bg-[#FDECEF] text-[#DC183C]', name:'Business Opportunities', desc:'Live deals, grants, tenders and partnership openings for South African SMEs.'},
    {icon:'user-round',         tint:'bg-[#FFF1E0] text-[#AE6B0A]', name:'Founder Focus',          desc:'Founder profiles, lived lessons and the moves that moved the needle.', href:'public-founder-focus-category.html'},
    {icon:'presentation',       tint:'bg-[#E4F5EE] text-[#29A37A]', name:'Funding Summit',         desc:'Event coverage, speaker takeaways and funding insights from the summit series.', href:'public-funding-summit-category.html'},
    {icon:'megaphone',          tint:'bg-[#F0F2F5] text-[#0C1F31]', name:'Brand Voice',            desc:'Editorial, brand-building playbooks and marketing perspectives from SA operators.'}
  ];

  // Card with subcategory chips (topic categories only)
  function topicCard(c){
    return `<div class="bg-white rounded-2xl border border-[#E7EBEF] p-6 card-lift flex flex-col">
      <div class="w-12 h-12 rounded-xl ${c.tint} grid place-items-center mb-4"><i data-lucide="${c.icon}" class="w-6 h-6"></i></div>
      <a href="public-category.html" class="font-jakarta font-extrabold text-xl hover:text-[#DC183C] transition">${esc(c.name)}</a>
      <p class="text-sm text-[#6A7581] mt-1.5 leading-relaxed">${esc(c.desc)}</p>
      <div class="flex flex-wrap gap-2 mt-4">
        ${c.subs.map(s=>`<a href="public-subcategory.html" class="subchip px-3 py-1.5 rounded-full text-xs font-semibold bg-[#FCFCFC] border border-[#E7EBEF] text-[#121A21]">${esc(s)}</a>`).join('')}
      </div>
      <a href="public-category.html" class="inline-flex items-center gap-1 text-sm font-bold text-[#DC183C] mt-5 pt-4 border-t border-[#E7EBEF] hover:gap-2 transition-all">View all <i data-lucide="arrow-right" class="w-4 h-4"></i></a>
    </div>`;
  }

  // Card without subcategories (signature editorial series)
  function seriesCard(c){
    const href = c.href || 'public-category.html';
    return `<div class="bg-white rounded-2xl border border-[#E7EBEF] p-6 card-lift flex flex-col">
      <div class="w-12 h-12 rounded-xl ${c.tint} grid place-items-center mb-4"><i data-lucide="${c.icon}" class="w-6 h-6"></i></div>
      <a href="${href}" class="font-jakarta font-extrabold text-xl hover:text-[#DC183C] transition">${esc(c.name)}</a>
      <p class="text-sm text-[#6A7581] mt-1.5 leading-relaxed flex-1">${esc(c.desc)}</p>
      <a href="${href}" class="inline-flex items-center gap-1 text-sm font-bold text-[#DC183C] mt-5 pt-4 border-t border-[#E7EBEF] hover:gap-2 transition-all">View all <i data-lucide="arrow-right" class="w-4 h-4"></i></a>
    </div>`;
  }

  document.getElementById('topicGrid').innerHTML  = TOPIC_CATEGORIES.map(topicCard).join('');
  document.getElementById('seriesGrid').innerHTML = SERIES_CATEGORIES.map(seriesCard).join('');

  const BRIEF={title:'Article Categories',sub:'Two-section directory · topic taxonomy on top, editorial series below · Newsletter excluded',purpose:'A directory for the SME Insights archive with two visually distinct groupings. <b>Content topics</b> (top) — the traditional editorial taxonomy with subcategory chips (Starting a Business, Managing a Business, Growing a Business). <b>Signature features</b> (below) — Tshepho\\u2019s four flagship editorial series with NO subcategories, they are standalone content streams (Business Opportunities, Founder Focus, Funding Summit, Brand Voice). Newsletter is intentionally excluded \\u2014 it has its own dedicated archive at <code>/newsletter/</code>.',data:'Two arrays. <b>TOPIC_CATEGORIES</b>: <code>{name, desc, icon, tint, subs[]}</code> \\u2014 with subcategory arrays that render as chips. <b>SERIES_CATEGORIES</b>: <code>{name, desc, icon, tint}</code> \\u2014 no subs field, cleaner card layout.',logic:'<b>Build as a normal WordPress page</b> hosting the directory \\u2014 <b>no taxonomy-archive template swap, no permalink changes, no redirects</b>. Existing category slugs stay exactly as they are on the live site. Cards in the topics section link to their category archives; subchips link to subcategory archives. Cards in the signature-features section link to a filtered archive by the series slug. Newsletter category is excluded from all queries \\u2014 has its own archive.',components:'Header · page hero (H1 \\u201cBrowse by Category\\u201d) · <b>Content topics</b> section (label + H2 + 3-col grid of full cards WITH subchips) · <b>Signature features</b> section (label + H2 + 4-col grid of full cards WITHOUT subchips) · footer.',specs:'<b>Container:</b> <code>max-w-7xl</code> = 1280px, centered, <code>px-4 sm:px-6</code>.<br/><b>Padding:</b> hero <code>pt-12 pb-14</code> (48px / 56px), main <code>py-12</code> (48px), vertical space between sections <code>space-y-14</code> = 56px.<br/><b>Background:</b> hero navy gradient (<code>#0C1F31</code>) with dot-pattern at 70% opacity; main <code>#FCFCFC</code>.<br/><br/><b>H1 (Browse by Category):</b> Plus Jakarta Sans weight 800 \\u2014 36px mobile / 48px desktop (<code>text-4xl sm:text-5xl</code>) \\u2014 colour <code>#FFFFFF</code> \\u2014 tracking-tight. <b>Must be H1</b>, not H2.<br/><b>Hero sub:</b> 18px (<code>text-lg</code>), <code>rgba(255,255,255,0.70)</code>, <code>max-w-2xl</code> = 672px.<br/><br/><b>Section labels:</b> 11px uppercase (<code>text-[11px]</code>), weight 700, letter-spacing widest, colour <code>#DC183C</code>.<br/><b>Section H2s:</b> 24px mobile / 30px desktop (<code>text-2xl sm:text-3xl</code>), Plus Jakarta Sans weight 800, colour <code>#121A21</code> (ink).<br/><br/><b>Category card:</b> <code>bg #FFFFFF</code>, border <code>#E7EBEF</code>, <code>rounded-2xl</code> = 16px, <code>p-6</code> = 24px. Card-lift hover shadow.<br/><b>Icon tile:</b> <b>48 \\u00d7 48px</b> (<code>w-12 h-12</code>), <code>rounded-xl</code> = 12px, tint from palette.<br/><b>Icon inside tile:</b> <b>24 \\u00d7 24px</b> (<code>w-6 h-6</code>) \\u2014 Lucide.<br/><b>Category name:</b> <b>20px</b> (<code>text-xl</code>), Plus Jakarta Sans weight 800, colour <code>#121A21</code> (ink), hover <code>#DC183C</code>.<br/><b>Description:</b> 14px (<code>text-sm</code>), colour <code>#6A7581</code> (muted).<br/><b>Subchip (topic cards only):</b> 12px (<code>text-xs</code>), weight 600, <code>bg #FCFCFC</code>, border <code>#E7EBEF</code>, <code>px-3 py-1.5</code>, rounded-full, colour <code>#121A21</code>.<br/><b>View all link:</b> 14px, weight 700, colour <code>#DC183C</code>, top-border <code>#E7EBEF</code>, arrow-right icon <code>w-4 h-4</code>.<br/><b>Grid:</b> topics <code>lg:grid-cols-3</code>, series <code>lg:grid-cols-4</code>, both <code>gap-5</code> = 20px, <code>sm:grid-cols-2</code> on mobile.<br/><b>Colour tokens used:</b> tints cycle through <code>#FDECEF/#DC183C</code> red, <code>#FFF1E0/#AE6B0A</code> amber, <code>#E4F5EE/#29A37A</code> green, <code>#F0F2F5/#0C1F31</code> navy-neutral.'};
  function toggleDevMode(){const on=document.body.classList.toggle('dev-on');const b=document.getElementById('devToggle');if(b)b.classList.toggle('on',on);if(on)showToast('Dev Mode on — tap any ⓘ for implementation notes.');lucide.createIcons();}
  function closeOverlay(id){const el=document.getElementById(id);if(!el)return;el.classList.remove('open');setTimeout(()=>{if(el&&el.parentNode)el.remove();},300);}
  function openBrief(){const b=BRIEF;const sec=(i,l,h)=>`<div class="px-6 py-4 border-t border-slate-100"><p class="text-[10px] font-bold uppercase tracking-widest text-[#DC183C] flex items-center gap-1.5 mb-2"><i data-lucide="${i}" class="w-3.5 h-3.5"></i>${l}</p><div class="text-sm text-slate-600 leading-relaxed">${h}</div></div>`;document.getElementById('overlay-root').innerHTML=`<div class="ov" id="ov"><div class="ov-bg" onclick="closeOverlay('ov')"></div><div class="drawer"><div class="sticky top-0 z-10 bg-[#0C1F31] text-white px-6 py-5 flex items-start justify-between"><div><p class="text-[10px] font-bold uppercase tracking-widest text-[#FF9900] mb-1">Dev Brief</p><h3 class="font-jakarta font-extrabold text-lg leading-tight">${b.title}</h3><p class="text-xs text-white/60 mt-1">${b.sub}</p></div><button onclick="closeOverlay('ov')" class="text-white/60 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button></div>${sec('target','Purpose',b.purpose)}${sec('database','Data model',b.data)}${sec('git-branch','Logic',b.logic)}${sec('ruler','Spec values',b.specs)}${sec('boxes','Components',b.components)}</div></div>`;requestAnimationFrame(()=>{const o=document.getElementById('ov');if(o)o.classList.add('open');});lucide.createIcons();}

  lucide.createIcons();
</script>
<script src="status.js"></script>
<script src="gate-links.js"></script>
</body>
</html>
