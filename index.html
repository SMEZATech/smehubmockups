<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI Mockups Directory</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#1d1e20',
                        primary: '#067256',
                        accent: '#00b090',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['"Plus Jakarta Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-dark text-white font-sans min-h-screen p-6 md:p-12">
    
    <div class="max-w-4xl mx-auto">
        <header class="mb-12 border-b border-gray-800 pb-8 mt-8">
            <h1 class="text-4xl md:text-5xl font-heading font-bold mb-4 text-white">Project Mockups</h1>
            <p class="text-gray-400 text-lg">Central directory for frontend UI designs and interactive prototypes.</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <a href="sme-events.html" class="block group bg-[#26282b] p-6 rounded-xl border border-gray-800 hover:border-primary transition-all duration-300 hover:shadow-[0_0_20px_rgba(6,114,86,0.15)] relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-primary to-accent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                
                <div class="flex items-center justify-between mb-4 mt-2">
                    <h2 class="text-2xl font-heading font-semibold text-white group-hover:text-accent transition-colors">SME Events Directory</h2>
                    <svg class="w-6 h-6 text-gray-500 group-hover:text-accent transition-colors transform group-hover:translate-x-1 duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </div>
                <p class="text-gray-400 text-sm leading-relaxed">Interactive directory featuring upcoming and past events, built with Vanilla JS and Tailwind CSS.</p>
                
                <div class="mt-6 flex gap-2">
                    <span class="text-xs font-medium bg-[#1d1e20] text-gray-300 px-3 py-1 rounded-full border border-gray-700">HTML</span>
                    <span class="text-xs font-medium bg-[#1d1e20] text-gray-300 px-3 py-1 rounded-full border border-gray-700">Tailwind</span>
                </div>
            </a>

            <div class="block bg-[#26282b]/30 p-6 rounded-xl border border-dashed border-gray-700">
                <div class="flex flex-col items-center justify-center h-full min-h-[180px] text-center">
                    <div class="w-10 h-10 rounded-full bg-gray-800 flex items-center justify-center mb-3">
                        <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    </div>
                    <p class="text-gray-500 font-medium">Future Mockup</p>
                    <p class="text-gray-600 text-sm mt-1">Ready for the next design</p>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
