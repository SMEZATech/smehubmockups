<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SME South Africa — Mockup Hub</title>
  <meta name="description" content="SME South Africa mockups — finalised work, ready for review." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="status.js"></script>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: {
      jakarta: ['Plus Jakarta Sans', 'sans-serif'], inter: ['Inter', 'system-ui', 'sans-serif'], mono:['monospace']
    } } } };
  </script>
  <style>
    html, body { font-family: 'Inter', system-ui, sans-serif; height:100%; }
    .font-jakarta { font-family: 'Plus Jakarta Sans', sans-serif; letter-spacing: 0.005em; }
    .font-mono { font-family: monospace; }
    .no-scrollbar::-webkit-scrollbar { display:none; } .no-scrollbar { -ms-overflow-style:none; scrollbar-width:none; }
    .nav-item.active { background:#FDECEF; color:#DC183C; }
    .nav-item.active .ni-dot { opacity:1; }
    .vp-btn.active { background:#0C1F31; color:#fff; }
    #sidebar { transition: transform .3s cubic-bezier(.2,.7,.2,1); }
    @media (max-width: 1023px){
      #sidebar { position:fixed; z-index:50; transform:translateX(-100%); }
      #sidebar.open { transform:translateX(0); }
    }
    .frame-wrap { transition: max-width .35s cubic-bezier(.2,.7,.2,1); }
    /* Collapsible sidebar sections */
    .nav-sec > summary { list-style:none; cursor:pointer; }
    .nav-sec > summary::-webkit-details-marker { display:none; }
    .nav-sec > summary .chev { transition: transform .2s ease; }
    .nav-sec[open] > summary .chev { transform: rotate(90deg); }
    .nav-sec > summary:hover { background: rgba(255,255,255,0.04); }
    .nav-sec[data-dev="1"] > summary { background: rgba(59,130,246,0.06); }
    .nav-sec[data-dev="1"][open] > summary { background: rgba(59,130,246,0.10); }
  </style>
</head>
<body class="bg-[#0C1F31] text-[#121A21] antialiased h-full overflow-hidden">

<div class="flex h-full">
  <!-- ===================== SIDEBAR ===================== -->
  <aside id="sidebar" class="w-72 shrink-0 bg-[#0C1F31] text-white h-full flex flex-col border-r border-white/10">
    <div class="px-5 h-16 flex items-center gap-2.5 border-b border-white/10 shrink-0">
      <span class="w-9 h-9 rounded-lg bg-white grid place-items-center shrink-0"><img src="assets/logo-icon.png" alt="SME South Africa" class="w-7 h-7" /></span>
      <div class="leading-tight">
        <p class="font-jakarta font-extrabold text-[15px]">SME South Africa</p>
        <p class="text-[11px] text-white/50 font-mono">Mockup Hub</p>
      </div>
    </div>
    <div class="px-4 pt-3 pb-1 shrink-0 space-y-1.5">
      <div class="flex items-center gap-2 text-[10px] text-white/45 bg-white/5 border border-white/10 rounded-lg px-3 py-2">
        <i data-lucide="eye" class="w-3.5 h-3.5 text-[#29A37A]"></i>
        <span>Finalised work — <span id="liveCount" class="text-white/70 font-semibold">…</span></span>
      </div>
      <button id="devPill" type="button" onclick="scrollToDev()" class="hidden w-full items-center gap-2 text-[10px] text-white/55 bg-[#3B82F6]/10 border border-[#3B82F6]/25 hover:bg-[#3B82F6]/15 rounded-lg px-3 py-2 transition text-left">
        <i data-lucide="code-2" class="w-3.5 h-3.5 text-[#3B82F6]"></i>
        <span>Dev builds — <span id="devCount" class="text-white/80 font-semibold">0 of 0</span></span>
        <i data-lucide="arrow-down" class="w-3 h-3 ml-auto text-white/40"></i>
      </button>
    </div>
    <nav id="nav" class="flex-1 overflow-y-auto no-scrollbar px-3 py-3 space-y-2"></nav>
    <div class="px-5 py-4 border-t border-white/10 text-[11px] text-white/40 shrink-0">
      <p class="text-white/70 font-semibold">© 2026 Tshepho Joel</p>
      <p class="mt-0.5">All rights reserved. Proprietary &amp; confidential.</p>
      <p class="mt-2" id="lastPub">Consolidated mockups · June 2026</p>
    </div>
  </aside>

  <!-- mobile sidebar backdrop -->
  <div id="backdrop" onclick="closeSidebar()" class="hidden fixed inset-0 bg-black/50 z-40 lg:hidden"></div>

  <!-- ===================== MAIN ===================== -->
  <div class="flex-1 flex flex-col h-full bg-[#FCFCFC] min-w-0">
    <!-- Top bar -->
    <header class="h-16 bg-white border-b border-[#E7EBEF] flex items-center gap-3 px-4 sm:px-5 shrink-0">
      <button onclick="openSidebar()" class="lg:hidden w-9 h-9 grid place-items-center rounded-lg hover:bg-slate-100 text-slate-600"><i data-lucide="menu" class="w-5 h-5"></i></button>
      <div class="min-w-0">
        <p id="curGroup" class="text-[11px] font-bold uppercase tracking-widest text-[#AE6B0A]">Public site</p>
        <h1 id="curTitle" class="font-jakarta font-extrabold text-lg leading-tight truncate">Home</h1>
      </div>

      <div class="ml-auto flex items-center gap-2">
        <!-- Viewport toggle -->
        <div class="hidden sm:flex items-center gap-1 bg-slate-100 rounded-full p-1">
          <button onclick="setVP('full')"   id="vp-full"   class="vp-btn active px-3 h-8 rounded-full text-xs font-bold flex items-center gap-1.5" title="Desktop"><i data-lucide="monitor" class="w-4 h-4"></i></button>
          <button onclick="setVP('tablet')" id="vp-tablet" class="vp-btn px-3 h-8 rounded-full text-xs font-bold flex items-center gap-1.5" title="Tablet"><i data-lucide="tablet" class="w-4 h-4"></i></button>
          <button onclick="setVP('mobile')" id="vp-mobile" class="vp-btn px-3 h-8 rounded-full text-xs font-bold flex items-center gap-1.5" title="Mobile"><i data-lucide="smartphone" class="w-4 h-4"></i></button>
        </div>
        <div id="devBar" class="hidden items-center gap-2"></div>
        <button onclick="reloadFrame()" class="w-9 h-9 grid place-items-center rounded-full hover:bg-slate-100 text-slate-600" title="Reload"><i data-lucide="rotate-cw" class="w-4 h-4"></i></button>
        <a id="openTab" href="public-home.html" target="_blank" class="inline-flex items-center gap-1.5 px-3.5 h-9 rounded-full bg-[#DC183C] hover:bg-[#B0142F] text-white text-sm font-bold transition"><i data-lucide="external-link" class="w-4 h-4"></i><span class="hidden sm:inline">Open standalone</span></a>
      </div>
    </header>

    <!-- Frame area -->
    <div class="flex-1 overflow-auto bg-slate-200/60 p-0 sm:p-4">
      <div id="frameWrap" class="frame-wrap mx-auto h-full bg-white sm:rounded-xl sm:shadow-xl overflow-hidden" style="max-width:100%">
        <iframe id="frame" src="public-home.html" title="Mockup preview" class="w-full h-full border-0"></iframe>
      </div>
    </div>
  </div>
</div>

<script>
  const STATUS = window.MOCKUP_STATUS || {};
  const DEV = window.MOCKUP_DEV || {};
  const GROUP_OVERRIDES = window.MOCKUP_GROUPS || {};
  const DEVMETA = { 'pending-review':{label:'Pending review',c:'#FF9900'}, 'reviewed':{label:'Reviewed',c:'#3B82F6'}, 'approved':{label:'Approved',c:'#29A37A'} };
  const isLive = f => STATUS[f] === 'finalised';
  const DEFAULT_NAV = [
    { group:'Global', tag:'Chrome', accent:'#6A7581', icon:'layout-template', items:[
      { label:'Header & Footer', file:'chrome-preview.html', icon:'layout-template' }
    ]},
    { group:'Single Pages', tag:'Pages', accent:'#FF9900', icon:'file-text', items:[
      { label:'Home',                   file:'public-home.html',                   icon:'home' },
      { label:'About',                  file:'public-about.html',                  icon:'building-2' },
      { label:'Contact',                file:'public-contact.html',                icon:'mail' },
      { label:'Advertise',              file:'public-advertise.html',              icon:'megaphone' },
      { label:'Privacy',                file:'public-privacy.html',                icon:'shield' },
      { label:'Terms',                  file:'public-terms.html',                  icon:'file-text' },
      { label:'Refunds',                file:'public-refunds.html',                icon:'rotate-ccw' },
      { label:'POPIA',                  file:'public-popia.html',                  icon:'lock' },
      { label:'Advertising Disclosure', file:'public-advertising-disclosure.html', icon:'info' },
      { label:'Sustainability',         file:'public-sustainability.html',         icon:'leaf' },
      { label:'Author page',            file:'public-author.html',                 icon:'feather' },
      { label:'Pricing / Plans',        file:'public-pricing.html',                icon:'crown' },
      { label:'Login / Sign up',        file:'public-auth.html',                   icon:'log-in' }
    ]},
    { group:'Articles', tag:'Editorial', accent:'#DC183C', icon:'newspaper', items:[
      { label:'Articles',              file:'public-articles.html',           icon:'newspaper' },
      { label:'Single Article',        file:'public-article.html',            icon:'file-text' },
      { label:'Categories Archive',    file:'public-article-categories.html', icon:'layout-grid' },
      { label:'Articles Categories',   file:'public-category.html',           icon:'folder' },
      { label:'Articles Subcategories',file:'public-subcategory.html',        icon:'folder-tree' },
      { label:'Founder Focus',         file:'public-founder-focus.html',      icon:'sparkles' }
    ]},
    { group:'Funding', tag:'Money', accent:'#29A37A', icon:'banknote', items:[
      { label:'Funding',          file:'public-funding.html',          icon:'banknote' },
      { label:'Funding Articles', file:'public-funding-category.html', icon:'newspaper' },
      { label:'Loan Option',      file:'public-loan-option.html',      icon:'landmark' }
    ]},
    { group:'Resources', tag:'Library', accent:'#3B82F6', icon:'folder-open', items:[
      { label:'Resources',          file:'public-resources.html',         icon:'folder-open' },
      { label:'Resource Category',  file:'public-resource-category.html', icon:'folder' },
      { label:'Single Resource',    file:'public-resource.html',          icon:'file' },
      { label:'Guides',             file:'public-guides.html',            icon:'book-open' },
      { label:'Single Guide',       file:'public-guide.html',             icon:'book' }
    ]},
    { group:'Solutions', tag:'Marketplace', accent:'#FF9900', icon:'layout-grid', items:[
      { label:'Solutions',         file:'public-solutions.html',         icon:'layout-grid' },
      { label:'Solution Category', file:'public-solution-category.html', icon:'folder' },
      { label:'Brands Category',   file:'public-brands.html',            icon:'store' },
      { label:'Brand Review',      file:'public-brand.html',             icon:'badge-check' }
    ]},
    { group:'Community', tag:'Logged-in', accent:'#DC183C', icon:'users', items:[
      { label:'Feed',             file:'member-hub.html',     icon:'rss' },
      { label:'Single Feed',      file:'single-post.html',    icon:'message-square' },
      { label:'Members',          file:'members.html',        icon:'users' },
      { label:'Group',            file:'single-group.html',   icon:'users-round' },
      { label:'Forum',            file:'forums.html',         icon:'messages-square' },
      { label:'Account Settings', file:'member-account.html', icon:'settings' }
    ]},
    { group:'Events', tag:'Calendar', accent:'#FF9900', icon:'calendar', items:[
      { label:'Events', file:'events.html', icon:'calendar' }
    ]},
    { group:'Newsletter', tag:'Comms', accent:'#3B82F6', icon:'mail', items:[
      { label:'Newsletter',       file:'newsletter.html',       icon:'mail' },
      { label:'Newsletter Issue', file:'newsletter-issue.html', icon:'mail-open' },
      { label:'Podcast',          file:'podcast.html',          icon:'mic-2' }
    ]},
    { group:'Shop', tag:'Commerce', accent:'#29A37A', icon:'shopping-bag', items:[
      { label:'Shop',     file:'public-shop.html',     icon:'shopping-bag' },
      { label:'Checkout', file:'public-checkout.html', icon:'credit-card' }
    ]},
    { group:'Help and System', tag:'Support', accent:'#3B82F6', icon:'help-circle', items:[
      { label:'Help Center',    file:'public-help.html',         icon:'help-circle' },
      { label:'Help Article',   file:'public-help-article.html', icon:'file-text' },
      { label:'Search results', file:'public-search.html',       icon:'search' },
      { label:'404 page',       file:'public-404.html',          icon:'file-x' }
    ]},
    { group:'Reference', tag:'Brand', accent:'#6A7581', icon:'palette', items:[
      { label:'Handbook',      file:'handbook.html',     icon:'book-open' },
      { label:'Brand CI 2026', file:'brand_ci.html',     icon:'palette' },
      { label:'Icon Library',  file:'public-icons.html', icon:'shapes' }
    ]}
  ];

  // Apply MOCKUP_GROUPS overrides: pull file out of its default group, append to the named group (create if needed).
  function buildNavFromOverrides(){
    const nav = DEFAULT_NAV.map(sec => ({ ...sec, items: sec.items.slice() }));
    const sectionByName = {};
    nav.forEach(sec => { sectionByName[sec.group] = sec; });
    Object.keys(GROUP_OVERRIDES).forEach(file => {
      const targetName = GROUP_OVERRIDES[file];
      if(!targetName) return;
      let movedItem = null;
      for(const sec of nav){
        const idx = sec.items.findIndex(it => it.file === file);
        if(idx >= 0){ movedItem = sec.items.splice(idx, 1)[0]; break; }
      }
      if(!movedItem) movedItem = { label:file, file, icon:'file' };
      if(!sectionByName[targetName]){
        const newSec = { group:targetName, tag:'Custom', accent:'#6A7581', icon:'folder', items:[] };
        nav.push(newSec);
        sectionByName[targetName] = newSec;
      }
      sectionByName[targetName].items.push(movedItem);
    });
    return nav;
  }
  const NAV = buildNavFromOverrides();

  // Map file → NAV entry (so DEV section can look up label/group/accent)
  const FILE_INDEX = {};
  NAV.forEach(sec => sec.items.forEach(it => { FILE_INDEX[it.file] = { ...it, group:sec.group, accent:sec.accent }; }));

  // localStorage helpers for section open/close persistence
  function secKey(g){ return 'smeNav:'+g.replace(/\s+/g,'_').toLowerCase(); }
  function getSecState(g, dflt){ try{ const v=localStorage.getItem(secKey(g)); if(v===null) return dflt; return v==='1'; }catch(e){ return dflt; } }
  function setSecState(g, open){ try{ localStorage.setItem(secKey(g), open?'1':'0'); }catch(e){} }

  function scrollToDev(){
    const el = document.querySelector('[data-dev="1"]');
    if(!el) return;
    if(!el.open){ el.open = true; setSecState('Development', true); }
    el.scrollIntoView({ behavior:'smooth', block:'start' });
  }

  function esc(s){ return String(s).replace(/'/g,"\\'"); }

  // Compute newly-finalised files (finalised now, but not seen-as-finalised yet by this user).
  function getSeenFinalised(){ try{ return JSON.parse(localStorage.getItem('smeSeenFinalised')||'{}'); }catch(e){ return {}; } }
  function setSeenFinalised(map){ try{ localStorage.setItem('smeSeenFinalised', JSON.stringify(map)); }catch(e){} }
  function computeNewlyFinalised(){
    const seen = getSeenFinalised(); const out = [];
    NAV.forEach(sec => sec.items.forEach(it => { if(isLive(it.file) && !seen[it.file]) out.push({ file:it.file, label:it.label, group:sec.group }); }));
    return out;
  }
  function markSeenFinalised(files){
    const seen = getSeenFinalised();
    files.forEach(f => { seen[f] = true; });
    setSeenFinalised(seen);
  }
  function showFinalisedToast(label){
    let host = document.getElementById('finalToastHost');
    if(!host){ host = document.createElement('div'); host.id='finalToastHost'; host.className='fixed bottom-6 right-6 z-[70] space-y-2'; document.body.appendChild(host); }
    const t = document.createElement('div');
    t.className = 'flex items-center gap-2 bg-[#0C1F31] text-white border border-[#29A37A]/40 rounded-lg pl-3 pr-2 py-2 shadow-xl text-sm font-semibold';
    t.style.borderLeft = '3px solid #29A37A';
    t.innerHTML = `<i data-lucide="check-circle" class="w-4 h-4" style="color:#29A37A"></i><span class="font-jakarta">${label} is now finalised</span><button class="ml-2 w-6 h-6 grid place-items-center rounded hover:bg-white/10 text-white/60"><i data-lucide="x" class="w-3.5 h-3.5"></i></button>`;
    t.querySelector('button').addEventListener('click', ()=> t.remove());
    host.appendChild(t); lucide.createIcons();
    setTimeout(()=>{ if(t.parentNode) t.remove(); }, 3000);
  }

  function buildNav(currentFile){
    let total=0, totalFinalised=0;
    NAV.forEach(sec=> sec.items.forEach(it=>{
      if(it.file === 'chrome-preview.html') return;
      total++; if(isLive(it.file)) totalFinalised++;
    }));

    const devFiles = Object.keys(DEV || {});
    let html='';

    // Determine which section holds the current file (for default-expand).
    const currentSection = currentFile && FILE_INDEX[currentFile] ? FILE_INDEX[currentFile].group : null;
    const currentIsDev = !!(currentFile && DEV[currentFile]);

    // Sections containing newly-finalised items bubble to top (after Development).
    const newlyFinalised = computeNewlyFinalised();
    const bubbleGroups = {};
    newlyFinalised.forEach(n => { bubbleGroups[n.group] = true; });

    // ---- DEVELOPMENT section — ONLY external dev/staging URL builds ----
    if(devFiles.length){
      const devOpen = currentIsDev;
      html += `<details class="nav-sec rounded-lg border border-[#3B82F6]/20 bg-white/[0.02]" data-dev="1" data-group="Development" ${devOpen?'open':''}>
        <summary class="flex items-center gap-2 px-3 py-2.5 rounded-lg">
          <i data-lucide="chevron-right" class="chev w-3.5 h-3.5 text-white/50 shrink-0"></i>
          <i data-lucide="code-2" class="w-4 h-4 text-[#3B82F6] shrink-0"></i>
          <span class="text-[11px] font-bold uppercase tracking-widest text-white/80">Development</span>
          <span class="ml-auto text-[9px] font-bold uppercase tracking-wider px-1.5 py-0.5 rounded-full bg-[#3B82F6]/20 text-[#3B82F6]">${devFiles.length} build${devFiles.length===1?'':'s'}</span>
        </summary>
        <div class="px-2 pb-2 pt-1 space-y-0.5">
          ${devFiles.map(file=>{
            const meta = FILE_INDEX[file] || { label:file, icon:'file', group:'Development', accent:'#3B82F6' };
            const devInfo = DEV[file];
            const dm = DEVMETA[devInfo.status] || { label:devInfo.status, c:'#6A7581' };
            return `<button onclick="loadDev('${file}')" data-devfile="${file}" class="nav-item w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-semibold text-white/85 hover:bg-white/5 hover:text-white transition text-left">
                <i data-lucide="${meta.icon}" class="w-4 h-4 shrink-0"></i>
                <span class="truncate">${meta.label}</span>
                <span class="ml-auto shrink-0 inline-flex items-center gap-1 text-[8px] font-bold uppercase tracking-wider px-1.5 py-0.5 rounded-full" style="background:${dm.c}26;color:${dm.c}">
                  <span class="w-1.5 h-1.5 rounded-full" style="background:${dm.c}"></span>Dev · ${dm.label}
                </span>
              </button>`;
          }).join('')}
        </div>
      </details>`;
    }

    // ---- Standard NAV sections — bubble groups with newly-finalised items first ----
    const sortedNav = NAV.slice().sort((a,b)=>{
      const aHas = bubbleGroups[a.group] ? 1 : 0;
      const bHas = bubbleGroups[b.group] ? 1 : 0;
      return bHas - aHas; // newly-finalised groups first
    });

    sortedNav.forEach(sec=>{
      const finalisedItems = sec.items.filter(it=>isLive(it.file));
      const pendingItems   = sec.items.filter(it=>!isLive(it.file));
      const open = getSecState(sec.group, sec.group === currentSection);
      // Note: default-collapsed unless this section holds the current file.

      const finalisedCount = finalisedItems.length;
      const pendingCount   = pendingItems.length;
      const countLabel = `${finalisedCount} finalised, ${pendingCount} pending`;

      html += `<details class="nav-sec rounded-lg border border-white/5" data-group="${sec.group}" ${open?'open':''}>
        <summary class="flex items-center gap-2 px-3 py-2.5 rounded-lg">
          <i data-lucide="chevron-right" class="chev w-3.5 h-3.5 text-white/40 shrink-0"></i>
          <i data-lucide="${sec.icon}" class="w-4 h-4 shrink-0" style="color:${sec.accent}"></i>
          <span class="text-[11px] font-bold uppercase tracking-widest text-white/75">${sec.group}</span>
          <span class="ml-auto text-[9px] font-semibold text-white/40">${finalisedCount}/${sec.items.length}</span>
        </summary>
        <div class="px-2 pb-2 pt-0.5">
          <p class="px-3 pb-1.5 text-[9px] uppercase tracking-wider text-white/30 font-semibold">${countLabel}</p>
          <div class="space-y-0.5">
            ${finalisedItems.map(it=>`<button onclick="load('${it.file}','${esc(sec.group)}','${esc(it.label)}','${sec.accent}')" data-file="${it.file}" class="nav-item w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-semibold text-white/80 hover:bg-white/5 hover:text-white transition text-left">
                  <i data-lucide="${it.icon}" class="w-4 h-4 shrink-0"></i><span class="truncate">${it.label}</span>
                  ${DEV[it.file]?`<span class="ml-auto shrink-0 inline-flex items-center gap-1 text-[8px] font-bold uppercase tracking-wider px-1.5 py-0.5 rounded-full" style="background:${(DEVMETA[DEV[it.file].status]||{c:'#6A7581'}).c}26;color:${(DEVMETA[DEV[it.file].status]||{c:'#6A7581'}).c}"><i data-lucide="code-2" class="w-2.5 h-2.5"></i> Dev</span>`:`<span class="ni-dot ml-auto w-1.5 h-1.5 rounded-full bg-[#29A37A] opacity-0"></span>`}
                </button>`).join('')}
            ${pendingItems.map(it=>`<div title="Coming soon — not yet finalised" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-semibold text-white/25 cursor-not-allowed select-none">
                  <i data-lucide="${it.icon}" class="w-4 h-4 shrink-0"></i><span class="truncate">${it.label}</span>
                  <span class="ml-auto text-[8px] font-bold uppercase tracking-wider px-1.5 py-0.5 rounded-full bg-white/5 text-white/30 flex items-center gap-1 shrink-0"><i data-lucide="lock" class="w-2.5 h-2.5"></i> Soon</span>
                </div>`).join('')}
          </div>
        </div>
      </details>`;
    });

    const navEl = document.getElementById('nav');
    navEl.innerHTML = html;

    // Wire up persistence on toggle
    navEl.querySelectorAll('details.nav-sec').forEach(d=>{
      d.addEventListener('toggle', ()=> setSecState(d.dataset.group, d.open));
    });

    lucide.createIcons();
    const lc = document.getElementById('liveCount'); if(lc) lc.textContent = totalFinalised+' of '+total+' finalised';
    const dp = document.getElementById('devPill'), dc = document.getElementById('devCount');
    if(dp && dc){
      if(devFiles.length){ dp.classList.remove('hidden'); dp.classList.add('flex'); dc.textContent = devFiles.length+' of '+total; }
      else { dp.classList.add('hidden'); dp.classList.remove('flex'); }
    }

    // Fire one-time toasts for newly-finalised items, then mark them seen.
    if(newlyFinalised.length){
      newlyFinalised.forEach((n,i)=> setTimeout(()=> showFinalisedToast(n.label), i*350));
      markSeenFinalised(newlyFinalised.map(n=>n.file));
    }
  }

  // Dev lane — bypass the finalised gate. Loads the staging URL (not the mockup file).
  function loadDev(file){
    const meta = FILE_INDEX[file] || { label:file, group:'Development', accent:'#3B82F6' };
    const devInfo = DEV[file];
    const stagingUrl = devInfo && devInfo.url ? devInfo.url : file;
    _doLoad(file, 'Development', meta.label, '#3B82F6', stagingUrl);
  }
  function load(file, group, label, accent){
    if(!isLive(file)) return; // gate: only finalised mockups open via standard lane
    _doLoad(file, group, label, accent, file);
  }
  function _doLoad(file, group, label, accent, srcUrl){
    document.getElementById('frame').src = srcUrl || file;
    document.getElementById('curGroup').textContent = group;
    document.getElementById('curGroup').style.color = accent || '#AE6B0A';
    document.getElementById('curTitle').textContent = label;
    document.getElementById('openTab').href = srcUrl || file;
    const dev = DEV[file], db = document.getElementById('devBar');
    if(db){
      if(dev){ const dm = DEVMETA[dev.status] || {label:dev.status, c:'#6A7581'};
        db.innerHTML = `<span class="hidden md:inline-flex items-center gap-1.5 px-2.5 h-8 rounded-full text-[11px] font-bold" style="background:${dm.c}1f;color:${dm.c}"><span class="w-1.5 h-1.5 rounded-full" style="background:${dm.c}"></span>${dm.label}</span>`+
          `<a href="compare.html?m=${encodeURIComponent(file)}" class="inline-flex items-center gap-1.5 px-3 h-8 rounded-full bg-slate-100 hover:bg-slate-200 text-[#121A21] text-xs font-bold transition" title="Compare dev build vs mockup"><i data-lucide="git-compare" class="w-4 h-4"></i><span class="hidden sm:inline">Compare</span></a>`+
          `<a href="${dev.url}" target="_blank" rel="noopener" class="inline-flex items-center gap-1.5 px-3 h-8 rounded-full bg-[#0C1F31] hover:bg-[#16314a] text-white text-xs font-bold transition" title="Open the developer build"><i data-lucide="external-link" class="w-4 h-4"></i><span class="hidden sm:inline">Dev build</span></a>`;
        db.classList.remove('hidden'); db.classList.add('flex'); lucide.createIcons();
      } else { db.classList.add('hidden'); db.classList.remove('flex'); db.innerHTML=''; }
    }
    document.querySelectorAll('.nav-item').forEach(n=> n.classList.toggle('active', n.dataset.file===file || n.dataset.devfile===file));
    if(location.hash.slice(1) !== file) history.replaceState(null,'','#'+file);
    closeSidebar();
  }
  function reloadFrame(){ const f=document.getElementById('frame'); f.src = f.src; }

  function setVP(mode){
    const wrap = document.getElementById('frameWrap');
    const map = { full:'100%', tablet:'820px', mobile:'390px' };
    wrap.style.maxWidth = map[mode];
    ['full','tablet','mobile'].forEach(m=> document.getElementById('vp-'+m).classList.toggle('active', m===mode));
  }

  function openSidebar(){ document.getElementById('sidebar').classList.add('open'); document.getElementById('backdrop').classList.remove('hidden'); }
  function closeSidebar(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('backdrop').classList.add('hidden'); }

  // Init — restore from hash (dev lane bypasses gate), else first finalised.
  try{ if(window.MOCKUP_STATUS_PUBLISHED){ document.getElementById('lastPub').textContent = 'Updated '+new Date(window.MOCKUP_STATUS_PUBLISHED).toLocaleDateString('en-ZA',{day:'numeric',month:'short',year:'numeric'}); } }catch(e){}
  (function initLoad(){
    const hash = location.hash.slice(1);
    // hash + finalised → normal load
    if(hash){
      let found = null, grp = null, acc = null;
      NAV.forEach(sec=> sec.items.forEach(it=>{ if(it.file===hash && isLive(it.file)){ found=it; grp=sec.group; acc=sec.accent; } }));
      if(found){ buildNav(found.file); load(found.file, grp, found.label, acc); return; }
      // hash + dev entry → dev lane (bypass gate)
      if(DEV && DEV[hash]){ buildNav(hash); loadDev(hash); return; }
    }
    // default: first finalised item
    for(const sec of NAV){ for(const it of sec.items){ if(isLive(it.file)){ buildNav(it.file); load(it.file, sec.group, it.label, sec.accent); return; } } }
    // nothing finalised — build nav, clear the frame
    buildNav(null);
    document.getElementById('frame').removeAttribute('src');
  })();
  lucide.createIcons();
</script>
</body>
</html>
