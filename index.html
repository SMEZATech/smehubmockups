<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SME South Africa — Mockup Hub</title>
  <meta name="description" content="One link to every SME South Africa mockup — public marketing site and member community hub, side by side." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: {
      jakarta: ['Plus Jakarta Sans', 'sans-serif'], inter: ['Inter', 'system-ui', 'sans-serif'], mono:['monospace']
    } } } };
  </script>
  <style>
    html, body { font-family: 'Inter', system-ui, sans-serif; height:100%; }
    .font-jakarta { font-family: 'Plus Jakarta Sans', sans-serif; letter-spacing: 0.005em; }
    .font-mono { font-family: monospace; }
    .no-scrollbar::-webkit-scrollbar { display:none; } .no-scrollbar { -ms-overflow-style:none; scrollbar-width:none; }
    .nav-item.active { background:#FDECEF; color:#DC183C; }
    .nav-item.active .ni-dot { opacity:1; }
    .vp-btn.active { background:#0C1F31; color:#fff; }
    #sidebar { transition: transform .3s cubic-bezier(.2,.7,.2,1); }
    @media (max-width: 1023px){
      #sidebar { position:fixed; z-index:50; transform:translateX(-100%); }
      #sidebar.open { transform:translateX(0); }
    }
    .frame-wrap { transition: max-width .35s cubic-bezier(.2,.7,.2,1); }
  </style>
</head>
<body class="bg-[#0C1F31] text-[#121A21] antialiased h-full overflow-hidden">

<div class="flex h-full">
  <!-- ===================== SIDEBAR ===================== -->
  <aside id="sidebar" class="w-72 shrink-0 bg-[#0C1F31] text-white h-full flex flex-col border-r border-white/10">
    <div class="px-5 h-16 flex items-center gap-2.5 border-b border-white/10 shrink-0">
      <span class="w-9 h-9 rounded-lg bg-white grid place-items-center shrink-0"><img src="assets/logo-icon.png" alt="SME South Africa" class="w-7 h-7" /></span>
      <div class="leading-tight">
        <p class="font-jakarta font-extrabold text-[15px]">SME South Africa</p>
        <p class="text-[11px] text-white/50 font-mono">Mockup Hub</p>
      </div>
    </div>
    <nav id="nav" class="flex-1 overflow-y-auto no-scrollbar px-3 py-4 space-y-6"></nav>
    <div class="px-5 py-4 border-t border-white/10 text-[11px] text-white/40 shrink-0">
      <p class="text-white/70 font-semibold">© 2026 Tshepho Joel</p>
      <p class="mt-0.5">All rights reserved. Proprietary &amp; confidential.</p>
      <p class="mt-2">Consolidated mockups · June 2026</p>
    </div>
  </aside>

  <!-- mobile sidebar backdrop -->
  <div id="backdrop" onclick="closeSidebar()" class="hidden fixed inset-0 bg-black/50 z-40 lg:hidden"></div>

  <!-- ===================== MAIN ===================== -->
  <div class="flex-1 flex flex-col h-full bg-[#FCFCFC] min-w-0">
    <!-- Top bar -->
    <header class="h-16 bg-white border-b border-[#E7EBEF] flex items-center gap-3 px-4 sm:px-5 shrink-0">
      <button onclick="openSidebar()" class="lg:hidden w-9 h-9 grid place-items-center rounded-lg hover:bg-slate-100 text-slate-600"><i data-lucide="menu" class="w-5 h-5"></i></button>
      <div class="min-w-0">
        <p id="curGroup" class="text-[11px] font-bold uppercase tracking-widest text-[#AE6B0A]">Public site</p>
        <h1 id="curTitle" class="font-jakarta font-extrabold text-lg leading-tight truncate">Home</h1>
      </div>

      <div class="ml-auto flex items-center gap-2">
        <!-- Viewport toggle -->
        <div class="hidden sm:flex items-center gap-1 bg-slate-100 rounded-full p-1">
          <button onclick="setVP('full')"   id="vp-full"   class="vp-btn active px-3 h-8 rounded-full text-xs font-bold flex items-center gap-1.5" title="Desktop"><i data-lucide="monitor" class="w-4 h-4"></i></button>
          <button onclick="setVP('tablet')" id="vp-tablet" class="vp-btn px-3 h-8 rounded-full text-xs font-bold flex items-center gap-1.5" title="Tablet"><i data-lucide="tablet" class="w-4 h-4"></i></button>
          <button onclick="setVP('mobile')" id="vp-mobile" class="vp-btn px-3 h-8 rounded-full text-xs font-bold flex items-center gap-1.5" title="Mobile"><i data-lucide="smartphone" class="w-4 h-4"></i></button>
        </div>
        <button onclick="reloadFrame()" class="w-9 h-9 grid place-items-center rounded-full hover:bg-slate-100 text-slate-600" title="Reload"><i data-lucide="rotate-cw" class="w-4 h-4"></i></button>
        <a id="openTab" href="public-home.html" target="_blank" class="inline-flex items-center gap-1.5 px-3.5 h-9 rounded-full bg-[#DC183C] hover:bg-[#B0142F] text-white text-sm font-bold transition"><i data-lucide="external-link" class="w-4 h-4"></i><span class="hidden sm:inline">Open standalone</span></a>
      </div>
    </header>

    <!-- Frame area -->
    <div class="flex-1 overflow-auto bg-slate-200/60 p-0 sm:p-4">
      <div id="frameWrap" class="frame-wrap mx-auto h-full bg-white sm:rounded-xl sm:shadow-xl overflow-hidden" style="max-width:100%">
        <iframe id="frame" src="public-home.html" title="Mockup preview" class="w-full h-full border-0"></iframe>
      </div>
    </div>
  </div>
</div>

<script>
  const LIVE = 'https://shine-better-web.lovable.app';
  const NAV = [
    { group:'Public site', tag:'Logged-out', accent:'#FF9900', items:[
      { label:'Home',      file:'public-home.html',      icon:'home' },
      { label:'Articles',  file:'public-articles.html',  icon:'newspaper' },
      { label:'Resources', file:'public-resources.html', icon:'folder-open' },
      { label:'Funding',   file:'public-funding.html',   icon:'banknote' },
      { label:'Solutions', file:'public-solutions.html', icon:'layout-grid' },
      { label:'Shop',      file:'public-shop.html',      icon:'shopping-bag' }
    ]},
    { group:'Member hub', tag:'Logged-in', accent:'#DC183C', items:[
      { label:'Community Feed',     file:'member-hub.html',     icon:'rss' },
      { label:'Members',            file:'members.html',        icon:'users' },
      { label:'Groups',             file:'groups.html',         icon:'layout-grid' },
      { label:'Single group',       file:'single-group.html',   icon:'users-round' },
      { label:'Forums',             file:'forums.html',         icon:'messages-square' },
      { label:'Account & settings', file:'member-account.html', icon:'settings' }
    ]},
    { group:'Content modules', tag:'In repo', accent:'#FF9900', items:[
      { label:'Events',              file:'events.html',                               icon:'calendar' },
      { label:'Newsletter',          file:'newsletter.html',                           icon:'mail' },
      { label:'Podcast',             file:'podcast.html',                              icon:'mic-2' }
    ]},
    { group:'Reference', tag:'Brand', accent:'#6A7581', items:[
      { label:'Brand CI 2026',         file:'brand_ci.html',                           icon:'palette' }
    ]}
  ];

  function buildNav(){
    document.getElementById('nav').innerHTML = NAV.map(sec=>`
      <div>
        <div class="flex items-center justify-between px-2 mb-2">
          <p class="text-[10px] font-bold uppercase tracking-widest text-white/40">${sec.group}</p>
          <span class="text-[9px] font-bold uppercase tracking-wider px-1.5 py-0.5 rounded-full" style="background:${sec.accent}22;color:${sec.accent}">${sec.tag}</span>
        </div>
        <div class="space-y-0.5">
          ${sec.items.map(it=> sec.external
            ? `<a href="${it.url}" target="_blank" rel="noopener" class="nav-item group flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-semibold text-white/70 hover:bg-white/5 hover:text-white transition">
                 <i data-lucide="${it.icon}" class="w-4 h-4 shrink-0"></i><span class="truncate">${it.label}</span>
                 <i data-lucide="external-link" class="w-3.5 h-3.5 ml-auto text-white/30 group-hover:text-white/60"></i>
               </a>`
            : `<button onclick="load('${it.file}','${sec.group}','${it.label}','${sec.accent}')" data-file="${it.file}" class="nav-item w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-semibold text-white/70 hover:bg-white/5 hover:text-white transition text-left">
                 <i data-lucide="${it.icon}" class="w-4 h-4 shrink-0"></i><span class="truncate">${it.label}</span>
                 <span class="ni-dot ml-auto w-1.5 h-1.5 rounded-full bg-[#DC183C] opacity-0"></span>
               </button>`
          ).join('')}
        </div>
      </div>`).join('');
    lucide.createIcons();
  }

  function load(file, group, label, accent){
    document.getElementById('frame').src = file;
    document.getElementById('curGroup').textContent = group;
    document.getElementById('curGroup').style.color = accent || '#AE6B0A';
    document.getElementById('curTitle').textContent = label;
    document.getElementById('openTab').href = file;
    document.querySelectorAll('.nav-item').forEach(n=> n.classList.toggle('active', n.dataset.file===file));
    if(location.hash.slice(1) !== file) history.replaceState(null,'','#'+file);
    closeSidebar();
  }
  function reloadFrame(){ const f=document.getElementById('frame'); f.src = f.src; }

  function setVP(mode){
    const wrap = document.getElementById('frameWrap');
    const map = { full:'100%', tablet:'820px', mobile:'390px' };
    wrap.style.maxWidth = map[mode];
    ['full','tablet','mobile'].forEach(m=> document.getElementById('vp-'+m).classList.toggle('active', m===mode));
  }

  function openSidebar(){ document.getElementById('sidebar').classList.add('open'); document.getElementById('backdrop').classList.remove('hidden'); }
  function closeSidebar(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('backdrop').classList.add('hidden'); }

  // Init — restore from hash if present
  buildNav();
  (function initLoad(){
    const hash = location.hash.slice(1);
    let found = null, grp = null, acc = null;
    NAV.forEach(sec=>{ if(sec.external) return; sec.items.forEach(it=>{ if(it.file===hash){ found=it; grp=sec.group; acc=sec.accent; } }); });
    if(found) load(found.file, grp, found.label, acc);
    else load('public-home.html','Public site','Home','#FF9900');
  })();
  lucide.createIcons();
</script>
</body>
</html>
