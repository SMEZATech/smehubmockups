    html,body{font-family:'Inter',system-ui,sans-serif;} .font-jakarta{font-family:'Plus Jakarta Sans',sans-serif;letter-spacing:.005em;}

    .card-lift{transition:box-shadow .2s,transform .2s;} .card-lift:hover{box-shadow:0 10px 24px -10px rgba(10,44,61,0.18);transform:translateY(-2px);}
    .chip{transition:background-color .15s,color .15s,border-color .15s;cursor:pointer;} .chip.active{background:#fff;color:#0C1F31;border-color:#fff;}
    .chip.active-red{background:#DC183C;color:#fff;border-color:#DC183C;}
    .no-scrollbar::-webkit-scrollbar{display:none;} .no-scrollbar{-ms-overflow-style:none;scrollbar-width:none;}
    .field{width:100%;background:#fff;border:1px solid #E7EBEF;border-radius:.75rem;height:2.75rem;padding:0 1rem 0 2.5rem;font-size:.9rem;outline:none;transition:border-color .15s,box-shadow .15s;} .field:focus{border-color:#DC183C;box-shadow:0 0 0 3px rgba(220,24,60,.12);}
    .dev-badge{display:none;} body.dev-on .dev-badge{display:inline-flex;} #devToggle.on{background:#DC183C;color:#fff;border-color:#DC183C;}
    .ov{position:fixed;inset:0;z-index:60;} .ov-bg{position:absolute;inset:0;background:rgba(12,31,49,.45);backdrop-filter:blur(2px);opacity:0;transition:opacity .3s;} .ov.open .ov-bg{opacity:1;}
    .drawer{position:absolute;right:0;top:0;height:100%;width:100%;max-width:440px;background:#fff;box-shadow:-12px 0 40px rgba(12,31,49,.25);overflow-y:auto;transform:translateX(100%);transition:transform .3s cubic-bezier(.2,.7,.2,1);} .ov.open .drawer{transform:translateX(0);}
  </style>

<body class="bg-[#FCFCFC] text-[#121A21] antialiased">
<header class="bg-slate-100 border-b-2 border-dashed border-slate-400 relative overflow-hidden">

  <div class="relative max-w-7xl mx-auto px-4 sm:px-6 h-14 flex items-center gap-3 sm:gap-4">

    <!-- Breadcrumb (global pattern) -->
    <nav aria-label="Breadcrumb" class="text-xs text-white/55 flex items-center flex-wrap gap-x-1.5 mb-4"><a href="public-home.html" class="hover:text-white transition">Home</a><span class="text-white/30">›</span><a href="public-resources.html" class="hover:text-white transition">Resources</a><span class="text-white/30">›</span><span id="bc-type" class="text-white/85 font-medium truncate">eBooks</span></nav>

<main class="max-w-7xl mx-auto px-4 sm:px-6 py-10">

<div id="overlay-root"></div><div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 z-50"></div>
<script>
  function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
  function showToast(m){const el=document.getElementById('toast');el.classList.remove('hidden');el.innerHTML=`<div class="bg-[#0C1F31] text-white rounded-full pl-3 pr-5 py-2.5 shadow-2xl flex items-center gap-2 text-sm font-semibold" style="border-left:4px solid #29A37A"><i data-lucide="check-circle" class="w-4 h-4" style="color:#29A37A"></i><span>${esc(m)}</span></div>`;lucide.createIcons();setTimeout(()=>{el.classList.add('hidden');el.innerHTML='';},2400);}

  // Type config: key -> { label, sub, icon, tint:[bg,text] }
  const TYPES = {
    ebooks:    { label:'eBooks',             sub:'In-depth reads on the topics that move your business forward.',  icon:'book-open',         tint:['#FDECEF','#DC183C'] },
    templates: { label:'Templates',          sub:'Ready-to-use docs, plans and spreadsheets — just fill in and go.', icon:'file-spreadsheet', tint:['#E4F5EE','#29A37A'] },
    guides:    { label:'Guides',             sub:'Step-by-step how-tos for every stage of starting and scaling.',  icon:'compass',          tint:['#FFF1E0','#AE6B0A'] },
    reports:   { label:'Reports & Surveys',  sub:'Data and insight on the South African small-business landscape.', icon:'bar-chart-3',     tint:['#FDECEF','#DC183C'] }
  };
  const ORDER = ['ebooks','templates','guides','reports'];

  // Categories (topics) — chip filter
  const CATS = ['Marketing','Finance','Operations','Sales','Compliance','HR & People','Technology'];

  // 8 resources per type — each tagged with a category
  const DATA = {
    ebooks: [
      {t:'Your Guide to AI Prompting', d:'The four core pillars of prompting for business leaders.', g:true,  c:'Technology'},
      {t:'Pitching to Funders That Say Yes', d:'Structure a deck that survives the first five minutes.', g:true, c:'Finance'},
      {t:'The Bootstrapper’s Handbook', d:'Grow on revenue without giving away equity.', g:false, c:'Finance'},
      {t:'Pricing Your Product or Service', d:'Frameworks to price for profit, not just to compete.', g:false, c:'Sales'},
      {t:'Building a Brand on a Budget', d:'Look established before you are — for under R5,000.', g:true,  c:'Marketing'},
      {t:'Hiring Your First Five People', d:'What to delegate first without losing the culture.', g:false, c:'HR & People'},
      {t:'Selling on WhatsApp & Social', d:'Turn followers and chats into paying customers.', g:false, c:'Marketing'},
      {t:'Surviving a Cash Flow Crunch', d:'The moves that keep the lights on when money is tight.', g:true,  c:'Finance'}
    ],
    templates: [
      {t:'One-Page Business Plan', d:'A founder-friendly plan you can fill in this afternoon.', g:false, c:'Operations'},
      {t:'Cash Flow Forecast (12 Months)', d:'See your runway month by month.', g:false, c:'Finance'},
      {t:'Invoice & Quote Pack', d:'SARS-friendly invoices and quotes, ready to brand.', g:false, c:'Finance'},
      {t:'Pitch Deck Template', d:'Ten slides investors actually want to see.', g:true,  c:'Finance'},
      {t:'Employment Contract Template', d:'A compliant starting point for your first hires.', g:true,  c:'HR & People'},
      {t:'Marketing Calendar', d:'Plan a year of campaigns on one tab.', g:false, c:'Marketing'},
      {t:'Expense Tracker', d:'Categorise spend and stay tax-ready all year.', g:false, c:'Finance'},
      {t:'Sales Pipeline Tracker', d:'Track leads from first contact to close.', g:true,  c:'Sales'}
    ],
    guides: [
      {t:'Registering Your Business with CIPC', d:'Every step, document and fee to register.', g:false, c:'Compliance'},
      {t:'POPIA Compliance for Small Teams', d:'A practical checklist to get data handling right.', g:false, c:'Compliance'},
      {t:'Getting Tax Compliant with SARS', d:'Registrations, returns and deadlines explained.', g:false, c:'Finance'},
      {t:'Applying for Government Grants', d:'Where to look and how to put a strong application together.', g:true, c:'Finance'},
      {t:'Opening a Business Bank Account', d:'What each bank needs and how to compare them.', g:false, c:'Finance'},
      {t:'Writing a Funding-Ready Plan', d:'Turn your idea into a document funders trust.', g:true,  c:'Finance'},
      {t:'B-BBEE for Small Business', d:'Understand your level and how to improve it.', g:false, c:'Compliance'},
      {t:'Setting Up Online Payments', d:'Compare gateways and go live with confidence.', g:false, c:'Technology'}
    ],
    reports: [
      {t:'State of SA Small Business 2026', d:'Confidence, funding access and hiring intentions.', g:true,  c:'Operations'},
      {t:'Township Economy Opportunity Map', d:'Where formal and informal markets converge.', g:true,  c:'Marketing'},
      {t:'SME Funding Landscape Report', d:'Who is lending, granting and investing right now.', g:true,  c:'Finance'},
      {t:'Women in Business Survey', d:'The funding gap and the networks closing it.', g:false, c:'HR & People'},
      {t:'Digital Adoption Among SMEs', d:'How small firms are using tech to grow.', g:false, c:'Technology'},
      {t:'Cost of Doing Business Index', d:'What is squeezing margins across sectors.', g:true,  c:'Operations'},
      {t:'Youth Entrepreneurship Report', d:'Trends, barriers and support for under-35 founders.', g:false, c:'HR & People'},
      {t:'Skills & Hiring Outlook 2026', d:'The roles SMEs are struggling to fill.', g:false, c:'HR & People'}
    ]
  };

  function getType(){ const p=new URLSearchParams(location.search).get('type'); const h=location.hash.replace('#',''); const k=(h||p||'ebooks').toLowerCase(); return TYPES[k]?k:'ebooks'; }
  let active = getType();
  let activeCat = 'all';   // 'all' or a CATS value


  function renderHero(){
    const c = TYPES[active];
    document.getElementById('bc-type').textContent = c.label;
    document.getElementById('hero-title').childNodes[0].nodeValue = c.label + ' ';
    document.getElementById('hero-sub').textContent = c.sub;
    document.getElementById('type-bar').innerHTML = ORDER.map(k=>`<button onclick="setType('${k}')" class="chip shrink-0 px-4 h-9 rounded-full border border-white/25 text-sm font-semibold text-white/80 ${k===active?'active':''}">${esc(TYPES[k].label)}</button>`).join('');
    const catKeys = ['all', ...CATS];
    document.getElementById('cat-bar').innerHTML = catKeys.map(k=>`<button onclick="setCat('${esc(k).replace(/'/g,"\\'")}')" class="chip shrink-0 px-4 h-9 rounded-full border border-white/25 text-sm font-semibold text-white/80 ${k===activeCat?'active-red':''}">${k==='all'?'All':esc(k)}</button>`).join('');
    lucide.createIcons();
  }
  function setType(k){ active=k; history.replaceState(null,'',`?type=${k}`); renderHero(); renderGrid(); }
  function setCat(k){ activeCat=k; renderHero(); renderGrid(); }

  // Canonical resource card — IDENTICAL across public-resources, public-resource-category, public-resource.
  // Guide-type resources adopt the public-guides.html card shape (read time + Read Guide row).
  const TYPE_PILL = { Ebook:['#FDECEF','#DC183C'], Template:['#E4F5EE','#29A37A'], Guide:['#FFF1E0','#AE6B0A'], Report:['#FDECEF','#DC183C'] };
  const TYPE_LABEL = { ebooks:'Ebook', templates:'Template', guides:'Guide', reports:'Report' };
  function resourceCard(r){
    const t = TYPE_PILL[r.type] || ['#F1F5F9','#475569'];
    const isGuide = r.type === 'Guide';
    const ctaRow = isGuide
      ? `<div class="mt-auto pt-4 border-t border-[#E7EBEF] flex items-center gap-2 text-xs text-[#6A7581]">
           <i data-lucide="clock" class="w-3.5 h-3.5"></i><span class="font-semibold">${r.read||10} min read</span>
           <span class="ml-auto inline-flex items-center gap-1 text-[#DC183C] font-bold text-sm">Read Guide <i data-lucide="arrow-right" class="w-3.5 h-3.5"></i></span>
         </div>`
      : `<span class="mt-auto pt-4 border-t border-[#E7EBEF] inline-flex items-center gap-1.5 text-sm font-bold text-[#DC183C] group-hover:gap-2 transition-all">Download Now <i data-lucide="download" class="w-4 h-4"></i></span>`;
    const href = isGuide ? 'public-guide.html' : 'public-resource.html';
    return `<a href=\"${href}\" class="group bg-white rounded-2xl border border-[#E7EBEF] p-5 card-lift flex flex-col h-full">
      <span class="inline-flex w-max px-2.5 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider" style="background:${t[0]};color:${t[1]}">${esc(r.type)}</span>
      <h3 class="font-jakarta font-extrabold text-lg leading-snug mt-3 group-hover:text-[#DC183C] transition line-clamp-2 min-h-[3.25rem]">${esc(r.title)}</h3>
      <p class="text-sm text-[#6A7581] leading-relaxed mt-2 line-clamp-2 flex-1">${esc(r.desc||r.excerpt||'')}</p>
      ${ctaRow}
    </a>`;
  }

  function renderGrid(){
    const c = TYPES[active];
    const typeLabel = TYPE_LABEL[active] || 'Ebook';
    const q = (document.getElementById('search').value||'').toLowerCase();
    // Combine: matches selected TYPE (via active list) AND selected CATEGORY AND search query
    let list = DATA[active].filter(r =>
      (activeCat==='all' || r.c===activeCat) &&
      (!q || r.t.toLowerCase().includes(q) || r.d.toLowerCase().includes(q))
    );
    if(document.getElementById('sort').value==='az') list = list.slice().sort((a,b)=>a.t.localeCompare(b.t));
    document.getElementById('count').textContent = `${list.length} resource${list.length===1?'':'s'}`;
    document.getElementById('grid').innerHTML = list.map(r=>resourceCard({type:typeLabel, title:r.t, desc:r.d, read:r.read||(typeLabel==='Guide'?8:undefined)})).join('');
    lucide.createIcons();
  }

  const BRIEFS = { cat: {
    title:'Resource Category', sub:'<b>ONE template · FOUR distinct URLs</b> (taxonomy archive)',
    purpose:'<b>Architecture decision:</b> ONE shared PHP template, served at FOUR distinct URLs — <code>/resources/ebooks/</code>, <code>/resources/templates/</code>, <code>/resources/guides/</code>, <code>/resources/reports/</code> — NOT a single page with client-side tabs. This mockup uses chips + hash routing for preview convenience only. <b>In production:</b> each type is its own WordPress taxonomy archive (term = type), each with its own URL, its own canonical, its own breadcrumb, its own meta tags, its own H1. The four chips become real <code>&lt;a href&gt;</code> links between those four archive URLs — they look like tabs but they are full page navigations.',
    data:'Resource CPT: <code>{ id, title, type, category, excerpt, cover, file_url, gated, read_minutes }</code>. <code>type</code> = custom taxonomy with 4 fixed terms (ebook · template · guide · report). <code>category</code> = a second taxonomy (Marketing · Finance · Operations · Sales · Compliance · HR & People · Technology) and combines as a filter (NOT a URL segment — kept as a query param so a single category archive page isn\'t needed per topic).',
    logic:'<b>Why one URL per type and not one page with tabs:</b> (1) SEO — Google indexes the four archives independently, each with its own title/desc targeting its keyword cluster ("free ebooks for SMEs", "small business templates SA"…); (2) shareability — pasting a link goes straight to the right archive; (3) breadcrumb truth — the breadcrumb genuinely IS <code>Home › Resources › eBooks</code> because eBooks is its own page, not a state. <b>Why ONE template:</b> the four archives are visually identical except for hero copy, pill colour, and icon — duplicating the template would be maintenance debt. The template reads the current taxonomy term and renders the right hero/colour/copy from a config map. Category filter remains client-side or as a <code>?cat=</code> query (not a permalink) so we don\'t multiply URLs unnecessarily.',
    components:'Archive hero (breadcrumb · type label · sub · type-link row · category-chip row) · search · sort · resource grid (canonical resource card, identical to public-resources.html and the related section of public-resource.html).',
    specs:'<b>Archive hero:</b> navy hero-bg gradient + dot-pattern 70% opacity. Container <code>max-w-7xl</code> = 1280px, side padding 16px mobile / 24px (<code>px-4 sm:px-6</code>), 48px vertical (<code>py-12</code>).<br/><b>Breadcrumb:</b> 12px <code>rgba(255,255,255,0.55)</code>, separator <code>rgba(255,255,255,0.30)</code>, current type <code>rgba(255,255,255,0.85)</code> weight 500, 16px bottom margin.<br/><b>H1:</b> Plus Jakarta Sans weight 800, 30px mobile / 48px sm (<code>text-3xl sm:text-5xl</code>), tracking-tight, white.<br/><b>Hero sub:</b> 18px <code>rgba(255,255,255,0.70)</code>, max-width 672px, 16px top margin.<br/><b>Type-switcher chips:</b> 28px top margin (<code>mt-7</code>), padding-x 16px height 36px (<code>px-4 h-9</code>) rounded-full 1px border <code>rgba(255,255,255,0.25)</code>, 14px weight 600 <code>rgba(255,255,255,0.80)</code>; active bg <code>#FFFFFF</code> text <code>#0C1F31</code> border white. 8px gap, scrollable. These are full page links in production.<br/><b>Filter-by-topic label:</b> 12px top margin, 11px weight 700 uppercase tracking-wider <code>rgba(255,255,255,0.45)</code>, 8px bottom margin.<br/><b>Category chips:</b> same size as type chips, border <code>rgba(255,255,255,0.25)</code>; active bg <code>#DC183C</code> white border <code>#DC183C</code>.<br/><br/><b>Main:</b> <code>max-w-7xl</code>, 16/24px side padding, 40px vertical (<code>py-10</code>).<br/><b>Toolbar:</b> 28px bottom margin. Search field max-width 384px (<code>max-w-sm</code>): white bg 1px border <code>#E7EBEF</code> radius 12px height 44px (2.75rem) left padding 40px font 14.4px; focus border <code>#DC183C</code> + 3px ring <code>rgba(220,24,60,0.12)</code>; Lucide search 16×16 slate-400 at 12px left. Count text 14px slate-500. Sort select 14px weight 600 slate-600, 1px border <code>#E7EBEF</code> rounded-full padding-x 16px height 36px white bg.<br/><b>Resource grid:</b> 1 / 2 / 4 columns (<code>sm:grid-cols-2 lg:grid-cols-4</code>), 24px gap.<br/><b>Resource card (canonical):</b> white bg radius 16px 1px border <code>#E7EBEF</code> padding 20px, full-height flex column, hover lift (shadow 0 10px 24px -10px <code>rgba(10,44,61,0.18)</code>, translateY -2px). Type pill padding 10px/4px rounded-full 10px weight 700 uppercase tracking-wider, tinted per type (Ebook <code>#FDECEF</code>/<code>#DC183C</code>, Template <code>#E4F5EE</code>/<code>#29A37A</code>, Guide <code>#FFF1E0</code>/<code>#AE6B0A</code>, Report <code>#FDECEF</code>/<code>#DC183C</code>). H3 Plus Jakarta Sans weight 800 18px leading-snug 12px top margin hover <code>#DC183C</code> clamp 2 min-height 52px. Desc 14px <code>#6A7581</code> 8px top margin clamp 2. Non-guide CTA row 16px top padding + 1px top border, 14px weight 700 <code>#DC183C</code> Download Now + Lucide download 16×16. Guide CTA row 12px <code>#6A7581</code> Lucide clock 14×14 + read time, Read Guide 14px weight 700 <code>#DC183C</code> arrow-right 14×14.<br/><br/><b>Header/footer:</b> greyscale placeholder scaffolds (slate-100 bg, dashed slate-400 border, 56px header height) — not final design.'
  } };
  function toggleDevMode(){const on=document.body.classList.toggle('dev-on');const b=document.getElementById('devToggle');if(b)b.classList.toggle('on',on);if(on)showToast('Dev Mode on — tap any ⓘ for implementation notes.');lucide.createIcons();}
  function closeOverlay(id){const el=document.getElementById(id);if(!el)return;el.classList.remove('open');setTimeout(()=>{if(el&&el.parentNode)el.remove();},300);}
  function openBrief(id){const b=BRIEFS[id];if(!b)return;const sec=(i,l,h)=>`<div class="px-6 py-4 border-t border-slate-100"><p class="text-[10px] font-bold uppercase tracking-widest text-[#DC183C] flex items-center gap-1.5 mb-2"><i data-lucide="${i}" class="w-3.5 h-3.5"></i>${l}</p><div class="text-sm text-slate-600 leading-relaxed">${h}</div></div>`;document.getElementById('overlay-root').innerHTML=`<div class="ov" id="ov"><div class="ov-bg" onclick="closeOverlay('ov')"></div><div class="drawer"><div class="sticky top-0 z-10 bg-[#0C1F31] text-white px-6 py-5 flex items-start justify-between"><div><p class="text-[10px] font-bold uppercase tracking-widest text-[#FF9900] mb-1">Dev Brief</p><h3 class="font-jakarta font-extrabold text-lg leading-tight">${b.title}</h3><p class="text-xs text-white/60 mt-1">${b.sub}</p></div><button onclick="closeOverlay('ov')" class="text-white/60 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button></div>${sec('target','Purpose',b.purpose)}${sec('database','Data model',b.data)}${sec('git-branch','Logic',b.logic)}${sec('ruler','Spec values',b.specs)}${sec('boxes','Components',b.components)}</div></div>`;requestAnimationFrame(()=>{const o=document.getElementById('ov');if(o)o.classList.add('open');});lucide.createIcons();}

  renderHero(); renderGrid(); lucide.createIcons();
</script>
</body>
