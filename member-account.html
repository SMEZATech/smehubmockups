      theme: {
        extend: {
          fontFamily: {

      }

  <style>
    :root{
      --primary:349 80% 48%; --accent:36 100% 50%; --navy:210 60% 12%; --success:160 60% 40%;
      --foreground:210 30% 10%; --muted-foreground:210 10% 45%; --border:210 20% 92%;
      --background:0 0% 99%; --card:0 0% 100%; --radius:0.75rem;
      --shadow-card:0 2px 8px rgba(12,31,49,.08); --shadow-card-hover:0 8px 24px rgba(12,31,49,.12);
    }
    html, body { font-family:'Inter', system-ui, sans-serif; }
    .font-jakarta { font-family:'Plus Jakarta Sans', sans-serif; letter-spacing:.005em; }
    .font-mono { font-family: ui-monospace, monospace; }

    .no-scrollbar::-webkit-scrollbar { display:none; }
    .no-scrollbar { -ms-overflow-style:none; scrollbar-width:none; }

    /* Reveal */
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .reveal { animation: fadeUp .45s cubic-bezier(.2,.7,.2,1) backwards; }

    /* Toast */
    @keyframes toastIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes toastOut { to { opacity:0; transform:translateY(20px); } }
    .toast-in { animation: toastIn .25s ease forwards; }
    .toast-out { animation: toastOut .25s ease forwards; }

    /* Type stripes */
    .stripe-ask   { box-shadow: inset 4px 0 0 0 #DC183C; }
    .stripe-win   { box-shadow: inset 4px 0 0 0 #29A37A; }
    .stripe-share { box-shadow: inset 4px 0 0 0 #FF9900; }

    /* Card lift */
    .card-lift { transition: box-shadow .2s, transform .2s; }
    .card-lift:hover { box-shadow:0 8px 20px -8px rgba(10,44,61,.12); transform:translateY(-1px); }

    /* Profile sub-nav tabs */
    .ptab { position:relative; transition:color .15s; }
    .ptab.active { color:#DC183C; }
    .ptab.active::after { content:""; position:absolute; left:0; right:0; bottom:-1px; height:3px; border-radius:3px 3px 0 0; background:#DC183C; }

    /* Settings sidebar item */
    .snav.active { background:#FDECEF; color:#DC183C; }
    .snav.active i { color:#DC183C; }

    /* Segmented control */
    .seg.active { background:#0C1F31; color:#fff; }

    /* Toggle switch */
    .switch { width:42px; height:24px; border-radius:9999px; background:#CBD5E1; position:relative; transition:background .2s; flex:none; cursor:pointer; }
    .switch::after { content:""; position:absolute; top:2px; left:2px; width:20px; height:20px; border-radius:9999px; background:#fff; box-shadow:0 1px 3px rgba(0,0,0,.25); transition:transform .2s; }
    .switch.on { background:#29A37A; }
    .switch.on::after { transform:translateX(18px); }
    .switch.disabled { opacity:.45; cursor:not-allowed; }

    /* Chip select (radio cards) */
    .rcard { transition:border-color .15s, background-color .15s; cursor:pointer; }
    .rcard.sel { border-color:#DC183C; background:#FDECEF; }

    /* Overlays */
    #overlay-root:empty { display:none; }
    .ov { position:fixed; inset:0; z-index:60; }
    .ov-bg { position:absolute; inset:0; background:rgba(12,31,49,.45); backdrop-filter:blur(2px); opacity:0; transition:opacity .3s; }
    .ov.open .ov-bg { opacity:1; }
    .drawer { position:absolute; right:0; top:0; height:100%; width:100%; max-width:440px; background:#fff; box-shadow:-12px 0 40px rgba(12,31,49,.25); overflow-y:auto; transform:translateX(100%); transition:transform .3s cubic-bezier(.2,.7,.2,1); }
    .ov.open .drawer { transform:translateX(0); }
    .modalbox { position:absolute; left:50%; top:50%; transform:translate(-50%,-46%); width:calc(100% - 2rem); max-width:440px; background:#fff; border-radius:1rem; box-shadow:0 24px 60px rgba(12,31,49,.3); opacity:0; transition:transform .25s, opacity .25s; max-height:90vh; overflow-y:auto; }
    .ov.open .modalbox { transform:translate(-50%,-50%); opacity:1; }

    /* Dev Mode */
    .dev-badge { display:none; }
    body.dev-on .dev-badge { display:inline-flex; }
    #devToggle.on { background:#DC183C; color:#fff; border-color:#DC183C; }

    [data-view]{ display:none; }
    [data-view].view-on{ display:block; }
  </style>
</head>

/* ===================== GLOBAL SEARCH ===================== */
const KIND_META = {
  member:    { icon:'user-round',      label:'Members' },
  group:     { icon:'layout-grid',     label:'Groups' },
  discussion:{ icon:'messages-square', label:'Forum discussions' },
  post:      { icon:'rss',             label:'Your posts' }
};
function searchIndex(){
  const idx = [];
  [...CONNECTIONS, ...REQUESTS].forEach(m=> idx.push({ kind:'member', title:m.name, sub:`${m.role} at ${m.company}`, initials:m.initials, extra:m.sector+' '+m.province }));
  GROUPS.forEach(g=> idx.push({ kind:'group', title:g.name, sub:`${g.members.toLocaleString()} members · ${g.privacy}`, extra:g.desc }));
  FORUM.discussions.forEach(d=> idx.push({ kind:'discussion', title:d.title, sub:d.group, extra:d.excerpt }));
  POSTS.own.forEach(p=> idx.push({ kind:'post', title:p.content, sub:TYPES[p.type].label, type:p.type }));
  return idx;
}
function runSearch(q){
  const el = document.getElementById('search-results');
  const clear = document.getElementById('search-clear');
  q = (q||'').trim();
  if(clear) clear.classList.toggle('hidden', !q);
  if(!q){ el.classList.add('hidden'); el.innerHTML=''; return; }
  const ql = q.toLowerCase();
  const hits = searchIndex().filter(r => (r.title+' '+(r.sub||'')+' '+(r.extra||'')).toLowerCase().includes(ql));
  if(!hits.length){
    el.innerHTML = `<div class="px-4 py-8 text-center text-sm text-slate-400"><i data-lucide="search-x" class="w-6 h-6 mx-auto mb-2"></i>No results for “${esc(q)}”.</div>`;
    el.classList.remove('hidden'); lucide.createIcons(); return;
  }
  let html = `<div class="px-4 pt-3 pb-1 text-[11px] text-slate-400">${hits.length} result${hits.length>1?'s':''} for “<span class="font-semibold text-slate-500">${esc(q)}</span>”</div>`;
  ['member','group','discussion','post'].forEach(kind=>{
    const group = hits.filter(h=>h.kind===kind).slice(0,4);
    if(!group.length) return;
    const m = KIND_META[kind];
    html += `<div class="px-4 pt-2 pb-1 text-[10px] font-bold uppercase tracking-widest text-slate-400 flex items-center gap-1.5"><i data-lucide="${m.icon}" class="w-3 h-3"></i> ${m.label}</div>`;
    html += group.map(h=>{
      let lead;
      if(kind==='member') lead = monogram(h.initials,32);
      else if(kind==='post'){ const t=TYPES[h.type]; lead = `<span class="w-8 h-8 rounded-lg grid place-items-center shrink-0" style="background:${t.headerBg}"><i data-lucide="${t.icon}" class="w-4 h-4" style="color:${t.color}"></i></span>`; }
      else lead = `<span class="w-8 h-8 rounded-lg bg-slate-100 grid place-items-center shrink-0"><i data-lucide="${m.icon}" class="w-4 h-4 text-slate-500"></i></span>`;
      const title = kind==='post' ? esc(h.title.slice(0,64))+(h.title.length>64?'…':'') : esc(h.title);
      return `<button onmousedown="searchSelect('${kind}','${encodeURIComponent(h.title)}')" class="w-full flex items-center gap-3 px-4 py-2.5 hover:bg-slate-50 text-left transition">
        ${lead}<div class="min-w-0"><p class="text-sm font-semibold text-[#121A21] truncate">${title}</p><p class="text-xs text-slate-500 truncate">${esc(h.sub||'')}</p></div></button>`;
    }).join('');
  });
  el.innerHTML = html;
  el.classList.remove('hidden');
  lucide.createIcons();
}
function searchSelect(kind, enc){
  const title = decodeURIComponent(enc);
  closeSearch();
  switch(kind){
    case 'member':
      if(title===PEOPLE.peer.name){ setRole('peer'); switchView('profile'); showToast('Opening '+title.split(' ')[0]+'’s profile…', null); }
      else { setRole('own', true); switchView('profile'); setProfileTab('connections'); showToast('Opening '+title.split(' ')[0]+'’s profile…', null); }
      break;
    case 'group':      setRole('own', true); switchView('profile'); setProfileTab('groups');  showToast('Opening group: '+title, null); break;
    case 'discussion': setRole('own', true); switchView('profile'); setProfileTab('forums');  showToast('Opening discussion…', null); break;
    case 'post':       setRole('own', true); switchView('profile'); setProfileTab('activity');showToast('Jumping to your post…', null); break;
  }
}
function clearSearch(){ const i=document.getElementById('global-search'); if(i){ i.value=''; i.focus(); } runSearch(''); }
function closeSearch(){
  const el=document.getElementById('search-results'); if(el) el.classList.add('hidden');
  const i=document.getElementById('global-search'); if(i) i.value='';
  const c=document.getElementById('search-clear'); if(c) c.classList.add('hidden');
}

function sendInvite(){
  const i = document.getElementById('invite-email'); if(!i) return;
  const v = i.value.trim();

  INVITES.unshift({ email:v, status:'pending', date:'just now' });
  renderProfileTab();
  showToast('Invite sent to '+v, 'win');
}
function copyInviteLink(){
  const i = document.getElementById('invite-link');
  if(i){ i.select(); try{ document.execCommand('copy'); }catch(e){} }
  showToast('Invite link copied to clipboard.', null);
}

function saveProfile(){
  const p = PEOPLE.own; const g = id => document.getElementById(id);
  if(g('edit-name')) p.name = g('edit-name').value.trim() || p.name;
  if(g('edit-role')) p.role = g('edit-role').value.trim() || p.role;
  if(g('edit-company')) p.company = g('edit-company').value.trim() || p.company;
  if(g('edit-bio')) p.bio = g('edit-bio').value.trim() || p.bio;
  ['website','linkedin','twitter','whatsapp'].forEach(f=>{ if(g('edit-'+f)) p[f] = g('edit-'+f).value.trim() || p[f]; });
  p.initials = p.name.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
  p.strength = Math.min(100, p.strength + 8);
  state.editing = false;
  renderProfile(); updateBadges();
  showToast('Profile updated.', 'win');
}

    return `<button onclick="selectConversation('${c.id}')" class="w-full text-left px-4 py-3 flex gap-3 border-b border-slate-100 transition ${on?'bg-[#FDECEF]/60':'hover:bg-slate-50'}">

  };

  const listPane = `

      <div class="px-4 py-3 border-b border-slate-100 flex items-center gap-2">
        <div class="relative flex-1"><i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i><input placeholder="Search messages…" class="w-full bg-slate-100 rounded-full pl-9 pr-3 py-2 text-sm outline-none focus:bg-white focus:ring-2 focus:ring-[#DC183C]/30 transition"></div>

  const bubbles = active.messages.map(m=> m.from==='me'
    ? `<div class="flex justify-end"><div class="max-w-[78%]"><div class="bg-gradient-to-br from-[#DC183C] to-[#FF9900] text-white rounded-2xl rounded-br-md px-4 py-2.5 text-sm leading-relaxed">${esc(m.text)}</div><p class="text-[10px] text-slate-400 text-right mt-1 pr-1">${esc(m.time)}</p></div></div>`
    : `<div class="flex justify-start gap-2"><div class="max-w-[78%]"><div class="bg-slate-100 text-[#121A21] rounded-2xl rounded-bl-md px-4 py-2.5 text-sm leading-relaxed">${esc(m.text)}</div><p class="text-[10px] text-slate-400 mt-1 pl-1">${esc(m.time)}</p></div></div>`
  ).join('');

  const canMessage = active.connected || state.privacy.messages==='everyone';
  const composer = canMessage
    ? `<div class="px-4 py-3 border-t border-slate-100 flex items-center gap-2">
        <input id="msg-input" onkeydown="if(event.key==='Enter')sendMessage()" placeholder="Write a message…" class="flex-1 bg-slate-100 rounded-full px-4 py-2.5 text-sm outline-none focus:bg-white focus:ring-2 focus:ring-[#DC183C]/30 transition">

      </div>
      <div id="msg-thread" class="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-50/40">${bubbles || `<div class="h-full grid place-items-center text-center text-slate-400"><div><i data-lucide="message-circle" class="w-8 h-8 mx-auto mb-2"></i><p class="text-sm font-semibold">Start the conversation with ${esc(active.name.split(' ')[0])}.</p></div></div>`}</div>

function filterComposeList(q){
  q = (q||'').toLowerCase();
  document.querySelectorAll('#compose-list .conv-pick').forEach(el=>{ el.classList.toggle('hidden', !el.getAttribute('data-name').includes(q)); });
}
function startConversation(i){
  const c = CONNECTIONS[i]; if(!c) return;
  let conv = CONVERSATIONS.find(x=>x.name===c.name);
  if(!conv){
    conv = { id:'c'+(CONVERSATIONS.length+1), name:c.name, initials:c.initials, role:c.role, company:c.company, online:false, unread:0, connected:true, messages:[] };
    CONVERSATIONS.push(conv);
  }
  closeOverlay('ov-compose');
  state.activeConv = conv.id; state.msgPane='thread';
  switchView('messages');
}
function backToList(){ state.msgPane='list'; renderMessages(); }
function sendMessage(){
  const inp = document.getElementById('msg-input'); if(!inp) return;
  const text = inp.value.trim(); if(!text) return;
  const c = CONVERSATIONS.find(x=>x.id===state.activeConv); if(!c) return;
  c.messages.push({ from:'me', text, time:'Now' });
  inp.value='';
  renderMessages();
  // canned reply for demo realism
  setTimeout(()=>{
    const reply = CANNED[state.cannedIdx % CANNED.length]; state.cannedIdx++;
    c.messages.push({ from:'them', text:reply, time:'Now' });
    if(state.view==='messages') renderMessages();
  }, 1100);
}

function checkPw(){
  const a=document.getElementById('pw-new'), b=document.getElementById('pw-conf'), m=document.getElementById('pw-msg');
  if(!a||!b||!m) return;
  if(a.value && a.value.length<8){ m.textContent='New password must be at least 8 characters.'; m.className='text-xs text-[#DC183C]'; }
  else if(a.value && b.value && a.value!==b.value){ m.textContent='Passwords do not match.'; m.className='text-xs text-[#DC183C]'; }
  else if(a.value && a.value===b.value){ m.textContent='Passwords match.'; m.className='text-xs text-[#29A37A]'; }
  else { m.textContent=''; }
}

function checkDelete(){

  btn.className = `rounded-full px-5 py-2.5 font-jakarta font-bold text-sm transition ${ok?'bg-[#DC183C] hover:bg-[#B0142F] text-white cursor-pointer':'bg-[#DC183C] text-white opacity-40 cursor-not-allowed'}`;
}

    api:'GET /wp-json/wc/v3/orders?customer={userId} · GET /wp-json/wc/v3/customers/{id}/downloads' },
  set_security:{ title:'Settings · Security', sub:'Password, sessions, 2FA',
    purpose:'Account protection: change password, review & revoke active sessions, and a 2FA toggle shown as coming-soon.',
    data:'Password (write-only), <code>sessions[] { device, location, last_active, current }</code>, <code>twofa_enabled</code>.',
    logic:'Password requires current + min-8 + match. Revoke kills a session token. 2FA disabled until TOTP ships.',
    components:'Password form · session list + revoke · disabled 2FA switch.',
    api:'POST /v1/auth/change-password · GET/DELETE /v1/auth/sessions' },
  set_data:{ title:'Settings · Data & POPIA', sub:'Legally required — South Africa',
    purpose:'<b>Non-negotiable under POPIA (Act 4 of 2013).</b> Members must be able to access, export and delete their personal information, understand retention, and reach the Information Officer. This section satisfies the data-subject rights in sections 23–25.',
    data:'All personal data: profile, posts, connections, group activity, membership records. Export bundled as JSON.',
    logic:'Export is async — queue a job, generate JSON, email a time-limited secure link (never a synchronous heavy WP Engine request). Deletion typed-confirm → soft-delete → purge personal data within 30 days; anonymised counts and 5-year financial records (SARS/FICA) retained. Cancels MemberPress subscription.',
    components:'POPIA rights notice · export button · retention summary · Information Officer link · typed-DELETE confirm modal.',
    api:'POST /v1/users/{id}/data-export · DELETE /v1/users/{id}' }
};

function toggleDevMode(){
  const on = document.body.classList.toggle('dev-on');
  const btn = document.getElementById('devToggle');
  if(btn) btn.classList.toggle('on', on);
  if(on) showToast('Dev Mode on — tap any ⓘ for implementation notes.', null);
  lucide.createIcons();
}
function closeOverlay(id){
  const el = document.getElementById(id); if(!el) return;
  el.classList.remove('open');
  setTimeout(()=>{ if(el && el.parentNode) el.remove(); }, 300);
}
function openBrief(id){
  const b = BRIEFS[id]; if(!b) return;
  const sec = (icon,label,html) => `
    <div class="px-6 py-4 border-t border-slate-100">
      <p class="text-[10px] font-bold uppercase tracking-widest text-[#DC183C] flex items-center gap-1.5 mb-2"><i data-lucide="${icon}" class="w-3.5 h-3.5"></i>${label}</p>
      <div class="text-sm text-slate-600 leading-relaxed">${html}</div>
    </div>`;
  document.getElementById('overlay-root').innerHTML = `
    <div class="ov" id="ov-brief">
      <div class="ov-bg" onclick="closeOverlay('ov-brief')"></div>
      <div class="drawer">
        <div class="sticky top-0 z-10 bg-[#0C1F31] text-white px-6 py-5 flex items-start justify-between">
          <div class="min-w-0"><p class="text-[10px] font-bold uppercase tracking-widest text-[#FF9900] mb-1">Dev Brief</p><h3 class="font-jakarta font-extrabold text-lg leading-tight">${b.title}</h3><p class="text-xs text-white/60 mt-1">${b.sub}</p></div>
          <button onclick="closeOverlay('ov-brief')" class="text-white/60 hover:text-white shrink-0 ml-3"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>
        ${sec('target','Purpose', b.purpose)}
        ${sec('database','Data model', b.data)}
        ${sec('git-branch','Logic', b.logic)}
        ${sec('boxes','Components', b.components)}
        ${sec('plug','API', `<code class="block bg-slate-900 text-emerald-300 text-xs font-mono px-3 py-2 rounded-lg overflow-x-auto">${b.api}</code>`)}
        <div class="px-6 py-4 border-t border-slate-100"><p class="text-[11px] text-slate-400 flex items-center gap-1.5"><i data-lucide="info" class="w-3.5 h-3.5"></i> Spec lives beside the feature — toggle Dev Mode off for the clean stakeholder view.</p></div>
      </div>
    </div>`;
  requestAnimationFrame(()=>{ const o=document.getElementById('ov-brief'); if(o) o.classList.add('open'); });
  lucide.createIcons();
}

/* ===================== TOAST ===================== */
function showToast(msg, kind){
  const el = document.getElementById('toast');
  const t = TYPES[kind]; const color = t ? t.color : '#0C1F31';
  el.classList.remove('hidden');
  el.innerHTML = `<div class="toast-in bg-[#0C1F31] text-white rounded-full pl-3 pr-5 py-2.5 shadow-2xl flex items-center gap-2 text-sm font-semibold" style="border-left:4px solid ${color}">
    <i data-lucide="check-circle" class="w-4 h-4" style="color:${color}"></i><span>${esc(msg)}</span></div>`;
  lucide.createIcons();
  setTimeout(()=>{ const inner=el.firstElementChild; if(inner){ inner.classList.remove('toast-in'); inner.classList.add('toast-out'); } setTimeout(()=>{ el.classList.add('hidden'); el.innerHTML=''; },250); }, 2400);
}

/* ===================== INIT ===================== */
document.addEventListener('keydown', e=>{ if(e.key==='Escape'){ document.querySelectorAll('.ov.open').forEach(o=>closeOverlay(o.id)); closeMenus(); const sr=document.getElementById('search-results'); if(sr) sr.classList.add('hidden'); } });
// Close header dropdowns / search when clicking outside them
document.addEventListener('click', e=>{
  if(!e.target.closest('#user-menu, #notif-menu, [onclick^="toggleUserMenu"], [onclick^="toggleNotifMenu"]')) closeMenus();
  if(!e.target.closest('#search-wrap')){ const sr=document.getElementById('search-results'); if(sr) sr.classList.add('hidden'); }
});

switchView('profile');
setRole('own', true);
renderSettingsNav();
renderSettingsContent();
updateBadges();
lucide.createIcons();
</script>
