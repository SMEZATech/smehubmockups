<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solution Categories — SME South Africa</title>
  <meta name="description" content="Every business solution category on SME South Africa — from funding to software, grouped by what you are trying to solve." />
  <link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script><script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>tailwind.config={theme:{extend:{fontFamily:{jakarta:['Plus Jakarta Sans','sans-serif'],inter:['Inter','system-ui','sans-serif']}}}};</script>
  <style>
    html,body{font-family:'Inter',system-ui,sans-serif;} .font-jakarta{font-family:'Plus Jakarta Sans',sans-serif;letter-spacing:.005em;}
    .hero-bg{background:linear-gradient(115deg,#0C1F31 0%,#0C1F31 50%,#2b1626 80%,#5e1a2c 115%);}
    .dot-pattern{background-image:radial-gradient(rgba(255,255,255,.07) 1px,transparent 1.5px);background-size:22px 22px;}
    .chip{transition:background-color .15s,color .15s,border-color .15s;cursor:pointer;} .chip.active{background:#fff;color:#0C1F31;border-color:#fff;}
    .chip.active-red{background:#DC183C;color:#fff;border-color:#DC183C;}
    .no-scrollbar::-webkit-scrollbar{display:none;} .no-scrollbar{-ms-overflow-style:none;scrollbar-width:none;}
    .card-lift{transition:box-shadow .2s,transform .2s,border-color .2s;} .card-lift:hover{box-shadow:0 16px 34px -14px rgba(10,44,61,.24);transform:translateY(-3px);border-color:#DC183C;}
    .subchip{transition:all .15s;} .subchip:hover{background:#FDECEF;color:#B0142F;border-color:#DC183C;}
    .dev-badge{display:none;} body.dev-on .dev-badge{display:inline-flex;} #devToggle.on{background:#DC183C;color:#fff;border-color:#DC183C;}
    .ov{position:fixed;inset:0;z-index:60;} .ov-bg{position:absolute;inset:0;background:rgba(12,31,49,.45);backdrop-filter:blur(2px);opacity:0;transition:opacity .3s;} .ov.open .ov-bg{opacity:1;}
    .drawer{position:absolute;right:0;top:0;height:100%;width:100%;max-width:440px;background:#fff;box-shadow:-12px 0 40px rgba(12,31,49,.25);overflow-y:auto;transform:translateX(100%);transition:transform .3s cubic-bezier(.2,.7,.2,1);} .ov.open .drawer{transform:translateX(0);}
  </style>
</head>
<body class="bg-[#FCFCFC] text-[#121A21] antialiased">
<header class="bg-slate-100 border-b-2 border-dashed border-slate-400 relative overflow-hidden">
  <div class="absolute inset-0 opacity-30 pointer-events-none" style="background:repeating-linear-gradient(45deg,transparent,transparent 8px,rgba(100,116,139,.18) 8px,rgba(100,116,139,.18) 16px)"></div>
  <div class="relative max-w-7xl mx-auto px-4 sm:px-6 h-14 flex items-center gap-3 sm:gap-4">
    <a href="public-home.html" class="flex items-center gap-2 shrink-0 opacity-70 hover:opacity-100 transition">
      <img src="assets/logo-icon.png" alt="SME South Africa" class="w-7 h-7" />
      <span class="font-jakarta font-extrabold text-[13px] tracking-tight text-slate-700 hidden sm:inline">SME South Africa</span>
    </a>
    <span class="mx-1 hidden sm:inline w-px h-5 bg-slate-300"></span>
    <p class="text-[10px] sm:text-[11px] font-bold uppercase tracking-widest text-slate-600 flex items-center gap-1.5">
      <i data-lucide="construction" class="w-3.5 h-3.5 text-slate-500"></i>
      Header placeholder &middot; design pending
    </p>
    <div class="ml-auto flex items-center gap-2">
      <button id="devToggle" onclick="toggleDevMode()" class="inline-flex items-center gap-1.5 px-2.5 h-8 rounded-full bg-white border border-slate-300 hover:border-[#DC183C] hover:text-[#DC183C] text-[11px] font-bold uppercase tracking-wider text-slate-600 transition" title="Toggle implementation notes"><i data-lucide="code-2" class="w-3.5 h-3.5"></i><span class="hidden sm:inline">Dev</span></button>
      <a href="index.html" class="inline-flex items-center gap-1.5 px-3 h-8 rounded-full bg-white border border-slate-300 hover:border-slate-500 text-[11px] font-bold text-slate-700 transition">
        <i data-lucide="arrow-left" class="w-3.5 h-3.5"></i><span class="hidden sm:inline">Launcher</span>
      </a>
    </div>
  </div>
</header>

<!-- ===================== ARCHIVE HERO ===================== -->
<section class="hero-bg text-white relative overflow-hidden"><div class="absolute inset-0 dot-pattern opacity-70 pointer-events-none"></div>
  <div class="max-w-7xl mx-auto px-4 sm:px-6 py-12 relative">
    <!-- Breadcrumb (global pattern) -->
    <nav aria-label="Breadcrumb" class="text-xs text-white/55 flex items-center flex-wrap gap-x-1.5 mb-4"><a href="public-home.html" class="hover:text-white transition">Home</a><span class="text-white/30">&rsaquo;</span><a href="public-solutions.html" class="hover:text-white transition">Solutions</a><span class="text-white/30">&rsaquo;</span><span id="bc-tail" class="text-white/85 font-medium truncate">Categories</span></nav>
    <h1 id="hero-title" class="font-jakarta font-extrabold text-3xl sm:text-5xl tracking-tight">Solution Categories <button onclick="openBrief('cat')" class="dev-badge align-middle ml-1 w-6 h-6 rounded-full bg-[#FF9900] text-[#0C1F31] items-center justify-center text-[11px] font-bold">i</button></h1>
    <p id="hero-sub" class="mt-4 text-white/70 max-w-2xl text-lg">Every solution we review, grouped by the problem it solves &mdash; from raising capital to running payroll.</p>
    <!-- Main-category switcher chips — real page links in production -->
    <div id="cat-bar" class="flex items-center gap-2 overflow-x-auto no-scrollbar -mx-1 px-1 mt-7"></div>
    <!-- Sub-category chips — only rendered when a main category is active -->
    <div id="sub-wrap" class="mt-3 hidden">
      <span class="block text-[11px] font-bold uppercase tracking-wider text-white/45 mb-2">Browse sub-categories</span>
      <div id="sub-bar" class="flex items-center gap-2 overflow-x-auto no-scrollbar -mx-1 px-1"></div>
    </div>
  </div>
</section>

<main class="max-w-7xl mx-auto px-4 sm:px-6 py-10">
  <div id="grid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-5"></div>
</main>

<footer class="bg-slate-100 border-t-2 border-dashed border-slate-400 relative overflow-hidden">
  <div class="absolute inset-0 opacity-30 pointer-events-none" style="background:repeating-linear-gradient(45deg,transparent,transparent 8px,rgba(100,116,139,.18) 8px,rgba(100,116,139,.18) 16px)"></div>
  <div class="relative max-w-7xl mx-auto px-4 sm:px-6 py-6 text-center">
    <p class="text-[10px] sm:text-[11px] font-bold uppercase tracking-widest text-slate-600 flex items-center justify-center gap-1.5">
      <i data-lucide="construction" class="w-3.5 h-3.5 text-slate-500"></i>
      Footer placeholder &middot; design pending
    </p>
    <p class="text-[11px] text-slate-500 mt-2">&copy; 2026 SME South Africa</p>
  </div>
</footer>

<div id="overlay-root"></div><div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 z-50"></div>
<script>
  function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
  function showToast(m){const el=document.getElementById('toast');el.classList.remove('hidden');el.innerHTML=`<div class="bg-[#0C1F31] text-white rounded-full pl-3 pr-5 py-2.5 shadow-2xl flex items-center gap-2 text-sm font-semibold" style="border-left:4px solid #29A37A"><i data-lucide="check-circle" class="w-4 h-4" style="color:#29A37A"></i><span>${esc(m)}</span></div>`;lucide.createIcons();setTimeout(()=>{el.classList.add('hidden');el.innerHTML='';},2400);}

  // SOLUTION TAXONOMY — mirrors the live sme-reviews structure: 7 main categories, 27 sub-categories.
  // NOTE: provider/brand counts are deliberately NOT stored or rendered anywhere on this page.
  const CATS = {
    'funding':{label:'Funding',icon:'banknote',tint:'bg-[#FDECEF] text-[#DC183C]',desc:'Compare lenders and funding routes — from working capital to purchase order finance.',subs:[
      {name:'Business Loans',desc:'General-purpose term loans for established businesses.'},
      {name:'Working Capital Loans',desc:'Short-term cover for stock, salaries and the day-to-day gap.'},
      {name:'Invoicing Finance',desc:'Unlock cash tied up in unpaid customer invoices.'},
      {name:'Bridging Finance',desc:'Short-term cover while a confirmed payout clears.'},
      {name:'Inventory Loans',desc:'Finance stock ahead of your peak trading season.'},
      {name:'Purchase Order Funding',desc:'Fund a confirmed order you do not yet have the cash to deliver.'},
      {name:'Crowdfunding Platforms',desc:'Raise from a crowd of backers instead of a single lender.'}
    ]},
    'finance-accounting':{label:'Finance & Accounting',icon:'calculator',tint:'bg-[#E4F5EE] text-[#29A37A]',desc:'Keep the books clean and get paid faster with the right financial stack.',subs:[
      {name:'Accounting Software',desc:'Ledgers, tax and reporting built for small teams.'},
      {name:'Payment Gateways',desc:'Take card and EFT payments online and in person.'},
      {name:'Business Banking',desc:'Business accounts compared on fees and features.'},
      {name:'POS Systems',desc:'Till, card and stock in one counter-top system.'}
    ]},
    'marketing-sales':{label:'Marketing & Sales',icon:'megaphone',tint:'bg-[#FFF1E0] text-[#AE6B0A]',desc:'Win and keep customers — from first touch to closed deal.',subs:[
      {name:'CRM Platforms',desc:'Track leads, deals and customer history in one place.'},
      {name:'E-mail Marketing Software',desc:'Build a list and send campaigns that convert.'},
      {name:'Social Media Management',desc:'Schedule, publish and measure across channels.'},
      {name:'Affiliate Networks',desc:'Earn or drive commission through partner programmes.'}
    ]},
    'web-it':{label:'Web & IT',icon:'globe',tint:'bg-[#F0F5F9] text-[#0C1F31]',desc:'Get online and stay online with hosting, connectivity and build tools.',subs:[
      {name:'AI App & Website Builders',desc:'Stand up a site or app without a developer.'},
      {name:'Web Hosting',desc:'Local and international hosting compared on uptime and price.'},
      {name:'E-commerce Website Builders',desc:'Sell online with cart, checkout and shipping built in.'},
      {name:'Business Fibre',desc:'Business-grade connectivity with real support SLAs.'}
    ]},
    'hr-team':{label:'HR & Team',icon:'users-round',tint:'bg-[#FDECEF] text-[#DC183C]',desc:'Hire, pay and develop your people without the admin drag.',subs:[
      {name:'Payroll & HR Software',desc:'Run payroll and stay compliant with SARS and UIF.'},
      {name:'Time & Attendance Software',desc:'Track hours, leave and shifts accurately.'},
      {name:'E-Learning Platforms',desc:'Upskill your team without pulling them off the floor.'}
    ]},
    'legal-compliance':{label:'Legal & Compliance',icon:'scale',tint:'bg-[#E4F5EE] text-[#29A37A]',desc:'Register, protect and insure the business the right way.',subs:[
      {name:'Company Registration',desc:'CIPC registration and the paperwork around it.'},
      {name:'Commercial Law Services',desc:'Contracts, disputes and commercial advice.'},
      {name:'Business Insurance',desc:'Cover for assets, liability and business interruption.'}
    ]},
    'operations-support':{label:'Operations & Support',icon:'headset',tint:'bg-[#FFF1E0] text-[#AE6B0A]',desc:'Run the day-to-day — bookings, tickets and customer support.',subs:[
      {name:'Booking & Scheduling Software',desc:'Let customers book themselves in, around your diary.'},
      {name:'Help Desk Software',desc:'Turn support requests into tracked, answerable tickets.'}
    ]}
  };
  const ORDER = ['funding','finance-accounting','marketing-sales','web-it','hr-team','legal-compliance','operations-support'];

  // Which view are we in? '' = the All state (categories directory); a key = that main category.
  // The hash wins once the user has clicked a chip; the ?cat= param only seeds the first paint.
  // The All state is written as #all (not an empty hash) so it can override a ?cat= param that is still in the URL.
  function getCat(){
    const p=new URLSearchParams(location.search).get('cat');
    const h=location.hash.replace('#','');
    const k=(h||p||'').toLowerCase();
    if(k==='all') return '';
    return CATS[k] ? k : '';
  }
  function setCat(k){ location.hash = k || 'all'; render(); }

  function render(){
    const active = getCat();
    const c = active ? CATS[active] : null;

    // ---- Hero reacts to the active category ----
    document.getElementById('bc-tail').textContent = c ? c.label : 'Categories';
    document.getElementById('hero-title').firstChild.textContent = (c ? c.label : 'Solution Categories') + ' ';
    document.getElementById('hero-sub').textContent = c ? c.desc
      : 'Every solution we review, grouped by the problem it solves — from raising capital to running payroll.';
    document.title = (c ? c.label + ' — Solution Categories' : 'Solution Categories') + ' — SME South Africa';

    // ---- Row 1: main categories (All + 7). Real <a> links in production. ----
    document.getElementById('cat-bar').innerHTML =
      `<button onclick="setCat('')" class="chip shrink-0 px-4 h-9 rounded-full border border-white/25 text-sm font-semibold text-white/80 ${!active?'active':''}">All</button>` +
      ORDER.map(k=>`<button onclick="setCat('${k}')" class="chip shrink-0 px-4 h-9 rounded-full border border-white/25 text-sm font-semibold text-white/80 ${k===active?'active':''}">${esc(CATS[k].label)}</button>`).join('');

    // ---- Row 2: sub-categories of the active category only ----
    const wrap = document.getElementById('sub-wrap');
    if(c){
      wrap.classList.remove('hidden');
      document.getElementById('sub-bar').innerHTML = c.subs.map(s=>
        `<a href="public-solution-category.html" class="chip shrink-0 px-4 h-9 rounded-full border border-white/25 text-sm font-semibold text-white/80 inline-flex items-center">${esc(s.name)}</a>`).join('');
    } else {
      wrap.classList.add('hidden');
      document.getElementById('sub-bar').innerHTML = '';
    }

    // ---- Body: All state = the 7 category cards; category state = that category's sub-category cards ----
    document.getElementById('grid').innerHTML = c ? c.subs.map(subCard).join('') : ORDER.map(k=>catCard(k,CATS[k])).join('');
    lucide.createIcons();
  }

  // Category card — anatomy identical to public-article-categories.html
  function catCard(key,c){
    return `<div class="bg-white rounded-2xl border border-[#E7EBEF] p-6 card-lift flex flex-col">
      <div class="w-12 h-12 rounded-xl ${c.tint} grid place-items-center mb-4"><i data-lucide="${c.icon}" class="w-6 h-6"></i></div>
      <a href="#${key}" onclick="setCat('${key}')" class="font-jakarta font-extrabold text-xl hover:text-[#DC183C] transition">${esc(c.label)}</a>
      <p class="text-sm text-[#6A7581] mt-1.5 leading-relaxed">${esc(c.desc)}</p>
      <div class="flex flex-wrap gap-2 mt-4">
        ${c.subs.map(s=>`<a href="public-solution-category.html" class="subchip px-3 py-1.5 rounded-full text-xs font-semibold bg-[#FCFCFC] border border-[#E7EBEF] text-[#121A21]">${esc(s.name)}</a>`).join('')}
      </div>
      <a href="#${key}" onclick="setCat('${key}')" class="inline-flex items-center gap-1 text-sm font-bold text-[#DC183C] mt-5 pt-4 border-t border-[#E7EBEF] hover:gap-2 transition-all">View all <i data-lucide="arrow-right" class="w-4 h-4"></i></a>
    </div>`;
  }

  // Sub-category card — links through to the ranked provider roundup
  function subCard(s){
    return `<a href="public-solution-category.html" class="bg-white rounded-2xl border border-[#E7EBEF] p-6 card-lift flex flex-col group">
      <div class="flex items-start justify-between gap-3">
        <p class="font-jakarta font-extrabold text-lg leading-tight group-hover:text-[#DC183C] transition">${esc(s.name)}</p>
        <i data-lucide="arrow-up-right" class="w-4 h-4 text-slate-300 group-hover:text-[#DC183C] transition shrink-0 mt-1"></i>
      </div>
      <p class="text-sm text-[#6A7581] mt-1.5 leading-relaxed flex-1">${esc(s.desc)}</p>
      <span class="inline-flex items-center gap-1 text-sm font-bold text-[#DC183C] mt-5 pt-4 border-t border-[#E7EBEF]">Compare providers <i data-lucide="arrow-right" class="w-4 h-4"></i></span>
    </a>`;
  }

  window.addEventListener('hashchange', render);
  render();

  const BRIEFS={cat:{title:'Solution Categories',sub:'One template \\u00b7 the All directory and every main category \\u00b7 8 URLs',
    purpose:'<b>Architecture decision:</b> ONE shared template serving <b>eight</b> distinct URLs \\u2014 <code>/sme-reviews/</code> (the All directory) plus one per main category (<code>/sme-reviews/funding/</code>, <code>/sme-reviews/finance-accounting/</code> and so on) \\u2014 <b>NOT</b> a single page with client-side tabs. This is the same decision already taken on <code>public-resource-category.html</code>, reused here so the two archives behave identically. It replaces what were briefly two separate mockups (a categories directory and a main-category page): the chip row makes the directory a state of the category page rather than a page of its own.',
    data:'One object, <b>CATS</b>, keyed by term slug: <code>{label, icon, tint, desc, subs[]}</code> where each sub is <code>{name, desc}</code>. <b>ORDER</b> fixes chip sequence. Mirrors the live <code>sme_review_categories</code> taxonomy \\u2014 7 main categories, 27 sub-categories. <b>No provider or brand counts</b> are stored or rendered \\u2014 we do not expose how many brands sit inside a category, so do not add a count badge or a \\u201cshowing N results\\u201d line on build.',
    logic:'<b>In production</b> each main category is its own WordPress taxonomy archive (term = main category) with its own URL, canonical, breadcrumb, meta tags and H1; <code>/sme-reviews/</code> is the parent archive rendering the All state. The chips become real <code>&lt;a href&gt;</code> links between those URLs \\u2014 they look like tabs but they are full page navigations. Hash routing here is a preview convenience only. <b>Body swaps by state:</b> All \\u2192 the 7 main-category cards; a category \\u2192 that category\\u2019s sub-category cards. Row 2 only renders when a category is active. Sub-category chips and cards both link to the ranked roundup (<code>public-solution-category.html</code>), which stays a separate editorial template. Empty sub-categories should be omitted, not shown as dead chips. <b>No date</b> \\u2014 category archives are evergreen listings.',
    components:'Archive hero (breadcrumb \\u00b7 H1 \\u00b7 sub \\u00b7 main-category chip row \\u00b7 conditional sub-category chip row) \\u00b7 body grid that swaps between category cards and sub-category cards. No section eyebrow, H2 or intro copy in the body \\u2014 the hero carries that.',
    specs:'<b>Archive hero:</b> navy hero-bg gradient + dot-pattern 70%. Container <code>max-w-7xl</code> = 1280px, <code>px-4 sm:px-6</code>, <code>py-12</code> = 48px.<br/><b>Breadcrumb:</b> 12px <code>rgba(255,255,255,0.55)</code>, separator <code>rgba(255,255,255,0.30)</code>, tail <code>rgba(255,255,255,0.85)</code> weight 500, 16px bottom margin.<br/><b>H1:</b> Plus Jakarta Sans weight 800, 30px mobile / 48px sm (<code>text-3xl sm:text-5xl</code>), tracking-tight, white.<br/><b>Hero sub:</b> 18px <code>rgba(255,255,255,0.70)</code>, max-width 672px, 16px top margin.<br/><b>Main-category chips:</b> 28px top margin (<code>mt-7</code>), <code>px-4 h-9</code> rounded-full, 1px border <code>rgba(255,255,255,0.25)</code>, 14px weight 600 <code>rgba(255,255,255,0.80)</code>; active bg <code>#FFFFFF</code> text <code>#0C1F31</code> border white. 8px gap, horizontally scrollable. <b>Real page links in production.</b><br/><b>Sub-category label:</b> 12px top margin, 11px weight 700 uppercase tracking-wider <code>rgba(255,255,255,0.45)</code>, 8px bottom margin.<br/><b>Sub-category chips:</b> same geometry as main chips, border <code>rgba(255,255,255,0.25)</code>; these navigate away so they carry no active state.<br/><br/><b>Main:</b> <code>max-w-7xl</code>, <code>px-4 sm:px-6</code>, <code>py-10</code> = 40px. Grid <code>sm:grid-cols-2 lg:grid-cols-3</code>, <code>gap-5</code> = 20px.<br/><br/><b>Category card (All state):</b> white bg, border <code>#E7EBEF</code>, <code>rounded-2xl</code> = 16px, <code>p-6</code> = 24px, card-lift hover (border <code>#DC183C</code>). Icon tile <b>48 \\u00d7 48px</b> <code>rounded-xl</code> with <code>mb-4</code>; icon <b>24 \\u00d7 24px</b>. Name <b>20px</b> (<code>text-xl</code>) Jakarta weight 800 <code>#121A21</code>, hover <code>#DC183C</code>. Desc 14px <code>#6A7581</code>. Sub-chips 12px weight 600, <code>bg #FCFCFC</code>, border <code>#E7EBEF</code>, <code>px-3 py-1.5</code> rounded-full, hover <code>#FDECEF</code>/<code>#B0142F</code>. View-all 14px weight 700 <code>#DC183C</code> above a <code>#E7EBEF</code> top border. <b>Anatomy is identical to <code>public-article-categories.html</code>.</b><br/><b>Sub-category card (category state):</b> same shell, whole card is the link. Name <b>18px</b> (<code>text-lg</code>) Jakarta weight 800 sharing the top row with an <code>arrow-up-right</code> <b>16 \\u00d7 16px</b> <code>#CBD5E1</code> \\u2192 <code>#DC183C</code> on hover. Desc 14px <code>#6A7581</code>. Footer link \\u201cCompare providers\\u201d 14px weight 700 <code>#DC183C</code>.<br/><b>Colour tokens:</b> tints cycle <code>#FDECEF/#DC183C</code>, <code>#E4F5EE/#29A37A</code>, <code>#FFF1E0/#AE6B0A</code>, <code>#F0F5F9/#0C1F31</code>.'}};
  function toggleDevMode(){const on=document.body.classList.toggle('dev-on');const b=document.getElementById('devToggle');if(b)b.classList.toggle('on',on);if(on)showToast('Dev Mode on — tap any ⓘ for implementation notes.');lucide.createIcons();}
  function closeOverlay(id){const el=document.getElementById(id);if(!el)return;el.classList.remove('open');setTimeout(()=>{if(el&&el.parentNode)el.remove();},300);}
  function openBrief(id){const b=BRIEFS[id];if(!b)return;const sec=(i,l,h)=>`<div class="px-6 py-4 border-t border-slate-100"><p class="text-[10px] font-bold uppercase tracking-widest text-[#DC183C] flex items-center gap-1.5 mb-2"><i data-lucide="${i}" class="w-3.5 h-3.5"></i>${l}</p><div class="text-sm text-slate-600 leading-relaxed">${h}</div></div>`;document.getElementById('overlay-root').innerHTML=`<div class="ov" id="ov"><div class="ov-bg" onclick="closeOverlay('ov')"></div><div class="drawer"><div class="sticky top-0 z-10 bg-[#0C1F31] text-white px-6 py-5 flex items-start justify-between"><div><p class="text-[10px] font-bold uppercase tracking-widest text-[#FF9900] mb-1">Dev Brief</p><h3 class="font-jakarta font-extrabold text-lg leading-tight">${b.title}</h3><p class="text-xs text-white/60 mt-1">${b.sub}</p></div><button onclick="closeOverlay('ov')" class="text-white/60 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button></div>${sec('target','Purpose',b.purpose)}${sec('database','Data model',b.data)}${sec('git-branch','Logic',b.logic)}${sec('ruler','Spec values',b.specs)}${sec('boxes','Components',b.components)}</div></div>`;requestAnimationFrame(()=>{const o=document.getElementById('ov');if(o)o.classList.add('open');});lucide.createIcons();}

  lucide.createIcons();
</script>
<script src="status.js"></script>
<script src="gate-links.js"></script>
</body>
</html>
