    let countdownInterval;

    // --- STATE MANAGEMENT ---
    function updateState(newState) {
      // Preserve input focus state during vanilla DOM re-renders
      const activeElementId = document.activeElement ? document.activeElement.id : null;
      let selectionStart = null;
      let selectionEnd = null;
      
      if (activeElementId && (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA')) {
        selectionStart = document.activeElement.selectionStart;
        selectionEnd = document.activeElement.selectionEnd;
      }

      state = { ...state, ...newState };
      renderApp();

      if (activeElementId) {
        const el = document.getElementById(activeElementId);
        if (el) {
          el.focus();
          if (selectionStart !== null && selectionEnd !== null) {
            el.setSelectionRange(selectionStart, selectionEnd);
          }
        }
      }
    }

    // --- TIMER & COUNTDOWN LOGIC ---
    function getCountdownText(start_datetime) {
      const targetDate = start_datetime ? new Date(start_datetime) : new Date(Date.now() + 8 * 24 * 60 * 60 * 1000); 
      const difference = +targetDate - +new Date();
      if (difference > 0) {
        const days = Math.floor(difference / (1000 * 60 * 60 * 24));
        const hours = Math.floor((difference / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((difference / 1000 / 60) % 60);
        const seconds = Math.floor((difference / 1000) % 60);
        
        if (days > 0) return `${days}d ${hours}h`;
        if (hours > 0) return `${hours}h ${minutes}m`;
        return `${minutes}m ${seconds}s`;
      }
      return 'Starting Soon';
    }

    function initCountdown() {
      clearInterval(countdownInterval);
      if (state.activeView !== 'event_detail' || !state.selectedEvent || state.selectedEvent.status !== 'Upcoming' || state.selectedEvent.type !== 'ONLINE') {
        return;
      }
      
      const el = document.getElementById('countdown-display');
      if (el) el.innerText = getCountdownText(state.selectedEvent.logistics.start_datetime);
      
      countdownInterval = setInterval(() => {
        const currentEl = document.getElementById('countdown-display');
        if (currentEl) {
          currentEl.innerText = getCountdownText(state.selectedEvent.logistics.start_datetime);
        } else {
          clearInterval(countdownInterval);
        }
      }, 1000);
    }

    // --- EVENT HANDLERS ---
    function handleReset() {
      updateState({ statusFilter: 'All', typeFilter: 'All', searchQuery: '' });
    }

    function openEventDetail(id) {
      const event = MOCK_EVENTS.find(e => e.id === id);
      updateState({
        selectedEvent: event,
        hasRegistered: false,
        activeView: 'event_detail'
      });
      window.scrollTo(0,0);
    }

    function navigateBack() {
      updateState({ activeView: 'directory', selectedEvent: null });
      window.scrollTo(0,0);
    }

    function toggleSponsorModal(isOpen) {
      updateState({ showSponsorModal: isOpen });
    }

    function handleSponsorSubmit(e) {
      e.preventDefault();
      toggleSponsorModal(false);
    }

    function handleWebinarRegister(e) {
      e.preventDefault();
      updateState({ hasRegistered: true });
    }

    function handleAddCalendar() {
      if (!state.selectedEvent) return;
      const title = encodeURIComponent(state.selectedEvent.title);
      const details = encodeURIComponent(state.selectedEvent.description);
      const url = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&details=${details}`;
      window.open(url, '_blank');
    }

    function handleInvite() {
      updateState({ showShareModal: true, copySuccess: false });
    }

    function copyToClipboard() {
      const dummy = document.createElement('input');
      document.body.appendChild(dummy);
      dummy.value = window.location.href;
      dummy.select();
      document.execCommand('copy');
      document.body.removeChild(dummy);
      
      updateState({ copySuccess: true });
      setTimeout(() => { updateState({ copySuccess: false }); }, 2000);
    }

    // --- HELPER FUNCTIONS ---
    function getFilteredEvents() {
      return MOCK_EVENTS.filter(ev => {
        // Hide isolated Video Snippets from the main event feed
        if (ev.type === 'VIDEO' && state.mainTab === 'feed') return false;

        if (state.statusFilter !== 'All' && ev.status !== state.statusFilter) return false;
        if (state.typeFilter !== 'All' && ev.type !== state.typeFilter) return false;
        if (state.searchQuery && !ev.title.toLowerCase().includes(state.searchQuery.toLowerCase())) return false;
        return true;
      }).sort((a, b) => {
        if (a.status === 'LIVE NOW' && b.status !== 'LIVE NOW') return -1;
        if (b.status === 'LIVE NOW' && a.status !== 'LIVE NOW') return 1;
        return 0;
      });
    }

            <button onclick="navigateBack()" class="flex items-center gap-2 text-slate-500 hover:text-[#0A2C3D] font-semibold transition-colors">

            <div class="flex items-center gap-6">

          </div>
        </div>

      } else {
        feedOrLibraryHtml = `
          <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">
            ${MOCK_EVENTS.filter(e => e.status === 'Past' && e.vault && e.type !== 'ONLINE').map(item => {
              
              let badgeLabel = '';
              if (item.type === 'VIDEO') badgeLabel = 'EVENT SNIPPET';
              else badgeLabel = 'PHOTO GALLERY';

              let imgSrc = (item.type === 'VIDEO') ? item.vault.recording_url : item.vault.gallery[0];
              let isVideo = (item.type === 'VIDEO');

              return `
                <div onclick="openEventDetail(${item.id})" class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden cursor-pointer hover:shadow-xl transition-all group relative">
                  
                  <div class="h-56 bg-slate-900 flex items-center justify-center relative overflow-hidden">
                    <img src="${imgSrc}" onerror="this.onerror=null;this.src='${PLACEHOLDER_IMAGE}'" class="w-full h-full object-cover ${!state.isLoggedIn ? 'opacity-30 blur-[3px]' : 'opacity-60'} group-hover:scale-105 transition-all duration-500" alt="Thumbnail" />
                    
                    ${!state.isLoggedIn ? `
                      <div class="absolute inset-0 flex flex-col items-center justify-center z-10 bg-[#0A2C3D]/40 mix-blend-multiply"></div>
                      <div class="absolute inset-0 flex flex-col items-center justify-center z-20">
                        <div class="w-12 h-12 bg-white/20 backdrop-blur-md rounded-full flex items-center justify-center border border-white/30 shadow-lg mb-2">
                          <i data-lucide="lock" class="text-white w-5 h-5"></i>
                        </div>
                        <span class="text-white font-oswald text-[10px] uppercase tracking-widest font-bold drop-shadow-md">Members Only</span>
                      </div>
                    ` : (isVideo ? `
                      <i data-lucide="play-circle" class="absolute text-white/90 group-hover:scale-110 transition-transform w-16 h-16 z-10 drop-shadow-lg"></i>
                    ` : `
                      <i data-lucide="image" class="absolute text-white/90 w-12 h-12 z-10 drop-shadow-lg"></i>
                    `)}
                  </div>
                  
                  <div class="p-6">
                    <span class="text-[#9C1C1F] font-extrabold text-[10px] tracking-widest mb-2 block">
                      ${badgeLabel}
                    </span>
                    <h3 class="text-lg font-extrabold text-[#0A2C3D] mb-1 leading-tight">${item.title}</h3>
                    <p class="text-sm text-slate-500 font-medium">From: ${item.logistics.display_date}</p>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
        `;
      }

      return `
        <div class="max-w-[1200px] mx-auto px-6 py-10">
          <div class="flex items-center gap-2 text-sm text-slate-500 font-medium mb-8">
            <i data-lucide="home" class="w-4 h-4"></i> <span>Home</span>
            <i data-lucide="chevron-right" class="w-[14px] h-[14px] text-slate-300"></i> <span>Events</span>
          </div>

          <div class="mb-10 flex justify-between items-end">
            <div>
              <h1 class="text-4xl md:text-5xl font-extrabold text-slate-900 tracking-tight mb-3 font-oswald uppercase text-[#0A2C3D]">
                Events & Webinars
              </h1>
              <p class="text-lg text-slate-500 font-medium">Explore our upcoming and past events. Join us to learn, network, and grow.</p>
            </div>
          </div>

          <div class="flex gap-4 mb-8">
            <button onclick="updateState({mainTab: 'feed'})" class="px-6 py-3 rounded-lg font-bold text-sm shadow-sm ${state.mainTab === 'feed' ? 'bg-[#9C1C1F] text-white' : 'bg-white text-slate-700 border border-slate-200'}">
              Event Feed
            </button>
            <button onclick="updateState({mainTab: 'library'})" class="px-6 py-3 rounded-lg font-bold text-sm shadow-sm ${state.mainTab === 'library' ? 'bg-[#9C1C1F] text-white' : 'bg-white text-slate-700 border border-slate-200'}">
              Event Library
            </button>
          </div>

          <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 mb-10 flex flex-wrap lg:flex-nowrap items-center justify-between gap-6">
            <div class="flex items-center gap-6 w-full lg:w-auto">
              <div class="flex items-center gap-3">
                <span class="font-bold text-slate-900 text-sm">Status:</span>
                ${['All', 'Upcoming', 'Past'].map(status => `
                  <button 
                    onclick="updateState({statusFilter: '${status}'})" 
                    class="flex items-center gap-2 px-4 py-2 rounded-full text-sm font-semibold border ${state.statusFilter === status ? 'bg-[#9C1C1F] text-white border-[#9C1C1F]' : 'bg-white text-slate-600 hover:bg-slate-50'}"
                  >
                    ${status} 
                  </button>
                `).join('')}
              </div>
            </div>

            <div class="flex items-center gap-3 w-full lg:w-auto border-t lg:border-t-0 lg:border-l border-slate-100 pt-4 lg:pt-0 lg:pl-6">
              <span class="font-bold text-slate-900 text-sm">Type:</span>
              ${['All', 'ONLINE', 'IN-PERSON'].map(type => `
                <button onclick="updateState({typeFilter: '${type}'})" class="px-5 py-2 rounded-full text-sm font-semibold border ${state.typeFilter === type ? 'bg-[#9C1C1F] text-white' : 'bg-white hover:bg-slate-50'}">${type}</button>
              `).join('')}
            </div>

            <div class="flex items-center gap-3 w-full xl:w-auto border-t xl:border-t-0 xl:border-l border-slate-100 pt-4 xl:pt-0 xl:pl-6">
              <div class="relative flex-1 xl:w-64">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4"></i>
                <input id="searchInput" type="text" placeholder="Search events..." value="${state.searchQuery}" oninput="updateState({searchQuery: this.value})" class="w-full pl-9 pr-4 py-2.5 rounded-lg border border-slate-200 text-sm bg-slate-50 outline-none focus:border-[#9C1C1F]" />
              </div>
              <button onclick="handleReset()" class="flex items-center gap-2 px-4 py-2.5 rounded-lg text-slate-500 bg-white border border-slate-200 text-sm font-semibold hover:bg-slate-50">
                <i data-lucide="rotate-ccw" class="w-4 h-4"></i>
              </button>
            </div>
          </div>
          
          ${feedOrLibraryHtml}
        </div>
      `;
    }

    function renderVideoRecording() {
      const event = state.selectedEvent;
      return `
        <div class="max-w-[900px] mx-auto px-6 py-16">
          <div class="mb-8">
            <div class="inline-flex items-center gap-2 px-3 py-1 bg-slate-200 rounded-full text-xs font-bold tracking-widest uppercase text-slate-700 mb-6">
              Event Snippet
            </div>
            <h1 class="text-4xl md:text-5xl font-oswald font-extrabold text-[#0A2C3D] leading-tight mb-4 uppercase">
              ${event.title}
            </h1>
            <p class="text-lg text-slate-600 leading-relaxed">${event.description}</p>
          </div>

          <div class="w-full aspect-video bg-slate-900 rounded-2xl overflow-hidden shadow-2xl border border-slate-200 relative mb-8">
            ${state.isLoggedIn ? `
               <iframe 
                  width="100%" 
                  height="100%" 
                  src="${event.vault.video_embed}" 
                  title="Video Replay" 
                  frameborder="0" 
                  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                  allowfullscreen
               ></iframe>
            ` : `
               <div class="relative w-full h-full flex flex-col items-center justify-center">
                  <img src="${event.vault.recording_url}" onerror="this.onerror=null;this.src='${PLACEHOLDER_IMAGE}'" class="absolute inset-0 w-full h-full object-cover opacity-40 blur-[4px]" alt="Video Background" />
                  <div class="absolute inset-0 bg-[#0A2C3D]/60 backdrop-blur-sm mix-blend-multiply"></div>
                  <div class="z-10 flex flex-col items-center text-center px-4 w-full max-w-md">
                    <div class="w-16 h-16 bg-white/10 backdrop-blur-md rounded-full flex items-center justify-center mb-4 border border-white/20 shadow-lg">
                      <i data-lucide="lock" class="text-white w-8 h-8"></i>
                    </div>
                    <h3 class="text-3xl font-oswald font-bold text-white uppercase tracking-wide drop-shadow-md mb-2">Members Only</h3>
                    <p class="text-white/80 font-medium text-sm mb-8 text-center drop-shadow-md">Sign in or create a free SME South Africa account to unlock this full recording.</p>
                    
                    <div class="flex flex-col sm:flex-row gap-4 w-full">
                      <button onclick="updateState({isLoggedIn: true})" class="flex-1 bg-[#9C1C1F] hover:bg-[#7a1518] text-white font-bold uppercase tracking-wider py-3.5 rounded-lg transition-colors text-sm shadow-md">
                        Sign In
                      </button>
                      <button onclick="updateState({isLoggedIn: true})" class="flex-1 bg-white/10 hover:bg-white/20 border border-white/30 text-white font-bold uppercase tracking-wider py-3.5 rounded-lg transition-colors text-sm">
                        Free Account
                      </button>
                    </div>
                  </div>
               </div>
            `}
          </div>
          
          ${state.isLoggedIn ? `
              <div class="flex justify-between items-center bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                  <div class="flex items-center gap-4 text-slate-500 text-sm font-medium">
                    <span class="flex items-center gap-1.5"><i data-lucide="calendar" class="w-4 h-4"></i> Recorded On: ${event.logistics.display_date}</span>
                  </div>
                  <button onclick="handleInvite()" class="bg-slate-50 hover:bg-slate-100 text-xs font-bold uppercase tracking-wider py-2.5 px-5 rounded-lg flex items-center gap-2 transition-colors text-slate-700 border border-slate-200 shadow-sm">
                      Share <i data-lucide="share-2" class="text-[#0A2C3D] w-4 h-4"></i>
                  </button>
              </div>
          ` : ''}
        </div>
      `;
    }

    function renderWebinar() {
      const event = state.selectedEvent;
      const isPast = event.status === 'Past';
      const isLive = event.status === 'LIVE NOW';

      let badgeHtml = '';
      if (isLive) {
          badgeHtml = '<span class="w-2 h-2 rounded-full bg-red-600"></span> Streaming Live';
      } else if (isPast) {
          badgeHtml = 'Recorded Webinar';
      } else {
          badgeHtml = 'Upcoming Online Event';
      }

      let mediaHtml = '';
      if (isPast) {
          if (state.isLoggedIn) {
              mediaHtml = `<iframe width="100%" height="100%" src="${event.vault.video_embed}" title="Video Replay" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
          } else {
              mediaHtml = `
                 <div class="relative w-full h-full flex flex-col items-center justify-center">
                    <img src="${event.vault.recording_url}" onerror="this.onerror=null;this.src='${PLACEHOLDER_IMAGE}'" class="absolute inset-0 w-full h-full object-cover opacity-40 blur-[4px]" alt="Video Background" />
                    <div class="absolute inset-0 bg-[#0A2C3D]/60 backdrop-blur-sm mix-blend-multiply"></div>
                    <div class="z-10 flex flex-col items-center text-center px-4 w-full max-w-md">
                      <div class="w-16 h-16 bg-white/10 backdrop-blur-md rounded-full flex items-center justify-center mb-4 border border-white/20 shadow-lg">
                        <i data-lucide="lock" class="text-white w-8 h-8"></i>
                      </div>
                      <h3 class="text-3xl font-oswald font-bold text-white uppercase tracking-wide drop-shadow-md mb-2">Members Only</h3>
                      <p class="text-white/80 font-medium text-sm mb-8 text-center drop-shadow-md">Sign in or create a free SME South Africa account to unlock this full recording.</p>
                      
                      <div class="flex flex-col sm:flex-row gap-4 w-full">
                        <button onclick="updateState({isLoggedIn: true})" class="flex-1 bg-[#9C1C1F] hover:bg-[#7a1518] text-white font-bold uppercase tracking-wider py-3.5 rounded-lg transition-colors text-sm shadow-md">
                          Sign In
                        </button>
                        <button onclick="updateState({isLoggedIn: true})" class="flex-1 bg-white/10 hover:bg-white/20 border border-white/30 text-white font-bold uppercase tracking-wider py-3.5 rounded-lg transition-colors text-sm">
                          Free Account
                        </button>
                      </div>
                    </div>
                 </div>
              `;
          }
      } else {
          mediaHtml = `
             <img src="https://images.unsplash.com/photo-1542744173-8e7e53415bb0?auto=format&fit=crop&q=80&w=1200" onerror="this.onerror=null;this.src='${PLACEHOLDER_IMAGE}'" alt="Stream Placeholder" class="w-full h-full object-cover opacity-50 group-hover:opacity-40 transition-opacity duration-700" />
             <div class="absolute inset-0 bg-gradient-to-t from-[#0A2C3D]/80 via-transparent to-transparent"></div>
             
             <div class="absolute inset-0 flex flex-col items-center justify-center p-6 text-center z-10">
               <div class="w-20 h-20 bg-black/40 backdrop-blur-md rounded-full flex items-center justify-center mb-4 border border-white/20 shadow-2xl group-hover:scale-110 transition-transform duration-500">
                  <i data-lucide="youtube" class="text-[#FF0000] w-10 h-10"></i>
               </div>
               <h4 class="text-2xl font-oswald font-bold text-white uppercase tracking-wide mb-2 drop-shadow-md">YouTube Live Stream</h4>
               ${isLive ? `
                 <p class="text-white font-medium text-sm drop-shadow-md bg-red-600/90 px-4 py-1.5 rounded-full animate-pulse">Broadcast is currently live</p>
               ` : `
                 <p class="text-slate-200 text-sm max-w-sm drop-shadow-md font-medium">The broadcast will appear here automatically when the event goes live.</p>
               `}
             </div>
             
             <div class="absolute top-6 left-6 flex items-start sm:items-center gap-3 z-10 pr-6">
                <div class="w-10 h-10 sm:w-12 sm:h-12 bg-white rounded-full flex items-center justify-center shadow-lg shrink-0 overflow-hidden p-1">
                  <img src="https://events.smesouthafrica.co.za/wp-content/uploads/2023/10/sme-sa-logo.png" onerror="this.onerror=null;this.src='${PLACEHOLDER_LOGO}'" class="w-full h-full object-contain" alt="SME SA Logo" />
                </div>
                <div>
                  <p class="text-white font-bold text-sm sm:text-base leading-tight drop-shadow-md line-clamp-1">${event.title}</p>
                  <p class="text-white/90 font-medium text-[10px] sm:text-xs leading-tight drop-shadow-md mt-0.5">SME South Africa • Official Broadcast</p>
                </div>
             </div>
          `;
      }

      return `
        <div class="max-w-[1000px] mx-auto px-6 py-16">
          <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
            <div class="lg:col-span-7 space-y-10">
              <div>
                <div class="inline-flex items-center gap-2 px-3 py-1 ${isPast ? 'bg-slate-200 text-slate-700' : 'bg-red-100 text-red-700 animate-pulse'} rounded-full text-xs font-bold tracking-widest uppercase mb-6">
                  ${badgeHtml}
                </div>
                <h1 class="text-4xl md:text-5xl font-oswald font-extrabold text-[#0A2C3D] leading-tight mb-4 uppercase">
                  ${event.title}
                </h1>
                <p class="text-lg text-slate-600 leading-relaxed">${event.description}</p>
                
                <!-- Main Media Area (Stream or Replay) -->
                <div class="mt-8 relative w-full aspect-video rounded-2xl overflow-hidden shadow-[0_10px_40px_-10px_rgba(0,0,0,0.2)] border border-slate-200 bg-slate-900 group">
                   ${mediaHtml}
                </div>
              </div>

              <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                   <h4 class="font-oswald font-bold uppercase text-[#0A2C3D] text-lg mb-4">Host</h4>
                   <div class="flex gap-4">
                     <img src="${event.host.img}" onerror="this.onerror=null;this.src='${PLACEHOLDER_AVATAR}'" alt="${event.host.name}" class="w-16 h-16 rounded-full object-cover border border-slate-200" />
                     <div>
                       <h5 class="font-bold text-slate-900">${event.host.name}</h5>
                       <p class="text-sm text-[#9C1C1F] font-medium mb-2">${event.host.role}</p>
                       <p class="text-xs text-slate-500 leading-relaxed">${event.host.bio}</p>
                     </div>
                   </div>
                </div>
                
                ${event.speaker ? `
                  <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                     <h4 class="font-oswald font-bold uppercase text-[#0A2C3D] text-lg mb-4">Speaker</h4>
                     <div class="flex gap-4">
                       <img src="${event.speaker.img}" onerror="this.onerror=null;this.src='${PLACEHOLDER_AVATAR}'" alt="${event.speaker.name}" class="w-16 h-16 rounded-full object-cover border border-slate-200" />
                       <div>
                         <h5 class="font-bold text-slate-900">${event.speaker.name}</h5>
                         <p class="text-sm text-[#9C1C1F] font-medium mb-2">${event.speaker.role}</p>
                         <p class="text-xs text-slate-500 leading-relaxed">${event.speaker.bio}</p>
                       </div>
                     </div>
                  </div>
                ` : ''}
              </div>

              ${event.sponsors?.length > 0 ? `
                <div>
                  <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">Sponsored By</p>
                  <div class="flex gap-4">
                    ${event.sponsors.map(sponsor => `
                      <img src="${sponsor.logo}" onerror="this.onerror=null;this.src='${PLACEHOLDER_LOGO}'" alt="${sponsor.name}" class="h-10 opacity-70 hover:opacity-100 transition-opacity grayscale hover:grayscale-0" />
                    `).join('')}
                  </div>
                </div>
              ` : ''}
            </div>

            <div class="lg:col-span-5">
              <div class="sticky top-24 space-y-4">
                
                <!-- Luma Style Date Block -->
                <div class="flex items-center gap-4">
                   <div class="bg-white border border-slate-200 rounded-lg overflow-hidden shadow-sm flex flex-col w-12 text-center shrink-0">
                      <div class="bg-slate-100 text-[9px] font-bold text-slate-500 py-0.5 border-b border-slate-200 uppercase">${event.logistics.month_split}</div>
                      <div class="font-oswald text-lg font-bold text-slate-800 py-1">${event.logistics.day_split}</div>
                   </div>
                   <div>
                      <h3 class="font-semibold text-slate-900">${event.logistics.display_date}</h3>
                      <p class="text-slate-500 text-sm">${event.logistics.display_time}</p>
                   </div>
                </div>

                <!-- Luma Style Location Block -->
                <div class="flex items-center gap-4">
                   <div class="w-12 h-12 bg-white border border-slate-200 rounded-lg shadow-sm flex items-center justify-center shrink-0 text-slate-600">
                     <i data-lucide="video" class="w-5 h-5"></i>
                   </div>
                   <div>
                     <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest leading-tight">Location</p>
                     <h3 class="font-semibold text-slate-900 leading-tight">${event.venue.platform}</h3>
                   </div>
                </div>

                <div class="pt-4">
                   ${isPast ? `
                      ${!state.isLoggedIn ? `
                        <div class="bg-white rounded-xl shadow-xl border border-slate-200 overflow-hidden">
                          <div class="bg-[#0A2C3D] px-6 py-4 border-b border-[#0A2C3D]">
                            <span class="text-sm font-oswald font-bold uppercase tracking-wide text-white flex items-center gap-2"><i data-lucide="lock" class="w-4 h-4"></i> Member Access</span>
                          </div>
                          <div class="p-6">
                            <p class="text-slate-600 text-sm font-medium mb-5">Sign in or create a free SME South Africa account to unlock this recording and our full event library.</p>
                            <div class="space-y-3">
                              <button onclick="updateState({isLoggedIn: true})" class="w-full bg-[#9C1C1F] hover:bg-[#7a1518] text-white font-bold uppercase tracking-wider py-3.5 rounded-lg transition-colors text-sm shadow-md">Sign In</button>
                              <button onclick="updateState({isLoggedIn: true})" class="w-full bg-white hover:bg-slate-50 text-[#0A2C3D] border-2 border-[#0A2C3D] font-bold uppercase tracking-wider py-3.5 rounded-lg transition-colors text-sm">Create Free Account</button>
                            </div>
                          </div>
                        </div>
                      ` : `
                        <div class="bg-white rounded-xl shadow-xl border border-slate-200 overflow-hidden">
                          <div class="bg-[#10B981] px-6 py-4 border-b border-[#10B981] text-white flex justify-between items-center">
                              <h3 class="text-xl font-oswald font-bold tracking-wide uppercase">Access Granted</h3>
                              <i data-lucide="check-circle-2" class="text-white w-6 h-6"></i>
                          </div>
                          <div class="p-6 text-center">
                            <i data-lucide="play-circle" class="text-[#0A2C3D] mx-auto mb-4 w-12 h-12 block"></i>
                            <p class="text-slate-700 font-bold mb-1">You're all set!</p>
                            <p class="text-slate-500 text-sm mb-6">Enjoy the full video recording and insights from the session.</p>
                            <button onclick="handleInvite()" class="w-full bg-slate-50 hover:bg-slate-100 text-xs font-bold uppercase tracking-wider py-3.5 rounded-lg flex items-center justify-center gap-2 transition-colors text-slate-700 border border-slate-200 shadow-sm">
                                Share Replay <i data-lucide="share-2" class="text-[#0A2C3D] w-4 h-4"></i>
                            </button>
                          </div>
                        </div>
                      `}
                   ` : `
                      ${!state.isLoggedIn ? `
                        <div class="bg-white rounded-xl shadow-xl border border-slate-200 overflow-hidden">
                          <div class="bg-[#0A2C3D] px-6 py-4 border-b border-[#0A2C3D]">
                            <span class="text-sm font-oswald font-bold uppercase tracking-wide text-white flex items-center gap-2"><i data-lucide="lock" class="w-4 h-4"></i> Member Access</span>
                          </div>
                          <div class="p-6">
                            <p class="text-slate-600 text-sm font-medium mb-5">Sign in or create a free SME South Africa account to register for this event.</p>
                            <div class="space-y-3">
                              <button onclick="updateState({isLoggedIn: true})" class="w-full bg-[#9C1C1F] hover:bg-[#7a1518] text-white font-bold uppercase tracking-wider py-3.5 rounded-lg transition-colors text-sm shadow-md">
                                Sign In
                              </button>
                              <button onclick="updateState({isLoggedIn: true})" class="w-full bg-white hover:bg-slate-50 text-[#0A2C3D] border-2 border-[#0A2C3D] font-bold uppercase tracking-wider py-3.5 rounded-lg transition-colors text-sm">
                                Create Free Account
                              </button>
                            </div>
                          </div>
                        </div>
                      ` : !state.hasRegistered ? `
                        <div class="bg-white rounded-xl shadow-xl border border-slate-200 overflow-hidden">
                          <div class="bg-[#0A2C3D] px-6 py-4 border-b border-[#0A2C3D]">
                            <span class="text-sm font-oswald font-bold uppercase tracking-wide text-white">Event Registration</span>
                          </div>
                          <div class="p-6">
                             <p class="text-slate-600 text-sm font-medium mb-5">Welcome back! Please confirm your details to register for this event.</p>
                             <form onsubmit="handleWebinarRegister(event)">
                               <div class="space-y-4 mb-6">

    // Router Logic
    function routeEventDetail() {
      if (!state.selectedEvent) return '';
      if (state.selectedEvent.type === 'ONLINE') {
        return renderWebinar();
      } else if (state.selectedEvent.type === 'VIDEO') {
        return renderVideoRecording();
      } else {
        if (state.selectedEvent.status === 'Past') return renderPastInPerson();
        return renderUpcomingInPerson();
      }
    }

    // Main App Compiler
    function renderApp() {
      const root = document.getElementById('app');
      let html = '';
      
      html += renderTopBar();
      
      if (state.activeView === 'directory') {
        html += renderDirectory();
      } else if (state.activeView === 'event_detail') {
        html += routeEventDetail();
      }

      if (state.showSponsorModal) {
        html += renderSponsorModal();
      }

      if (state.showShareModal) {
        html += renderShareModal();
      }

      root.innerHTML = html;
      
      // Initialize Lucide Icons after HTML is injected
      if (window.lucide) {
        window.lucide.createIcons();
      }

      // Re-initialize countdown timer if applicable
      initCountdown();
    }

    // Bootstrapping App
    document.addEventListener("DOMContentLoaded", function() {
      renderApp();
    });

  </script>
