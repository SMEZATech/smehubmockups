      const personBlock = (label, s)=> `<button onclick="navigate('#/speaker/${s.id}')" class="text-left bg-white p-6 rounded-2xl shadow-sm border border-[#E7EBEF] hover:shadow-lg transition-all w-full group"><h4 class="font-jakarta font-bold text-[#0C1F31] text-base mb-4">${label}</h4><div class="flex gap-4"><div class="w-16 h-16 shrink-0 rounded-full grid place-items-center bg-[#FFF1E0] text-[#0C1F31] font-jakarta font-bold text-xl ring-2 ring-slate-100 group-hover:bg-[#DC183C] group-hover:text-white transition-colors">${initials(s.name)}</div><div><h5 class="font-bold text-[#121A21] group-hover:text-[#DC183C] transition-colors">${esc(s.name)}</h5><p class="text-sm text-[#DC183C] font-medium mb-1.5">${esc(s.role)}</p><p class="text-xs text-slate-500 leading-relaxed line-clamp-3">${esc(s.bio)}</p></div></div></button>`;

      else if(isPast){ cta = `<div class="bg-white rounded-2xl shadow-xl border border-[#E7EBEF] overflow-hidden"><div class="bg-[#29A37A] px-6 py-4 text-white flex justify-between items-center"><h3 class="text-lg font-jakarta font-bold">Access Granted</h3><i data-lucide="check-circle-2" class="w-6 h-6"></i></div><div class="p-6 text-center"><i data-lucide="play-circle" class="text-[#0C1F31] mx-auto mb-3 w-12 h-12"></i><p class="text-slate-700 font-bold mb-1">You're all set</p><p class="text-slate-500 text-sm mb-5">Enjoy the full recording above.</p><button onclick="openShare(byId(${ev.id}))" class="w-full bg-slate-50 hover:bg-slate-100 text-xs font-bold uppercase tracking-wide py-3.5 rounded-lg flex items-center justify-center gap-2 text-slate-700 border border-[#E7EBEF]">Share Replay <i data-lucide="share-2" class="w-4 h-4 text-[#0C1F31]"></i></button></div></div>`; }
      else if(!registered){ cta = `<div class="bg-white rounded-2xl shadow-xl border border-[#E7EBEF] overflow-hidden"><div class="bg-[#0C1F31] px-6 py-4"><span class="text-sm font-jakarta font-bold uppercase tracking-wide text-white">${isLive?'Join the Live Session':'Event Registration'}</span></div><div class="p-6"><p class="text-slate-600 text-sm font-medium mb-5">Welcome back! Confirm your details to register.</p><div class="space-y-3 mb-5"><input id="reg-name" type="text" value="Tshepho Joel" class="w-full border border-[#E7EBEF] rounded-lg px-4 py-3 text-sm outline-none focus:border-[#DC183C] bg-slate-50" /><input id="reg-email" type="email" value="tshepho@smesouthafrica.co.za" class="w-full border border-[#E7EBEF] rounded-lg px-4 py-3 text-sm outline-none focus:border-[#DC183C] bg-slate-50" /></div><button onclick="registerWebinar(${ev.id})" class="w-full bg-[#DC183C] hover:bg-[#B0142F] text-white font-bold uppercase tracking-wide py-3.5 rounded-lg text-sm shadow-md">${isLive?'Register & Join':'Register Now'}</button></div></div>`; }
      else { cta = `<div class="bg-white rounded-2xl shadow-xl border border-[#E7EBEF] overflow-hidden"><div class="bg-[#29A37A] px-6 py-4 text-white flex justify-between items-center"><h3 class="text-lg font-jakarta font-bold">You're In!</h3><i data-lucide="check-circle-2" class="w-6 h-6"></i></div><div class="p-6">${isLive ? `<div class="bg-[#FDECEF] rounded-xl p-5 mb-5 border border-[#DC183C]/15"><div class="flex items-center gap-2 text-[#DC183C] font-bold text-xs tracking-widest uppercase mb-4 animate-pulse"><span class="w-2.5 h-2.5 bg-[#DC183C] rounded-full"></span> Streaming Live</div><a href="${ev.venue.link}" target="_blank" rel="noreferrer" class="flex items-center justify-center gap-2 w-full bg-[#DC183C] hover:bg-[#B0142F] text-white font-bold uppercase tracking-wide py-4 rounded-xl text-sm shadow-md"><i data-lucide="video" class="w-5 h-5"></i> Join Zoom Meeting</a></div>` : `<div class="bg-slate-50 rounded-xl p-5 mb-5 border border-[#E7EBEF]"><div class="flex items-center gap-2 text-slate-500 font-bold text-xs uppercase tracking-widest mb-1"><i data-lucide="clock" class="w-4 h-4 text-slate-400"></i> Event starting in</div><div id="countdown-display" class="text-[#0C1F31] font-jakarta font-bold text-3xl tracking-wide">Calculating…</div><div class="h-px w-full bg-[#E7EBEF] my-4"></div><p class="text-slate-600 text-sm font-medium">The join link activates when the event is about to start.</p></div>`}<div class="flex gap-2"><button onclick="openCalendar(byId(${ev.id}))" class="flex-1 bg-white hover:bg-slate-50 text-xs font-bold uppercase tracking-wide py-3.5 rounded-lg flex items-center justify-center gap-1.5 text-slate-700 border border-[#E7EBEF]"><i data-lucide="calendar-plus" class="w-4 h-4 text-[#DC183C]"></i> Calendar</button><button onclick="openShare(byId(${ev.id}))" class="flex-1 bg-white hover:bg-slate-50 text-xs font-bold uppercase tracking-wide py-3.5 rounded-lg flex items-center justify-center gap-1.5 text-slate-700 border border-[#E7EBEF]">Invite <i data-lucide="share-2" class="w-4 h-4 text-[#DC183C]"></i></button></div></div></div>`; }
      return `${subHeader()}<main class="max-w-[1000px] mx-auto px-4 sm:px-6 py-8 md:py-14"><div class="grid grid-cols-1 lg:grid-cols-12 gap-8 lg:gap-12"><div class="lg:col-span-7 space-y-8 order-2 lg:order-1"><div class="reveal"><span class="inline-flex items-center gap-2 px-3 py-1 ${isPast?'bg-slate-200 text-slate-700':'bg-[#FDECEF] text-[#DC183C]'} rounded-full text-xs font-bold tracking-widest uppercase mb-5">${badge}</span><h1 class="text-3xl sm:text-5xl font-jakarta font-extrabold text-[#0C1F31] leading-tight mb-4">${ev.title}</h1><p class="text-lg text-slate-600 leading-relaxed">${ev.description}</p><div class="mt-7 relative w-full aspect-video rounded-2xl overflow-hidden shadow-xl border border-[#E7EBEF] bg-[#0C1F31]">${media}</div></div><div class="grid grid-cols-1 sm:grid-cols-2 gap-5 reveal">${personBlock('Host', host)}${speaker?personBlock('Speaker', speaker):''}</div>${ev.sponsors&&ev.sponsors.length?`<div class="reveal"><p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">Sponsored by</p><div class="flex gap-4">${ev.sponsors.map(s=>`<img src="${s.logo}" ${OE_LO} alt="${esc(s.name)}" class="h-10 opacity-70 hover:opacity-100 grayscale hover:grayscale-0 transition" />`).join('')}</div></div>`:''}</div><div class="lg:col-span-5 order-1 lg:order-2"><div class="lg:sticky lg:top-24 space-y-4"><div class="flex items-center gap-4 reveal"><div class="bg-white border border-[#E7EBEF] rounded-xl overflow-hidden shadow-sm flex flex-col w-12 text-center shrink-0"><div class="bg-slate-100 text-[9px] font-bold text-slate-500 py-0.5 uppercase">${ev.logistics.month_split||''}</div><div class="font-jakarta text-lg font-bold text-[#121A21] py-1">${ev.logistics.day_split||''}</div></div><div><h3 class="font-semibold text-[#121A21]">${ev.logistics.display_date}</h3><p class="text-slate-500 text-sm">${ev.logistics.display_time}</p></div></div><div class="flex items-center gap-4 reveal"><div class="w-12 h-12 bg-white border border-[#E7EBEF] rounded-xl shadow-sm grid place-items-center shrink-0 text-slate-600"><i data-lucide="video" class="w-5 h-5"></i></div><div><p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Location</p><h3 class="font-semibold text-[#121A21]">${ev.venue.platform}</h3></div></div><div class="pt-2 reveal">${cta}</div></div></div></div></main>`;
    }

        <div class="hero-bg text-center p-7 relative shrink-0 grain"><button onclick="activeOverlayClose && activeOverlayClose()" aria-label="Close" class="absolute top-4 right-4 text-white/70 hover:text-white"><i data-lucide="x" class="w-6 h-6"></i></button><span class="bg-[#DC183C] text-white text-[10px] font-bold uppercase tracking-widest px-3 py-1 rounded inline-block mb-2">Corporate Inquiries</span><h2 class="font-jakarta text-3xl sm:text-4xl font-extrabold text-white tracking-wide">Partner With Us</h2><p class="text-slate-300 text-sm mt-2">Submit your details and our team will be in touch.</p></div>
        <form onsubmit="event.preventDefault(); track('submit_sponsor_form'); if(activeOverlayClose) activeOverlayClose(); showToast('Thanks — our partnerships team will be in touch.');" class="p-6 sm:p-7 overflow-y-auto no-scrollbar space-y-4">
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4"><div><label class="text-xs font-bold text-[#DC183C] uppercase tracking-wide">First name</label><input id="sp-first" required class="w-full border border-[#E7EBEF] rounded-lg p-3 mt-1 outline-none focus:border-[#0C1F31] bg-[#FAFAFA]" /></div><div><label class="text-xs font-bold text-[#DC183C] uppercase tracking-wide">Last name</label><input id="sp-last" required class="w-full border border-[#E7EBEF] rounded-lg p-3 mt-1 outline-none focus:border-[#0C1F31] bg-[#FAFAFA]" /></div></div>
          <div><label class="text-xs font-bold text-[#DC183C] uppercase tracking-wide">Email</label><input id="sp-email" type="email" required class="w-full border border-[#E7EBEF] rounded-lg p-3 mt-1 outline-none focus:border-[#0C1F31] bg-[#FAFAFA]" /></div>
          <div><label class="text-xs font-bold text-[#DC183C] uppercase tracking-wide">Phone</label><input id="sp-phone" type="tel" placeholder="071 123 4567" required class="w-full border border-[#E7EBEF] rounded-lg p-3 mt-1 outline-none focus:border-[#0C1F31] bg-[#FAFAFA]" /></div>
          <div><label class="text-xs font-bold text-[#DC183C] uppercase tracking-wide">Company</label><input id="sp-co" required class="w-full border border-[#E7EBEF] rounded-lg p-3 mt-1 outline-none focus:border-[#0C1F31] bg-[#FAFAFA]" /></div>
          <div><label class="text-xs font-bold text-[#DC183C] uppercase tracking-wide">Tell us about your business</label><textarea id="sp-msg" rows="3" class="w-full border border-[#E7EBEF] rounded-lg p-3 mt-1 outline-none focus:border-[#0C1F31] bg-[#FAFAFA]"></textarea></div>
          <button type="submit" class="w-full bg-[#0C1F31] hover:bg-[#091621] text-white font-bold py-4 rounded-lg uppercase tracking-wider transition-colors mt-2">Submit Inquiry</button>
        </form>
      </div></div>`);
    }
    // ===== CHECKOUT MODULE ========================================================
    const Checkout = {
      ev:null, step:1, qty:{}, lead:{}, attendees:[], card:{}, errors:{}, processing:false, order:null,

      open(ev){
        this.ev = ev; this.step = 1; this.qty = {};
        ev.tickets.tiers.forEach(t=> this.qty[t.id] = 0);
        this.lead = { name: state.isLoggedIn?'Tshepho Joel':'', email: state.isLoggedIn?'tshepho@smesouthafrica.co.za':'', phone:'', company:'', dietary:'' };
        this.attendees = []; this.card = { number:'', name:'', expiry:'', cvc:'' };
        this.errors = {}; this.processing = false; this.order = null;
        document.body.style.overflow = 'hidden';
        activeOverlayClose = ()=> this.close();
        track('begin_checkout', { event_id:ev.id });
        this.render();
      },
      close(){ const r=document.getElementById('overlay-root'); if(r) r.innerHTML=''; document.body.style.overflow=''; activeOverlayClose = null; },

      count(){ return Object.values(this.qty).reduce((a,b)=>a+b,0); },
      subtotal(){ return this.ev.tickets.tiers.reduce((s,t)=> s + (this.qty[t.id]||0)*t.price, 0); },
      fee(){ return Math.round(this.subtotal() * (this.ev.tickets.bookingFeePct/100) * 100) / 100; },
      total(){ return this.subtotal() + this.fee(); },

      setQty(tierId, n){
        const tier = this.ev.tickets.tiers.find(t=>t.id===tierId);
        const max = Math.min(tier.remaining, tier.max);
        this.qty[tierId] = Math.max(0, Math.min(n, max));
        const needed = Math.max(0, this.count() - 1);
        while(this.attendees.length < needed) this.attendees.push({ name:'' });
        while(this.attendees.length > needed) this.attendees.pop();
        this.render();
      },

      validate(step){
        const e = {};
        if(step===1 && this.count()===0) e.tickets = 'Please select at least 1 ticket';
        if(step===2){
          if(!this.lead.name.trim()) e.name='Required';
          if(!/^\S+@\S+\.\S+$/.test(this.lead.email||'')) e.email='Please enter a valid email';
          if(!(this.lead.phone||'').trim()) e.phone='Required';
          this.attendees.forEach((a,i)=>{ if(!a.name.trim()) e['att'+i]='Required'; });
        }
        if(step===3){
          const digits = (this.card.number||'').replace(/\s/g,'');
          if(digits.length<13||digits.length>19) e.cardNumber='Enter a valid card number';
          if(!(this.card.name||'').trim()) e.cardName='Required';
          if(!/^\d{2}\/\d{2}$/.test(this.card.expiry||'')) e.expiry='MM/YY';
          if(!/^\d{3,4}$/.test(this.card.cvc||'')) e.cvc='3–4 digits';
        }
        this.errors = e; return Object.keys(e).length===0;
      },

      next(){
        if(!this.validate(this.step)){ this.render(); return; }
        if(this.step < 3){ this.step++; track('checkout_step',{ event_id:this.ev.id, step:this.step }); this.render(); }
        else this.pay();
      },
      back(){ if(this.step>1){ this.step--; this.render(); } },

      pay(){
        this.processing = true; this.render();
        setTimeout(()=>{
          const tickets = this.ev.tickets.tiers.filter(t=>this.qty[t.id]>0).map(t=>({ name:t.name, qty:this.qty[t.id], unit:t.price, subtotal:t.price*this.qty[t.id] }));
          this.order = { ref:'SME-'+new Date().getFullYear()+'-'+String(Math.floor(Math.random()*9000+1000)), paidAt:Date.now(), attendees:[this.lead.name, ...this.attendees.map(a=>a.name)], tickets, subtotal:this.subtotal(), fee:this.fee(), total:this.total() };
          track('purchase',{ event_id:this.ev.id, value:this.order.total, currency:'ZAR', tickets:this.count(), order_ref:this.order.ref });
          this.processing = false; this.step = 4; this.render(); this.fireConfetti();
        }, 1400);
      },

      fireConfetti(){
        const root = document.getElementById('overlay-root'); if(!root) return;
        const colors = ['#DC183C','#0C1F31','#FF9900','#AE6B0A','#29A37A'];
        const layer = document.createElement('div');
        layer.style.cssText = 'position:fixed; inset:0; pointer-events:none; z-index:1200; overflow:hidden';
        for(let i=0;i<80;i++){
          const c = document.createElement('span');
          c.className = 'confetti-piece';
          c.style.left = (Math.random()*100)+'vw';
          c.style.background = colors[Math.floor(Math.random()*colors.length)];
          c.style.animationDuration = (1.6 + Math.random()*1.8)+'s';
          c.style.animationDelay = (Math.random()*0.4)+'s';
          c.style.transform = 'rotate('+(Math.random()*360)+'deg)';
          layer.appendChild(c);
        }
        root.appendChild(layer);
        setTimeout(()=> layer.remove(), 3800);
      },

      onCardInput(el){
        const digits = el.value.replace(/\D/g,'').slice(0,19);
        const formatted = digits.replace(/(\d{4})/g,'$1 ').trim();
        this.card.number = formatted; el.value = formatted;
      },
      printTicket(){
        const original = document.getElementById('ticketCard');
        if(!original){ window.print(); return; }
        const existing = document.getElementById('print-portal'); if(existing) existing.remove();
        const portal = document.createElement('div'); portal.id = 'print-portal';
        portal.appendChild(original.cloneNode(true));
        document.body.appendChild(portal);
        track('print_ticket', { event_id: this.ev.id, order_ref: this.order && this.order.ref });
        try{ window.print(); } finally { setTimeout(()=>{ const p=document.getElementById('print-portal'); if(p) p.remove(); }, 1000); }
      },
      onExpiryInput(el){
        let d = el.value.replace(/\D/g,'').slice(0,4);
        if(d.length>=3) d = d.slice(0,2)+'/'+d.slice(2);
        this.card.expiry = d; el.value = d;
      },
      cardBrand(){
        const d = (this.card.number||'').replace(/\s/g,'');
        if(/^4/.test(d)) return 'Visa';
        if(/^5[1-5]/.test(d) || /^2[2-7]/.test(d)) return 'Mastercard';
        if(/^3[47]/.test(d)) return 'Amex';
        return '';
      },

      render(){
        const root = document.getElementById('overlay-root'); if(!root) return;
        setHTML(root, this.step===4 ? this.renderThankYou() : this.renderShell());
      },

      renderShell(){
        const labels = ['Tickets','Details','Payment'];
        const stepper = `<div class="flex items-center justify-between px-5 sm:px-7 py-4 border-b border-[#E7EBEF] bg-white shrink-0">
          <div class="flex items-center gap-1.5 sm:gap-3 overflow-x-auto no-scrollbar">
            ${[1,2,3].map(n=>{ const done=this.step>n, active=this.step===n; return `
              <div class="flex items-center gap-2 shrink-0">
                <span class="w-7 h-7 rounded-full grid place-items-center font-bold text-xs ${done?'bg-[#29A37A] text-white':active?'bg-[#DC183C] text-white':'bg-slate-200 text-slate-500'}">${done?'<i data-lucide="check" class="w-3.5 h-3.5"></i>':n}</span>
                <span class="hidden sm:inline font-bold uppercase text-[11px] tracking-wider ${active||done?'text-[#0C1F31]':'text-slate-400'}">${labels[n-1]}</span>
              </div>
              ${n<3 ? `<div class="w-4 sm:w-8 h-px ${done?'bg-[#29A37A]':'bg-slate-200'} shrink-0"></div>` : ''}
            `; }).join('')}
          </div>
          <button onclick="Checkout.close()" aria-label="Close checkout" class="shrink-0 w-9 h-9 grid place-items-center rounded-full text-slate-400 hover:text-slate-700 bg-white border border-[#E7EBEF] ml-3"><i data-lucide="x" class="w-4 h-4"></i></button>
        </div>`;

        let body, ctaLabel;
        if(this.step===1){ body = this.renderStepTickets(); ctaLabel = 'Continue'; }
        else if(this.step===2){ body = this.renderStepDetails(); ctaLabel = 'Continue to payment'; }
        else { body = this.renderStepPayment(); ctaLabel = 'Pay '+money(this.total()); }

        const showBack = this.step>1 && !this.processing;
        const showTotal = this.count()>0;

        const footer = `<div class="border-t border-[#E7EBEF] bg-slate-50 px-5 sm:px-7 py-4 flex items-center gap-3 shrink-0" style="padding-bottom:max(1rem, env(safe-area-inset-bottom));">
          ${showBack ? `<button onclick="Checkout.back()" class="text-sm font-bold text-slate-600 hover:text-[#0C1F31] uppercase tracking-wide px-2 py-2.5">← Back</button>` : ''}
          ${showTotal ? `<div class="hidden sm:block min-w-0"><p class="text-[10px] font-bold text-slate-400 uppercase tracking-wide leading-none">Total</p><p class="font-jakarta text-xl font-bold text-[#0C1F31] leading-none mt-1">${money(this.total())}</p></div>`:''}
          <button onclick="${this.processing?'':'Checkout.next()'}" class="ml-auto bg-[#DC183C] hover:bg-[#B0142F] text-white font-bold uppercase tracking-wide text-sm px-5 sm:px-7 py-3.5 rounded-xl flex items-center gap-2 ${this.processing?'opacity-90 cursor-wait':''}">${this.processing ? `<svg class="spin w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="12" cy="12" r="9" opacity=".3"/><path d="M12 3a9 9 0 0 1 9 9" stroke-linecap="round"/></svg> Processing…` : `${ctaLabel} <i data-lucide="arrow-right" class="w-4 h-4"></i>`}</button>
        </div>`;

        return `<div class="fixed inset-0 z-[70] bg-black/60 scrim flex items-end sm:items-center justify-center sm:p-4 backdrop-blur-sm" onclick="if(event.target===this) Checkout.close()">
          <div role="dialog" aria-modal="true" aria-labelledby="checkout-title" class="bg-white w-full sm:max-w-2xl sm:rounded-2xl rounded-t-3xl overflow-hidden shadow-2xl sheet flex flex-col" style="max-height:95vh">
            ${stepper}
            <div class="flex-1 overflow-y-auto custom-scrollbar p-5 sm:p-7">${body}</div>
            ${footer}
          </div>
        </div>`;
      },

      renderStepTickets(){
        const tiers = this.ev.tickets.tiers;
        return `<div class="space-y-5">
          <div>
            <h2 id="checkout-title" class="font-jakarta text-2xl sm:text-3xl font-extrabold text-[#0C1F31] mb-1">Select Tickets</h2>
            <p class="text-sm text-slate-500">${esc(this.ev.title)} · ${esc(this.ev.logistics.display_date)}</p>
          </div>
          <div class="space-y-3">${tiers.map(tier=>{
            const q = this.qty[tier.id]||0;
            const max = Math.min(tier.remaining, tier.max);
            const sold = tier.remaining<=0;
            const low = tier.remaining<=10 && !sold;
            const selected = q>0;
            return `<div class="border-2 ${selected?'border-[#DC183C] bg-[#DC183C]/[0.04]':'border-[#E7EBEF] bg-white'} rounded-2xl p-4 sm:p-5 transition-colors">
              <div class="flex flex-col sm:flex-row sm:items-start gap-4">
                <div class="flex-1 min-w-0">
                  <div class="flex flex-wrap items-center gap-2 mb-1">
                    <h3 class="font-jakarta font-bold text-lg text-[#0C1F31]">${esc(tier.name)}</h3>
                    ${tier.badge ? `<span class="text-[9px] font-bold uppercase tracking-wider px-2 py-0.5 rounded bg-[#FFF1E0] text-[#AE6B0A]">${esc(tier.badge)}</span>`:''}
                  </div>
                  <p class="text-sm text-slate-500">${esc(tier.blurb)}</p>
                  <p class="font-jakarta text-2xl font-extrabold text-[#DC183C] mt-2">${money(tier.price)}</p>
                  ${low ? `<p class="text-[11px] font-bold text-[#DC183C] mt-1 flex items-center gap-1"><i data-lucide="flame" class="w-3.5 h-3.5"></i> Only ${tier.remaining} left</p>` : sold ? `<p class="text-[11px] font-bold text-slate-400 mt-1">Sold out</p>` : ''}
                </div>
                <div class="flex items-center gap-3 shrink-0 self-end sm:self-center">
                  ${sold ? `<span class="text-xs font-bold text-slate-400 uppercase tracking-wide">Unavailable</span>` : `
                    <button onclick="Checkout.setQty('${tier.id}',${q-1})" aria-label="Decrease quantity" ${q<=0?'disabled':''} class="w-10 h-10 rounded-full border-2 border-[#E7EBEF] hover:border-[#DC183C] hover:text-[#DC183C] grid place-items-center transition-colors disabled:opacity-30 disabled:hover:border-[#E7EBEF] disabled:hover:text-current"><i data-lucide="minus" class="w-4 h-4"></i></button>
                    <span class="font-jakarta font-bold text-xl w-7 text-center text-[#0C1F31]">${q}</span>
                    <button onclick="Checkout.setQty('${tier.id}',${q+1})" aria-label="Increase quantity" ${q>=max?'disabled':''} class="w-10 h-10 rounded-full border-2 border-[#E7EBEF] hover:border-[#DC183C] hover:text-[#DC183C] grid place-items-center transition-colors disabled:opacity-30 disabled:hover:border-[#E7EBEF] disabled:hover:text-current"><i data-lucide="plus" class="w-4 h-4"></i></button>
                  `}
                </div>
              </div>
            </div>`;
          }).join('')}</div>
          ${this.errors.tickets ? `<p class="text-sm text-[#DC183C] font-semibold">${this.errors.tickets}</p>` : ''}
          ${this.count()>0 ? `<div class="bg-slate-50 rounded-xl p-4 space-y-2 border border-[#E7EBEF]">
            <div class="flex justify-between text-sm"><span class="text-slate-500">Subtotal</span><span class="font-bold">${money(this.subtotal())}</span></div>
            <div class="flex justify-between text-sm"><span class="text-slate-500">Booking fee (${this.ev.tickets.bookingFeePct}%)</span><span class="font-bold">${money(this.fee())}</span></div>
            <div class="flex justify-between pt-2 border-t border-[#E7EBEF]"><span class="font-bold text-[#0C1F31]">Total</span><span class="font-jakarta font-extrabold text-xl text-[#0C1F31]">${money(this.total())}</span></div>
          </div>` : ''}
        </div>`;
      },

      renderStepDetails(){
        const errSpan = (k)=> this.errors[k] ? `<p class="text-xs text-[#DC183C] font-semibold mt-1">${this.errors[k]}</p>` : '';
        const inp = 'w-full border border-[#E7EBEF] rounded-lg px-4 py-3 text-sm outline-none focus:border-[#DC183C] bg-slate-50';
        const lbl = 'text-xs font-bold uppercase tracking-wide text-slate-500 mb-1 block';
        const totalQty = this.count();
        return `<div class="space-y-6">
          <div>
            <h2 id="checkout-title" class="font-jakarta text-2xl sm:text-3xl font-extrabold text-[#0C1F31] mb-1">Your Details</h2>
            <p class="text-sm text-slate-500">Booking ${totalQty} ticket${totalQty>1?'s':''} for ${esc(this.ev.title)}</p>
          </div>
          <div>
            <h3 class="font-jakarta font-bold text-base text-[#0C1F31] mb-3">Lead booker</h3>
            <div class="space-y-3">
              <div><label class="${lbl}">Full name</label><input id="co-name" type="text" value="${esc(this.lead.name)}" oninput="Checkout.lead.name=this.value" class="${inp}" />${errSpan('name')}</div>
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <div><label class="${lbl}">Email</label><input id="co-email" type="email" value="${esc(this.lead.email)}" oninput="Checkout.lead.email=this.value" class="${inp}" />${errSpan('email')}</div>
                <div><label class="${lbl}">Phone</label><input id="co-phone" type="tel" value="${esc(this.lead.phone)}" oninput="Checkout.lead.phone=this.value" class="${inp}" placeholder="071 234 5678" />${errSpan('phone')}</div>
              </div>
              <div><label class="${lbl}">Company <span class="text-slate-400 font-normal normal-case">(optional)</span></label><input id="co-co" type="text" value="${esc(this.lead.company)}" oninput="Checkout.lead.company=this.value" class="${inp}" /></div>
              <div><label class="${lbl}">Dietary requirements</label><select id="co-diet" onchange="Checkout.lead.dietary=this.value" class="${inp}">
                <option value="" ${this.lead.dietary===''?'selected':''}>None</option>
                <option value="vegetarian" ${this.lead.dietary==='vegetarian'?'selected':''}>Vegetarian</option>
                <option value="vegan" ${this.lead.dietary==='vegan'?'selected':''}>Vegan</option>
                <option value="halaal" ${this.lead.dietary==='halaal'?'selected':''}>Halaal</option>
                <option value="kosher" ${this.lead.dietary==='kosher'?'selected':''}>Kosher</option>
                <option value="gluten-free" ${this.lead.dietary==='gluten-free'?'selected':''}>Gluten-free</option>
              </select></div>
            </div>
          </div>
          ${totalQty>1 ? `<div>
            <h3 class="font-jakarta font-bold text-base text-[#0C1F31] mb-3">Additional attendees</h3>
            <div class="space-y-3">${this.attendees.map((a,i)=>`<div><label class="${lbl}">Attendee ${i+2} full name</label><input id="co-att${i}" type="text" value="${esc(a.name)}" oninput="Checkout.attendees[${i}].name=this.value" class="${inp}" />${errSpan('att'+i)}</div>`).join('')}</div>
          </div>` : ''}
        </div>`;
      },

      renderStepPayment(){
        const errSpan = (k)=> this.errors[k] ? `<p class="text-xs text-[#DC183C] font-semibold mt-1">${this.errors[k]}</p>` : '';
        const inp = 'w-full border border-[#E7EBEF] rounded-lg px-4 py-3 text-sm outline-none focus:border-[#DC183C] bg-slate-50';
        const lbl = 'text-xs font-bold uppercase tracking-wide text-slate-500 mb-1 block';
        const tickets = this.ev.tickets.tiers.filter(t=>this.qty[t.id]>0);
        const brand = this.cardBrand();
        return `<div class="space-y-6">
          <div>
            <h2 id="checkout-title" class="font-jakarta text-2xl sm:text-3xl font-extrabold text-[#0C1F31] mb-1">Payment</h2>
            <p class="text-sm text-slate-500">Final step — review and pay.</p>
          </div>
          <div class="bg-slate-50 rounded-xl p-4 sm:p-5 border border-[#E7EBEF]">
            <h3 class="font-jakarta font-bold text-sm text-[#0C1F31] mb-3">Order summary</h3>
            <div class="space-y-2 text-sm">
              ${tickets.map(t=>`<div class="flex justify-between"><span class="text-slate-600">${esc(t.name)} × ${this.qty[t.id]}</span><span class="font-semibold">${money(t.price*this.qty[t.id])}</span></div>`).join('')}
              <div class="flex justify-between text-slate-500 pt-2 border-t border-[#E7EBEF]"><span>Booking fee</span><span>${money(this.fee())}</span></div>
              <div class="flex justify-between pt-2 border-t border-[#E7EBEF]"><span class="font-bold text-[#0C1F31]">Total</span><span class="font-jakarta font-extrabold text-xl text-[#0C1F31]">${money(this.total())}</span></div>
            </div>
          </div>
          <div>
            <h3 class="font-jakarta font-bold text-base text-[#0C1F31] mb-3">Card details</h3>
            <div class="space-y-3">
              <div>
                <label class="${lbl}">Card number</label>
                <div class="relative">
                  <input id="co-card" type="text" inputmode="numeric" autocomplete="cc-number" placeholder="4242 4242 4242 4242" value="${esc(this.card.number)}" oninput="Checkout.onCardInput(this)" class="${inp} pr-20" />
                  <span class="absolute right-3 top-1/2 -translate-y-1/2 flex items-center gap-2">${brand ? `<span class="text-[10px] font-bold uppercase tracking-wider text-[#0C1F31] bg-slate-200 px-2 py-0.5 rounded">${brand}</span>`:''}<i data-lucide="credit-card" class="w-5 h-5 text-slate-400"></i></span>
                </div>
                ${errSpan('cardNumber')}
              </div>
              <div><label class="${lbl}">Name on card</label><input id="co-cardname" type="text" autocomplete="cc-name" value="${esc(this.card.name)}" oninput="Checkout.card.name=this.value" class="${inp}" />${errSpan('cardName')}</div>
              <div class="grid grid-cols-2 gap-3">
                <div><label class="${lbl}">Expiry (MM/YY)</label><input id="co-exp" type="text" inputmode="numeric" autocomplete="cc-exp" placeholder="08/27" value="${esc(this.card.expiry)}" oninput="Checkout.onExpiryInput(this)" maxlength="5" class="${inp}" />${errSpan('expiry')}</div>
                <div><label class="${lbl}">CVC</label><input id="co-cvc" type="text" inputmode="numeric" autocomplete="cc-csc" placeholder="123" value="${esc(this.card.cvc)}" oninput="Checkout.card.cvc=this.value.replace(/\\D/g,'').slice(0,4)" maxlength="4" class="${inp}" />${errSpan('cvc')}</div>
              </div>
            </div>
            <p class="text-[11px] text-slate-400 mt-3 flex items-center gap-1.5"><i data-lucide="shield-check" class="w-3.5 h-3.5"></i> Payments are simulated for this demo — no card is charged.</p>
          </div>
        </div>`;
      },

      renderThankYou(){
        const ev = this.ev, o = this.order;
        const qrText = `${linkFor(ev)}?order=${o.ref}`;
        const ticketLine = o.tickets.map(t=>`${t.name} × ${t.qty}`).join(', ');
        const cityShort = ev.venue.address ? ev.venue.address.split(',').slice(-3,-1).join(',').trim() : '';
        return `<div class="fixed inset-0 z-[70] bg-black/60 scrim flex items-end sm:items-center justify-center sm:p-4 backdrop-blur-sm overflow-y-auto" onclick="if(event.target===this) Checkout.close()">
          <div role="dialog" aria-modal="true" class="bg-white w-full sm:max-w-2xl sm:rounded-2xl rounded-t-3xl overflow-hidden shadow-2xl sheet my-auto" style="max-height:95vh">
            <div class="overflow-y-auto custom-scrollbar p-6 sm:p-8 text-center" style="max-height:95vh">
              <div class="no-print">
                <div class="w-20 h-20 mx-auto bg-[#29A37A]/15 rounded-full grid place-items-center mb-5" style="animation: successPop .6s cubic-bezier(.2,.7,.2,1)">
                  <svg class="w-12 h-12 text-[#29A37A]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7" stroke-dasharray="30" stroke-dashoffset="30" style="animation: ringDraw .5s .3s ease forwards"/></svg>
                </div>
                <p class="text-[#DC183C] font-bold text-xs tracking-[0.2em] uppercase mb-2">Order Confirmed</p>
                <h2 class="font-jakarta text-3xl sm:text-4xl font-extrabold text-[#0C1F31] mb-2">You're going!</h2>
                <p class="text-slate-500 text-sm mb-6 max-w-md mx-auto">A confirmation has been sent to <span class="font-semibold text-[#0C1F31]">${esc(this.lead.email)}</span>. Save or print your ticket below.</p>
              </div>

              <div id="ticketCard" class="bg-white rounded-2xl overflow-hidden shadow-2xl border border-[#E7EBEF] text-left mx-auto" style="max-width:560px">
                <div class="flex flex-col sm:flex-row">
                  <div class="hero-bg grain text-white p-6 sm:p-7 sm:w-2/3 relative overflow-hidden">
                    <div class="hero-vignette absolute inset-0 opacity-30"></div>
                    <div class="relative">
                      <div class="flex items-center justify-between mb-5">
                        <span class="bg-[#DC183C] text-white font-jakarta font-bold px-2.5 py-1 text-[10px] uppercase tracking-widest rounded">SME</span>
                        <span class="text-[10px] font-bold text-white/50 uppercase tracking-widest">e-Ticket</span>
                      </div>
                      <h3 class="font-jakarta text-xl sm:text-2xl font-extrabold leading-tight mb-4">${esc(ev.title)}</h3>
                      <div class="space-y-1.5 text-sm text-white/85 mb-5">
                        <div class="flex items-center gap-2"><i data-lucide="calendar" class="w-4 h-4 text-[#FF9900] shrink-0"></i> ${esc(ev.logistics.display_date)}</div>
                        <div class="flex items-center gap-2"><i data-lucide="clock" class="w-4 h-4 text-[#FF9900] shrink-0"></i> ${esc(ev.logistics.display_time)}</div>
                        <div class="flex items-start gap-2"><i data-lucide="map-pin" class="w-4 h-4 text-[#FF9900] shrink-0 mt-0.5"></i> <span>${esc(ev.venue.name)}${cityShort?', '+esc(cityShort):''}</span></div>
                      </div>
                      <div class="border-t border-white/10 pt-4 grid grid-cols-2 gap-3 text-xs">
                        <div><p class="text-white/50 font-bold uppercase tracking-wider mb-0.5">Attendee</p><p class="font-bold text-sm">${esc(this.lead.name)}</p></div>
                        <div><p class="text-white/50 font-bold uppercase tracking-wider mb-0.5">Ticket${o.tickets.length>1?'s':''}</p><p class="font-bold text-sm">${esc(ticketLine)}</p></div>
                      </div>
                    </div>
                  </div>
                  <div class="sm:hidden border-t-2 border-dashed border-[#0C1F31]/20 relative"><div class="absolute -left-2 -top-2 w-4 h-4 bg-[#FCFCFC] rounded-full border border-[#E7EBEF]"></div><div class="absolute -right-2 -top-2 w-4 h-4 bg-[#FCFCFC] rounded-full border border-[#E7EBEF]"></div></div>
                  <div class="hidden sm:block border-l-2 border-dashed border-[#0C1F31]/20 relative"><div class="absolute -top-2 -left-2 w-4 h-4 bg-[#FCFCFC] rounded-full border border-[#E7EBEF]"></div><div class="absolute -bottom-2 -left-2 w-4 h-4 bg-[#FCFCFC] rounded-full border border-[#E7EBEF]"></div></div>
                  <div class="bg-white p-6 sm:p-7 sm:w-1/3 flex flex-col items-center justify-center text-center">
                    <div class="bg-white p-2 rounded-lg border border-[#E7EBEF] mb-3">${makeQR(qrText, 140)}</div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Order ref</p>
                    <p class="font-jakarta text-lg font-extrabold text-[#0C1F31] tracking-wide">${esc(o.ref)}</p>
                    <p class="text-[10px] text-slate-400 mt-2">${esc(money(o.total))}</p>
                  </div>
                </div>
              </div>

              <div class="no-print mt-7">
                <div class="grid grid-cols-2 sm:grid-cols-3 gap-3 mb-3">
                  <a href="${googleCalUrl(ev)}" target="_blank" rel="noreferrer" onclick="track('add_to_calendar',{method:'google',event_id:${ev.id}})" class="bg-white border border-[#E7EBEF] hover:bg-slate-50 text-slate-700 text-xs font-bold uppercase tracking-wide py-3 rounded-lg flex items-center justify-center gap-2"><i data-lucide="calendar" class="w-4 h-4 text-[#DC183C]"></i> Google Cal</a>
                  <button onclick="downloadICS(Checkout.ev)" class="bg-white border border-[#E7EBEF] hover:bg-slate-50 text-slate-700 text-xs font-bold uppercase tracking-wide py-3 rounded-lg flex items-center justify-center gap-2"><i data-lucide="download" class="w-4 h-4 text-[#DC183C]"></i> .ics File</button>
                  <button onclick="Checkout.printTicket()" class="col-span-2 sm:col-span-1 bg-white border border-[#E7EBEF] hover:bg-slate-50 text-slate-700 text-xs font-bold uppercase tracking-wide py-3 rounded-lg flex items-center justify-center gap-2"><i data-lucide="printer" class="w-4 h-4 text-[#DC183C]"></i> Print / PDF</button>
                </div>
                <button onclick="Checkout.close()" class="w-full bg-[#0C1F31] hover:bg-[#091621] text-white font-bold uppercase tracking-wide py-4 rounded-xl text-sm">Done</button>
              </div>
            </div>
          </div>
        </div>`;
      }
    };

    function openCheckout(){
      const ev = byId(state.params.id);
      if(!ev || !ev.tickets) return;
      Checkout.open(ev);
    }

    // === App + bootstrap ==========================================================
    function initCountdown(){
      clearInterval(countdownInterval);
      const update = ()=>{
        const el = document.getElementById('countdown-display'); if(!el) return clearInterval(countdownInterval);
        const ev = byId(state.params.id); if(!ev || !ev.logistics.startMs) return;
        const diff = ev.logistics.startMs - Date.now();
        if(diff <= 0){ el.innerText = 'Starting Soon'; return; }
        const days = Math.floor(diff/86400000), hrs = Math.floor(diff/3600000)%24, mins = Math.floor(diff/60000)%60, secs = Math.floor(diff/1000)%60;
        el.innerText = days>0 ? `${days}d ${hrs}h` : hrs>0 ? `${hrs}h ${mins}m` : `${mins}m ${secs}s`;
      };
      update();
      countdownInterval = setInterval(update, 1000);
    }
    function renderApp(){
      const app = document.getElementById('app');
      let html = '';
      if(state.view==='directory') html += renderDirectory();
      else if(state.view==='event') html += renderEventDetail();
      else if(state.view==='speaker') html += renderSpeakerProfile();
      setHTML(app, html);
      initCountdown();
    }
    document.addEventListener('DOMContentLoaded', ()=>{
      seedDemoDates();
      window.addEventListener('hashchange', route);
      window.addEventListener('keydown', (e)=>{ if(e.key==='Escape'){ if(activeOverlayClose){ activeOverlayClose(); } else { closeBrief('ovBrief'); } } });
      route();
    });
  </script>
<script src="status.js"></script>
<script src="gate-links.js"></script>
</body>
</html>
