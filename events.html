    function makeQR(text, size=176){
      const N = 25; let h = 2166136261;
      for(let i=0;i<text.length;i++){ h ^= text.charCodeAt(i); h = Math.imul(h, 16777619) >>> 0; }
      const rnd = ()=>{ h = (Math.imul(h,1103515245) + 12345) >>> 0; return (h >>> 16) / 65536; };
      const cell = size / N;
      const finders = [[0,0],[0,N-7],[N-7,0]];
      const inFinder = (r,c)=> finders.some(([br,bc])=> r>=br && r<br+7 && c>=bc && c<bc+7);
      const finderOn = (r,c)=>{ const f = finders.find(([br,bc])=> r>=br && r<br+7 && c>=bc && c<bc+7); const rr=r-f[0], cc=c-f[1]; const border=(rr===0||rr===6||cc===0||cc===6); const center=(rr>=2&&rr<=4&&cc>=2&&cc<=4); return border||center; };
      let rects = '';
      for(let r=0;r<N;r++){ for(let c=0;c<N;c++){ const on = inFinder(r,c) ? finderOn(r,c) : (rnd() > 0.52); if(on) rects += `<rect x="${(c*cell).toFixed(2)}" y="${(r*cell).toFixed(2)}" width="${cell.toFixed(2)}" height="${cell.toFixed(2)}"/>`; } }

      else { cta = `<div class="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden"><div class="bg-[#10B981] px-6 py-4 text-white flex justify-between items-center"><h3 class="text-lg font-oswald font-bold uppercase">You're In!</h3><i data-lucide="check-circle-2" class="w-6 h-6"></i></div><div class="p-6">${isLive ? `<div class="bg-red-50 rounded-xl p-5 mb-5 border border-red-100"><div class="flex items-center gap-2 text-red-700 font-bold text-xs tracking-widest uppercase mb-4 animate-pulse"><span class="w-2.5 h-2.5 bg-red-600 rounded-full"></span> Streaming Live</div><a href="${ev.venue.link}" target="_blank" rel="noreferrer" class="flex items-center justify-center gap-2 w-full bg-[#9C1C1F] hover:bg-[#7a1518] text-white font-bold uppercase tracking-wide py-4 rounded-xl text-sm shadow-md"><i data-lucide="video" class="w-5 h-5"></i> Join Zoom Meeting</a></div>` : `<div class="bg-slate-50 rounded-xl p-5 mb-5 border border-slate-100"><div class="flex items-center gap-2 text-slate-500 font-bold text-xs uppercase tracking-widest mb-1"><i data-lucide="clock" class="w-4 h-4 text-slate-400"></i> Event starting in</div><div id="countdown-display" class="text-[#0A2C3D] font-oswald font-bold text-3xl tracking-wide">Calculating…</div><div class="h-px w-full bg-slate-200 my-4"></div><p class="text-slate-600 text-sm font-medium">The join link activates when the event is about to start.</p></div>`}<div class="flex gap-2"><button onclick="openCalendar(byId(${ev.id}))" class="flex-1 bg-white hover:bg-slate-50 text-xs font-bold uppercase tracking-wide py-3.5 rounded-lg flex items-center justify-center gap-1.5 text-slate-700 border border-slate-200"><i data-lucide="calendar-plus" class="w-4 h-4 text-[#9C1C1F]"></i> Calendar</button><button onclick="openShare(byId(${ev.id}))" class="flex-1 bg-white hover:bg-slate-50 text-xs font-bold uppercase tracking-wide py-3.5 rounded-lg flex items-center justify-center gap-1.5 text-slate-700 border border-slate-200">Invite <i data-lucide="share-2" class="w-4 h-4 text-[#9C1C1F]"></i></button></div></div></div>`; }
      return `<main class="max-w-[1000px] mx-auto px-4 sm:px-6 py-8 md:py-14"><div class="grid grid-cols-1 lg:grid-cols-12 gap-8 lg:gap-12"><div class="lg:col-span-7 space-y-8 order-2 lg:order-1"><div class="reveal"><span class="inline-flex items-center gap-2 px-3 py-1 ${isPast?'bg-slate-200 text-slate-700':'bg-red-100 text-red-700'} rounded-full text-xs font-bold tracking-widest uppercase mb-5">${badge}</span><h1 class="text-3xl sm:text-5xl font-oswald font-extrabold text-[#0A2C3D] leading-tight uppercase mb-4">${ev.title}</h1><p class="text-lg text-slate-600 leading-relaxed">${ev.description}</p><div class="mt-7 relative w-full aspect-video rounded-2xl overflow-hidden shadow-xl border border-slate-200 bg-slate-900">${media}</div></div><div class="grid grid-cols-1 sm:grid-cols-2 gap-5 reveal">${personBlock('Host', host)}${speaker?personBlock('Speaker', speaker):''}</div>${ev.sponsors&&ev.sponsors.length?`<div class="reveal"><p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">Sponsored by</p><div class="flex gap-4">${ev.sponsors.map(s=>`<img src="${s.logo}" ${OE_LO} alt="${esc(s.name)}" class="h-10 opacity-70 hover:opacity-100 grayscale hover:grayscale-0 transition" />`).join('')}</div></div>`:''}</div><div class="lg:col-span-5 order-1 lg:order-2"><div class="lg:sticky lg:top-24 space-y-4"><div class="flex items-center gap-4 reveal"><div class="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm flex flex-col w-12 text-center shrink-0"><div class="bg-slate-100 text-[9px] font-bold text-slate-500 py-0.5 uppercase">${ev.logistics.month_split||''}</div><div class="font-oswald text-lg font-bold text-slate-800 py-1">${ev.logistics.day_split||''}</div></div><div><h3 class="font-semibold text-slate-900">${ev.logistics.display_date}</h3><p class="text-slate-500 text-sm">${ev.logistics.display_time}</p></div></div><div class="flex items-center gap-4 reveal"><div class="w-12 h-12 bg-white border border-slate-200 rounded-xl shadow-sm grid place-items-center shrink-0 text-slate-600"><i data-lucide="video" class="w-5 h-5"></i></div><div><p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Location</p><h3 class="font-semibold text-slate-900">${ev.venue.platform}</h3></div></div><div class="pt-2 reveal">${cta}</div></div></div></div></main>`;
    }
    function registerWebinar(id){ state.registered[id]=true; track('webinar_register',{event_id:id}); renderApp(); }

    // === Speaker Profile (inner page) =============================================
    function renderSpeakerProfile(){
      const s = sp(state.params.id); if(!s) return renderDirectory();
      const sessions = sessionsFor(s.id);
      return `<main class="max-w-[820px] mx-auto px-4 sm:px-6 py-10 md:py-16">
        <div class="reveal">
          <p class="text-[#9C1C1F] font-bold text-xs tracking-[0.2em] uppercase mb-3">Speaker</p>

          <p class="text-lg sm:text-xl text-slate-600 font-semibold mb-7">${esc(s.role)} <span class="text-slate-300 mx-1">·</span> ${esc(s.company)}</p>
          <a href="${s.linkedin}" target="_blank" rel="noreferrer" class="inline-flex items-center gap-2 bg-[#0A66C2] hover:bg-[#0a5aab] text-white font-bold text-sm px-5 py-3 rounded-xl transition-colors mb-8"><i data-lucide="linkedin" class="w-4 h-4"></i> View LinkedIn</a>

        </div>
        ${sessions.length ? `<section class="mt-14 reveal" style="animation-delay:120ms">
          <div class="flex justify-between items-end border-b-2 border-[#0A2C3D] pb-3 mb-7"><h2 class="font-oswald text-2xl sm:text-3xl font-bold uppercase text-[#0A2C3D]">Speaking At</h2><span class="text-[10px] font-bold text-[#9C1C1F] uppercase tracking-[0.2em] hidden sm:block">${sessions.length} session${sessions.length>1?'s':''}</span></div>
          <div class="space-y-3">${sessions.map((s,i)=>`<button onclick="navigate('#/event/${s.ev.id}')" class="reveal w-full text-left bg-white p-5 rounded-xl border border-slate-100 shadow-sm hover:shadow-md hover:-translate-y-0.5 transition-all flex items-start gap-5" style="animation-delay:${i*60}ms"><div class="shrink-0 w-12 text-center bg-slate-50 rounded-lg py-2 border border-slate-100"><div class="text-[9px] font-bold text-slate-400 uppercase">${s.ev.logistics.month_split||''}</div><div class="font-oswald font-bold text-[#0A2C3D]">${s.ev.logistics.day_split||''}</div></div><div class="min-w-0 flex-1"><div class="flex flex-wrap items-center gap-2 mb-1"><span class="text-[10px] font-extrabold uppercase tracking-wider px-2 py-0.5 rounded bg-[#FFF2CD] text-[#A67B1E]">${s.kind}</span></div><p class="font-bold text-[#0A2C3D] leading-snug">${esc(s.title)}</p><p class="text-xs text-slate-500 mt-1">${esc(s.ev.title)} · ${esc(s.ev.logistics.display_date||'')}</p></div><i data-lucide="chevron-right" class="w-5 h-5 text-slate-300 mt-3 shrink-0"></i></button>`).join('')}</div>
        </section>`:''}
      </main>`;
    }

    // === Overlays: Share / Sponsor / Video / Calendar =============================
    function closeOverlay(){ const r=document.getElementById('overlay-root'); if(r){ r.innerHTML=''; } document.body.style.overflow=''; activeOverlayClose=null; }
    function mountOverlay(html, onClose){ const r=document.getElementById('overlay-root'); document.body.style.overflow='hidden'; setHTML(r, html); activeOverlayClose = onClose || closeOverlay; }
    function openShare(ev){
      const url = linkFor(ev);
      track('open_share',{ event_id:ev.id });
      mountOverlay(`<div class="fixed inset-0 z-[60] flex items-end sm:items-center justify-center bg-black/60 scrim p-0 sm:p-4 backdrop-blur-sm" onclick="if(event.target===this) activeOverlayClose && activeOverlayClose()"><div role="dialog" aria-modal="true" class="bg-white w-full sm:max-w-md sm:rounded-2xl rounded-t-3xl overflow-hidden shadow-2xl sheet">
        <div class="px-6 py-5 border-b border-slate-100 flex justify-between items-center bg-slate-50"><h3 class="font-oswald text-xl font-bold uppercase text-[#0A2C3D]">Share Event</h3><button onclick="activeOverlayClose && activeOverlayClose()" aria-label="Close" class="w-9 h-9 grid place-items-center rounded-full text-slate-400 hover:text-slate-700 bg-white border border-slate-200"><i data-lucide="x" class="w-4 h-4"></i></button></div>
        <div class="p-6">
          <div class="flex items-start gap-4 mb-6"><div class="w-12 h-12 bg-slate-100 rounded-lg grid place-items-center shrink-0 border border-slate-200 text-[#0A2C3D]"><i data-lucide="calendar" class="w-5 h-5"></i></div><div><h4 class="font-bold text-sm text-slate-900 leading-tight mb-1 line-clamp-2">${esc(ev.title)}</h4><p class="text-xs font-medium text-slate-500">${esc(ev.logistics.display_date||'')}</p></div></div>
          <label class="text-xs font-bold uppercase tracking-wider text-slate-500 mb-2 block">Share link</label>
          <div class="flex bg-slate-50 border border-slate-200 rounded-lg overflow-hidden mb-5">
            <input id="shareLink" type="text" readonly value="${esc(url)}" class="w-full bg-transparent text-sm text-slate-600 px-4 py-3 outline-none" />
            <button onclick="(function(){const i=document.getElementById('shareLink'); i.select(); document.execCommand('copy'); const b=document.getElementById('copyBtn'); b.innerHTML='<i data-lucide=&quot;check-circle-2&quot; class=&quot;w-3.5 h-3.5&quot;></i> Copied'; b.className='px-4 py-3 font-bold text-xs uppercase tracking-wider border-l border-slate-200 bg-[#10B981] text-white flex items-center gap-2'; if(window.lucide) lucide.createIcons();})()" id="copyBtn" class="px-4 py-3 font-bold text-xs uppercase tracking-wider border-l border-slate-200 bg-white text-[#0A2C3D] hover:bg-slate-100 flex items-center gap-2"><i data-lucide="copy" class="w-3.5 h-3.5"></i> Copy</button>
          </div>
          <div class="grid grid-cols-3 gap-3">
            <a href="https://twitter.com/intent/tweet?text=${encodeURIComponent('Join me at '+ev.title)}&url=${encodeURIComponent(url)}" target="_blank" rel="noreferrer" class="flex flex-col items-center justify-center gap-2 py-3 rounded-xl border border-slate-200 hover:bg-slate-50 hover:border-blue-400 transition-colors text-slate-600 hover:text-blue-500"><i data-lucide="twitter" class="w-6 h-6"></i><span class="text-[10px] font-bold uppercase tracking-wider">Twitter</span></a>
            <a href="https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(url)}" target="_blank" rel="noreferrer" class="flex flex-col items-center justify-center gap-2 py-3 rounded-xl border border-slate-200 hover:bg-slate-50 hover:border-blue-700 transition-colors text-slate-600 hover:text-blue-700"><i data-lucide="linkedin" class="w-6 h-6"></i><span class="text-[10px] font-bold uppercase tracking-wider">LinkedIn</span></a>
            <a href="https://wa.me/?text=${encodeURIComponent(ev.title+' '+url)}" target="_blank" rel="noreferrer" class="flex flex-col items-center justify-center gap-2 py-3 rounded-xl border border-slate-200 hover:bg-slate-50 hover:border-emerald-500 transition-colors text-slate-600 hover:text-emerald-600"><i data-lucide="message-circle" class="w-6 h-6"></i><span class="text-[10px] font-bold uppercase tracking-wider">WhatsApp</span></a>
          </div>
        </div>
      </div></div>`);
    }
    function openCalendar(ev){
      track('open_calendar',{ event_id:ev.id });
      mountOverlay(`<div class="fixed inset-0 z-[60] flex items-end sm:items-center justify-center bg-black/60 scrim p-0 sm:p-4 backdrop-blur-sm" onclick="if(event.target===this) activeOverlayClose && activeOverlayClose()"><div role="dialog" aria-modal="true" class="bg-white w-full sm:max-w-sm sm:rounded-2xl rounded-t-3xl overflow-hidden shadow-2xl sheet">
        <div class="px-6 py-5 border-b border-slate-100 flex justify-between items-center bg-slate-50"><h3 class="font-oswald text-xl font-bold uppercase text-[#0A2C3D]">Add to Calendar</h3><button onclick="activeOverlayClose && activeOverlayClose()" aria-label="Close" class="w-9 h-9 grid place-items-center rounded-full text-slate-400 hover:text-slate-700 bg-white border border-slate-200"><i data-lucide="x" class="w-4 h-4"></i></button></div>
        <div class="p-5 space-y-3">
          <a href="${googleCalUrl(ev)}" target="_blank" rel="noreferrer" onclick="track('add_to_calendar',{method:'google',event_id:${ev.id}})" class="flex items-center gap-3 p-4 border border-slate-200 rounded-xl hover:bg-slate-50 transition-colors"><div class="w-10 h-10 bg-white border border-slate-200 rounded-lg grid place-items-center"><i data-lucide="calendar" class="w-5 h-5 text-[#0A2C3D]"></i></div><div class="flex-1 min-w-0"><p class="font-bold text-[#0A2C3D]">Google Calendar</p><p class="text-xs text-slate-500">Opens in a new tab</p></div><i data-lucide="external-link" class="w-4 h-4 text-slate-400"></i></a>
          <button onclick="downloadICS(byId(${ev.id})); activeOverlayClose && activeOverlayClose();" class="w-full flex items-center gap-3 p-4 border border-slate-200 rounded-xl hover:bg-slate-50 transition-colors text-left"><div class="w-10 h-10 bg-white border border-slate-200 rounded-lg grid place-items-center"><i data-lucide="download" class="w-5 h-5 text-[#0A2C3D]"></i></div><div class="flex-1 min-w-0"><p class="font-bold text-[#0A2C3D]">Apple / Outlook (.ics)</p><p class="text-xs text-slate-500">Downloads a calendar file</p></div></button>
        </div>
      </div></div>`);
    }
    function openVideo(url){
      mountOverlay(`<div class="fixed inset-0 z-[60] flex items-center justify-center bg-black/85 scrim p-4" onclick="if(event.target===this) activeOverlayClose && activeOverlayClose()"><div role="dialog" aria-modal="true" class="w-full max-w-4xl aspect-video bg-black rounded-2xl overflow-hidden shadow-2xl sheet relative"><button onclick="activeOverlayClose && activeOverlayClose()" aria-label="Close" class="absolute top-3 right-3 z-10 w-10 h-10 grid place-items-center rounded-full bg-black/60 text-white hover:bg-black/80"><i data-lucide="x" class="w-5 h-5"></i></button><iframe class="w-full h-full" src="${url}" frameborder="0" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe></div></div>`);
    }
    function openSponsor(){
      track('open_sponsor_form');
      mountOverlay(`<div class="fixed inset-0 z-[60] flex items-end sm:items-center justify-center bg-black/60 scrim p-0 sm:p-4 backdrop-blur-sm" onclick="if(event.target===this) activeOverlayClose && activeOverlayClose()"><div role="dialog" aria-modal="true" class="bg-white w-full sm:max-w-xl sm:rounded-2xl rounded-t-3xl overflow-hidden shadow-2xl sheet flex flex-col max-h-[92vh]">
        <div class="bg-[#0A2C3D] text-center p-7 relative shrink-0 grain"><button onclick="activeOverlayClose && activeOverlayClose()" aria-label="Close" class="absolute top-4 right-4 text-white/70 hover:text-white"><i data-lucide="x" class="w-6 h-6"></i></button><span class="bg-[#9C1C1F] text-white text-[10px] font-bold uppercase tracking-widest px-3 py-1 rounded inline-block mb-2">Corporate Inquiries</span><h2 class="font-oswald text-3xl sm:text-4xl font-extrabold text-white uppercase tracking-wide">Partner With Us</h2><p class="text-slate-300 text-sm mt-2">Submit your details and our team will be in touch.</p></div>
        <form onsubmit="event.preventDefault(); track('submit_sponsor_form'); activeOverlayClose && activeOverlayClose();" class="p-6 sm:p-7 overflow-y-auto no-scrollbar space-y-4">
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4"><div><label class="text-xs font-bold text-[#9C1C1F] uppercase tracking-wide">First name</label><input id="sp-first" required class="w-full border border-slate-300 rounded-lg p-3 mt-1 outline-none focus:border-[#0A2C3D] bg-[#FAFAFA]" /></div><div><label class="text-xs font-bold text-[#9C1C1F] uppercase tracking-wide">Last name</label><input id="sp-last" required class="w-full border border-slate-300 rounded-lg p-3 mt-1 outline-none focus:border-[#0A2C3D] bg-[#FAFAFA]" /></div></div>
          <div><label class="text-xs font-bold text-[#9C1C1F] uppercase tracking-wide">Email</label><input id="sp-email" type="email" required class="w-full border border-slate-300 rounded-lg p-3 mt-1 outline-none focus:border-[#0A2C3D] bg-[#FAFAFA]" /></div>
          <div><label class="text-xs font-bold text-[#9C1C1F] uppercase tracking-wide">Phone</label><input id="sp-phone" type="tel" placeholder="071 123 4567" required class="w-full border border-slate-300 rounded-lg p-3 mt-1 outline-none focus:border-[#0A2C3D] bg-[#FAFAFA]" /></div>
          <div><label class="text-xs font-bold text-[#9C1C1F] uppercase tracking-wide">Company</label><input id="sp-co" required class="w-full border border-slate-300 rounded-lg p-3 mt-1 outline-none focus:border-[#0A2C3D] bg-[#FAFAFA]" /></div>
          <div><label class="text-xs font-bold text-[#9C1C1F] uppercase tracking-wide">Tell us about your business</label><textarea id="sp-msg" rows="3" class="w-full border border-slate-300 rounded-lg p-3 mt-1 outline-none focus:border-[#0A2C3D] bg-[#FAFAFA]"></textarea></div>
          <button type="submit" class="w-full bg-[#0A2C3D] hover:bg-[#071d29] text-white font-bold py-4 rounded-lg uppercase tracking-wider transition-colors mt-2">Submit Inquiry</button>
        </form>
      </div></div>`);
    }
    // Placeholder — wired in next chunk
    function openCheckout(){
      track('open_checkout_placeholder');
      mountOverlay(`<div class="fixed inset-0 z-[60] flex items-end sm:items-center justify-center bg-black/60 scrim p-0 sm:p-4 backdrop-blur-sm" onclick="if(event.target===this) activeOverlayClose && activeOverlayClose()"><div role="dialog" aria-modal="true" class="bg-white w-full sm:max-w-md sm:rounded-2xl rounded-t-3xl overflow-hidden shadow-2xl sheet text-center p-8 sm:p-10">
        <div class="w-16 h-16 mx-auto rounded-full bg-[#FFF2CD] grid place-items-center mb-5"><i data-lucide="ticket" class="w-7 h-7 text-[#9C1C1F]"></i></div>
        <h3 class="font-oswald text-2xl font-extrabold uppercase text-[#0A2C3D] mb-2">Checkout coming next</h3>
        <p class="text-slate-500 text-sm mb-7">The full ticket flow — tier selection, attendee details, payment, and the animated thank-you ticket with QR — lands in the next chunk.</p>
        <button onclick="activeOverlayClose && activeOverlayClose()" class="bg-[#9C1C1F] hover:bg-[#7a1518] text-white font-bold uppercase tracking-wide px-7 py-3 rounded-xl">Got it</button>
      </div></div>`);
    }

    // === App + bootstrap ==========================================================
    function initCountdown(){
      clearInterval(countdownInterval);
      const update = ()=>{
        const el = document.getElementById('countdown-display'); if(!el) return clearInterval(countdownInterval);
        const ev = byId(state.params.id); if(!ev || !ev.logistics.startMs) return;
        const diff = ev.logistics.startMs - Date.now();
        if(diff <= 0){ el.innerText = 'Starting Soon'; return; }
        const days = Math.floor(diff/86400000), hrs = Math.floor(diff/3600000)%24, mins = Math.floor(diff/60000)%60, secs = Math.floor(diff/1000)%60;
        el.innerText = days>0 ? `${days}d ${hrs}h` : hrs>0 ? `${hrs}h ${mins}m` : `${mins}m ${secs}s`;
      };
      update();
      countdownInterval = setInterval(update, 1000);
    }
    function renderApp(){
      const app = document.getElementById('app');
      let html = header();
      if(state.view==='directory') html += renderDirectory();
      else if(state.view==='event') html += renderEventDetail();
      else if(state.view==='speaker') html += renderSpeakerProfile();
      setHTML(app, html);
      initCountdown();
    }
    document.addEventListener('DOMContentLoaded', ()=>{
      seedDemoDates();
      window.addEventListener('hashchange', route);
      window.addEventListener('keydown', (e)=>{ if(e.key==='Escape' && activeOverlayClose){ activeOverlayClose(); } });
      route();
    });
  </script>
