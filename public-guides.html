<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SME Guides — SME South Africa</title>
  <meta name="description" content="In-depth, evergreen guides to every major topic for South African SMEs." />
  <link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script><script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>tailwind.config={theme:{extend:{fontFamily:{jakarta:['Plus Jakarta Sans','sans-serif'],inter:['Inter','system-ui','sans-serif']}}}};</script>
  <style>
    html,body{font-family:'Inter',system-ui,sans-serif;} .font-jakarta{font-family:'Plus Jakarta Sans',sans-serif;letter-spacing:.005em;}
    .hero-bg{background:linear-gradient(115deg,#0C1F31 0%,#0C1F31 50%,#2b1626 80%,#5e1a2c 115%);}
    .dot-pattern{background-image:radial-gradient(rgba(255,255,255,.07) 1px,transparent 1.5px);background-size:22px 22px;}
    .card-lift{transition:box-shadow .2s,transform .2s;} .card-lift:hover{box-shadow:0 14px 30px -12px rgba(10,44,61,.22);transform:translateY(-3px);}
    .field{width:100%;background:#fff;border:1px solid #E7EBEF;border-radius:.75rem;height:3rem;padding:0 1rem 0 2.75rem;font-size:.9rem;outline:none;transition:border-color .15s,box-shadow .15s;} .field:focus{border-color:#DC183C;box-shadow:0 0 0 3px rgba(220,24,60,.12);}
    .chip{transition:all .15s;} .chip:not(.chip-active):hover{background:#FDECEF;color:#B0142F;border-color:#DC183C;}
    .chip-active{background:#DC183C !important;color:#fff !important;border-color:#DC183C !important;}
    .line-clamp-2{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
    .dev-badge{display:none;} body.dev-on .dev-badge{display:inline-flex;} #devToggle.on{background:#DC183C;color:#fff;border-color:#DC183C;}
    .ov{position:fixed;inset:0;z-index:60;} .ov-bg{position:absolute;inset:0;background:rgba(12,31,49,.45);backdrop-filter:blur(2px);opacity:0;transition:opacity .3s;} .ov.open .ov-bg{opacity:1;}
    .drawer{position:absolute;right:0;top:0;height:100%;width:100%;max-width:440px;background:#fff;box-shadow:-12px 0 40px rgba(12,31,49,.25);overflow-y:auto;transform:translateX(100%);transition:transform .3s cubic-bezier(.2,.7,.2,1);} .ov.open .drawer{transform:translateX(0);}
  </style>
</head>
<body class="bg-[#FCFCFC] text-[#121A21] antialiased">
<header class="bg-slate-100 border-b-2 border-dashed border-slate-400 relative overflow-hidden">
  <div class="absolute inset-0 opacity-30 pointer-events-none" style="background:repeating-linear-gradient(45deg,transparent,transparent 8px,rgba(100,116,139,.18) 8px,rgba(100,116,139,.18) 16px)"></div>
  <div class="relative max-w-7xl mx-auto px-4 sm:px-6 h-14 flex items-center gap-3 sm:gap-4">
    <a href="public-home.html" class="flex items-center gap-2 shrink-0 opacity-70 hover:opacity-100 transition">
      <img src="assets/logo-icon.png" alt="SME South Africa" class="w-7 h-7" />
      <span class="font-jakarta font-extrabold text-[13px] tracking-tight text-slate-700 hidden sm:inline">SME South Africa</span>
    </a>
    <span class="mx-1 hidden sm:inline w-px h-5 bg-slate-300"></span>
    <p class="text-[10px] sm:text-[11px] font-bold uppercase tracking-widest text-slate-600 flex items-center gap-1.5">
      <i data-lucide="construction" class="w-3.5 h-3.5 text-slate-500"></i>
      Header placeholder &middot; design pending
    </p>
    <div class="ml-auto flex items-center gap-2">
      <button id="devToggle" onclick="toggleDevMode()" class="inline-flex items-center gap-1.5 px-2.5 h-8 rounded-full bg-white border border-slate-300 hover:border-[#DC183C] hover:text-[#DC183C] text-[11px] font-bold uppercase tracking-wider text-slate-600 transition" title="Toggle implementation notes"><i data-lucide="code-2" class="w-3.5 h-3.5"></i><span class="hidden sm:inline">Dev</span></button>
      <a href="index.html" class="inline-flex items-center gap-1.5 px-3 h-8 rounded-full bg-white border border-slate-300 hover:border-slate-500 text-[11px] font-bold text-slate-700 transition">
        <i data-lucide="arrow-left" class="w-3.5 h-3.5"></i><span class="hidden sm:inline">Launcher</span>
      </a>
    </div>
  </div>
</header>

<!-- ARCHIVE HERO -->
<section class="hero-bg text-white relative overflow-hidden"><div class="absolute inset-0 dot-pattern opacity-70 pointer-events-none"></div>
  <div class="max-w-7xl mx-auto px-4 sm:px-6 pt-12 pb-14 relative">
    <!-- Breadcrumb (global pattern) -->
    <nav aria-label="Breadcrumb" class="text-xs text-white/55 flex items-center flex-wrap gap-x-1.5 mb-4"><a href="public-home.html" class="hover:text-white transition">Home</a><span class="text-white/30">›</span><span class="text-white/85 font-medium truncate">Guides</span></nav>
    <h1 class="font-jakarta font-extrabold text-4xl sm:text-5xl tracking-tight">SME Guides
      <button onclick="openBrief()" class="dev-badge align-middle ml-1 w-6 h-6 rounded-full bg-[#FF9900] text-[#0C1F31] items-center justify-center text-[11px] font-bold">i</button>
    </h1>
    <p class="mt-4 text-white/70 max-w-2xl text-lg">In-depth, evergreen guides to every major topic for South African SMEs.</p>
  </div>
</section>

<main class="max-w-7xl mx-auto px-4 sm:px-6 pt-12">
  <!-- SEARCH -->
  <div class="relative">
    <i data-lucide="search" class="w-4 h-4 text-[#6A7581] absolute left-3.5 top-1/2 -translate-y-1/2"></i>
    <input id="search" oninput="render()" class="field" placeholder="Search guides by title, topic, or category…" />
  </div>

  <!-- CATEGORY CHIPS -->
  <div id="chips" class="flex flex-wrap gap-2 mt-5"></div>

  <!-- GRID -->
  <div id="grid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6 mt-8"></div>
  <div id="empty" class="hidden text-center py-16 text-[#6A7581]"><i data-lucide="search-x" class="w-8 h-8 mx-auto mb-3"></i><p class="font-semibold">No guides match your search.</p></div>
</main>

<div class="h-16"></div>

<footer class="bg-slate-100 border-t-2 border-dashed border-slate-400 relative overflow-hidden">
  <div class="absolute inset-0 opacity-30 pointer-events-none" style="background:repeating-linear-gradient(45deg,transparent,transparent 8px,rgba(100,116,139,.18) 8px,rgba(100,116,139,.18) 16px)"></div>
  <div class="relative max-w-7xl mx-auto px-4 sm:px-6 py-6 text-center">
    <p class="text-[10px] sm:text-[11px] font-bold uppercase tracking-widest text-slate-600 flex items-center justify-center gap-1.5">
      <i data-lucide="construction" class="w-3.5 h-3.5 text-slate-500"></i>
      Footer placeholder &middot; design pending
    </p>
    <p class="text-[11px] text-slate-500 mt-2">&copy; 2026 SME South Africa</p>
  </div>
</footer>

<div id="overlay-root"></div><div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 z-50"></div>
<script>
  function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
  function showToast(m){const el=document.getElementById('toast');el.classList.remove('hidden');el.innerHTML=`<div class="bg-[#0C1F31] text-white rounded-full pl-3 pr-5 py-2.5 shadow-2xl flex items-center gap-2 text-sm font-semibold" style="border-left:4px solid #29A37A"><i data-lucide="check-circle" class="w-4 h-4" style="color:#29A37A"></i><span>${esc(m)}</span></div>`;lucide.createIcons();setTimeout(()=>{el.classList.add('hidden');el.innerHTML='';},2400);}

  const CATS=['All','Funding','Compliance','Operations','Marketing','Technology','Industry'];
  let activeCat='All';
  const GUIDES=[
    {img:'assets/article-1.jpg',cat:'Funding',title:'Guide to Asset Finance in South Africa',excerpt:'Fund the vehicles, plant and equipment your business runs on — without draining cash. How asset finance works, who qualifies, and what it costs.',read:12},
    {img:'assets/article-2.jpg',cat:'Funding',title:'Guide to Credit Scores',excerpt:'What lenders actually see when they pull your record, how business and personal scores interact, and the practical moves that lift them.',read:10},
    {img:'assets/article-3.jpg',cat:'Funding',title:'Guide to Franchise Funding',excerpt:'From franchise fees to working capital, a full walkthrough of how to finance buying into an established brand in South Africa.',read:11},
    {img:'assets/article-4.jpg',cat:'Funding',title:'Guide to the Tourism Equity Fund',excerpt:'Eligibility, blended finance structure and the application process for the Department of Tourism’s equity programme.',read:9},
    {img:'assets/article-5.jpg',cat:'Compliance',title:'Guide to Skills Development',excerpt:'SETA levies, learnerships and how a structured skills plan turns a compliance cost into a B-BBEE and productivity win.',read:13},
    {img:'assets/article-6.jpg',cat:'Compliance',title:'Guide to South African Labour Law',excerpt:'Contracts, the BCEA, the LRA, UIF and fair dismissal — the founder’s plain-language map of your obligations as an employer.',read:16},
    {img:'assets/article-7.jpg',cat:'Compliance',title:'Guide on Intellectual Property',excerpt:'Trademarks, copyright, patents and designs — how to protect what your business creates and register it with the CIPC.',read:12},
    {img:'assets/article-8.jpg',cat:'Compliance',title:'Guide to Economic & Social Development Programmes',excerpt:'How ESD spend works under B-BBEE, what counts, and how small suppliers tap into corporate development funding.',read:11},
    {img:'assets/article-1.jpg',cat:'Technology',title:'Guide on Digital Transformation Strategies',excerpt:'A pragmatic roadmap for SMEs to digitise operations, sales and finance without a six-figure IT budget.',read:14},
    {img:'assets/article-2.jpg',cat:'Technology',title:'Guide on AI for Business',excerpt:'Where artificial intelligence genuinely moves the needle for a small business — and the free and low-cost tools to start with today.',read:10},
    {img:'assets/article-3.jpg',cat:'Operations',title:'Guide to Export Markets for South Africa',excerpt:'Incoterms, customs, the dtic’s export incentives and how to land your first international order with confidence.',read:15},
    {img:'assets/article-4.jpg',cat:'Operations',title:'Guide to Buying a Business',excerpt:'Due diligence, valuation, deal structures and handover — how to acquire an existing business without inheriting its problems.',read:13},
    {img:'assets/article-5.jpg',cat:'Industry',title:'Guide to Property Development',excerpt:'From zoning and feasibility to financing and exit, the lifecycle of a small-scale property development project in SA.',read:14},
    {img:'assets/article-6.jpg',cat:'Industry',title:'Guide to Cultural Heritage Tourism',excerpt:'Building a sustainable tourism venture around South Africa’s heritage — products, partnerships and community benefit.',read:9},
    {img:'assets/article-7.jpg',cat:'Marketing',title:'Effective Sales & Marketing Techniques',excerpt:'A practical playbook of the channels, funnels and tactics that win customers for lean South African SMEs.',read:11}
  ];

  function renderChips(){
    document.getElementById('chips').innerHTML = CATS.map(c=>{
      const on=c===activeCat;
      return `<button onclick="setCat('${esc(c)}')" class="chip px-4 h-9 rounded-full text-sm font-semibold border ${on?'chip-active bg-[#DC183C] text-white border-[#DC183C]':'bg-white text-[#121A21] border-[#E7EBEF]'}">${esc(c)}</button>`;
    }).join('');
  }
  function setCat(c){activeCat=c;renderChips();render();}

  function render(){
    const q=(document.getElementById('search').value||'').toLowerCase().trim();
    let list=GUIDES.filter(g=>{
      const catOk=activeCat==='All'||g.cat===activeCat;
      const qOk=!q||(g.title+' '+g.excerpt+' '+g.cat).toLowerCase().includes(q);
      return catOk&&qOk;
    });
    const grid=document.getElementById('grid');
    document.getElementById('empty').classList.toggle('hidden',list.length>0);
    grid.innerHTML=list.map(g=>`
      <a href="public-guide.html" class="group bg-white rounded-2xl border border-[#E7EBEF] p-5 card-lift flex flex-col">
        <div class="flex items-center gap-2">
          <span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-[10px] font-bold bg-[#FFF1E0] text-[#AE6B0A]"><i data-lucide="book-open" class="w-3 h-3"></i> GUIDE</span>
          <span class="px-2.5 py-1 rounded-full text-[10px] font-bold bg-[#FDECEF] text-[#DC183C]">${esc(g.cat)}</span>
        </div>
        <h3 class="font-jakarta font-bold text-lg leading-snug mt-3 group-hover:text-[#DC183C] transition line-clamp-2">${esc(g.title)}</h3>
        <p class="text-sm text-[#6A7581] mt-2 leading-relaxed line-clamp-3 flex-1">${esc(g.excerpt)}</p>
        <div class="flex items-center gap-2 mt-4 pt-4 border-t border-[#E7EBEF] text-xs text-[#6A7581]">
          <i data-lucide="clock" class="w-3.5 h-3.5"></i><span class="font-semibold">${g.read} min read</span>
          <span class="ml-auto inline-flex items-center gap-1 text-[#DC183C] font-bold">Read guide <i data-lucide="arrow-right" class="w-3.5 h-3.5"></i></span>
        </div>
      </a>`).join('');
    lucide.createIcons();
  }

  const BRIEF={title:'Guides Archive',sub:'WordPress archive · public, indexable',purpose:'The SME Guides hub — a dedicated, evergreen content type distinct from articles. Top-of-funnel SEO surface listing every long-form how-to guide with search and category filter. Standalone archive at /guides.',data:'Guides: <code>{ id, title, category, excerpt, hero, read_minutes, updated_at }</code> (CPT “guide”). Categories are a CMS taxonomy: Funding, Compliance, Operations, Marketing, Technology, Industry.',logic:'Search filters title/excerpt/category client-side; category chips re-query. Guides are evergreen so they sort by relevance / last updated rather than publish date. Public + indexable (archive + Article/HowTo schema).',components:'Header · archive hero · search · category chips · guide card grid (GUIDE pill + read time + book-open icon) · footer.',api:'GET /v1/guides?category=&q=&page='};
  function toggleDevMode(){const on=document.body.classList.toggle('dev-on');const b=document.getElementById('devToggle');if(b)b.classList.toggle('on',on);if(on)showToast('Dev Mode on — tap any ⓘ for implementation notes.');lucide.createIcons();}
  function closeOverlay(id){const el=document.getElementById(id);if(!el)return;el.classList.remove('open');setTimeout(()=>{if(el&&el.parentNode)el.remove();},300);}
  function openBrief(){const b=BRIEF;const sec=(i,l,h)=>`<div class="px-6 py-4 border-t border-slate-100"><p class="text-[10px] font-bold uppercase tracking-widest text-[#DC183C] flex items-center gap-1.5 mb-2"><i data-lucide="${i}" class="w-3.5 h-3.5"></i>${l}</p><div class="text-sm text-slate-600 leading-relaxed">${h}</div></div>`;document.getElementById('overlay-root').innerHTML=`<div class="ov" id="ov"><div class="ov-bg" onclick="closeOverlay('ov')"></div><div class="drawer"><div class="sticky top-0 z-10 bg-[#0C1F31] text-white px-6 py-5 flex items-start justify-between"><div><p class="text-[10px] font-bold uppercase tracking-widest text-[#FF9900] mb-1">Dev Brief</p><h3 class="font-jakarta font-extrabold text-lg leading-tight">${b.title}</h3><p class="text-xs text-white/60 mt-1">${b.sub}</p></div><button onclick="closeOverlay('ov')" class="text-white/60 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button></div>${sec('target','Purpose',b.purpose)}${sec('database','Data model',b.data)}${sec('git-branch','Logic',b.logic)}${sec('boxes','Components',b.components)}${sec('plug','API',`<code class="block bg-slate-900 text-emerald-300 text-xs font-mono px-3 py-2 rounded-lg overflow-x-auto">${b.api}</code>`)}</div></div>`;requestAnimationFrame(()=>{const o=document.getElementById('ov');if(o)o.classList.add('open');});lucide.createIcons();}

  renderChips();render();lucide.createIcons();
</script>
<script src="status.js"></script>
<script src="gate-links.js"></script>
</body>
</html>
